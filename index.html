<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correlación de Pozos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0f1a;color:#1e293b;font-size:13px;overflow:hidden;height:100vh;width:100vw}
.header{background:#0f172a;color:#f1f5f9;padding:11px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:14px;font-weight:600;letter-spacing:.5px}
/* Global controls */
.global-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:9px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-group>label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;align-items:center;gap:5px}
input[type=number]{width:68px;font-size:12px;padding:4px 7px;border:1px solid #cbd5e1;border-radius:5px;color:#1e293b}
input[type=number]:focus{outline:none;border-color:#6366f1}
input[type=text]{width:88px;font-size:12px;padding:4px 7px;border:1px solid #cbd5e1;border-radius:5px;color:#1e293b}
.btn{font-size:12px;padding:5px 14px;border-radius:5px;cursor:pointer;font-weight:500;border:none}
.btn-apply{background:#6366f1;color:#fff}.btn-apply:hover{background:#4f46e5}
.btn-run-all{background:#1d4ed8;color:#fff}.btn-run-all:hover{background:#1e40af}
.btn-add{background:#eff6ff;color:#2563eb;border:1px solid #3b82f6}.btn-add:hover{background:#dbeafe}
.btn-run1{background:#059669;color:#fff;padding:3px 10px;font-size:11px;border-radius:4px}.btn-run1:hover{background:#047857}
.btn-del{background:#fff;color:#ef4444;border:1px solid #fca5a5;padding:2px 7px;font-size:11px;border-radius:4px}.btn-del:hover{background:#fef2f2}
/* Toggle bar */
.toggle-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.toggle-bar label{display:flex;align-items:center;gap:5px;font-size:12px;color:#475569;cursor:pointer;user-select:none}
.toggle-bar input[type=checkbox]{width:14px;height:14px;cursor:pointer}
.sep{width:1px;background:#e2e8f0;align-self:stretch}
/* Marker section */
.marker-section{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px}
.marker-section-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.marker-table{width:100%;border-collapse:collapse}
.marker-table th{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;text-align:left;border-bottom:1px solid #f1f5f9}
.marker-table td{padding:4px 6px;vertical-align:middle;border-bottom:1px solid #f8fafc}
.marker-table tr:last-child td{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.result-cell{font-size:12px;font-weight:600;color:#059669}
.result-pending{font-size:11px;color:#94a3b8;font-style:italic}
.mni{width:65px;font-size:12px;padding:3px 5px;border:1px solid #e2e8f0;border-radius:4px;color:#1e293b}
.mni:focus{outline:none;border-color:#6366f1}
.add-row{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
/* Results bar */
.results-bar{background:#1e293b;color:#f1f5f9;padding:7px 20px;display:flex;gap:0;overflow-x:auto;min-height:44px;align-items:center}
.res-item{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid #334155;white-space:nowrap;cursor:pointer;transition:background .1s}
.res-item:hover{background:#334155}
.res-item:last-child{border-right:none}
.res-name{font-size:10px;color:#94a3b8}
.res-val{font-size:13px;font-weight:600}
.res-shift{font-size:11px;color:#94a3b8}
.no-results{font-size:12px;color:#64748b}
/* Well panels */
.well-panels-row{display:flex;gap:12px;padding:12px 20px;align-items:flex-start;overflow-x:auto}
.well-panel{background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;min-width:0}
.well-panel-title{background:#0f172a;color:#f1f5f9;padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.well-canvas-wrap{overflow-x:auto}
canvas{display:block;touch-action:none}
.track-ctrl-panel{background:#0f172a;border-top:2px solid #334155;overflow-y:auto;max-height:240px}
.track-ctrl-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.track-ctrls-row{display:flex;gap:0}
.track-ctrl-well{flex:1;min-width:280px}
.track-ctrl-well-label{font-size:11px;font-weight:600;color:#475569;margin-bottom:6px}
/* CC panel */
.cc-wrap{padding:0 20px 14px}
.panel{background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden}
.panel-title{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:6px 12px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.panel-body{padding:5px}
.legend{display:flex;gap:10px;padding:5px 10px;font-size:10px;color:#64748b;border-top:1px solid #f1f5f9;flex-wrap:wrap;align-items:center}
.lsw{width:16px;height:3px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:3px}
.info-row{padding:6px 12px;font-size:10px;color:#94a3b8;background:#f8fafc;border-top:1px solid #e2e8f0}
.mtabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.mtab{font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;color:#64748b}
.mtab.active{color:#fff;border-color:transparent;font-weight:600}
</style>

<script>let _wellMeta = {};
let validatedMarkers = {}; // {markerIdx: true/false}
// Accumulated results: { origenWell: { markerName: { destinoWell: {md, tvdss, x, y, elev, cc, validated} } } }
let accumulatedResults = {};





// ── Get existing markers for a well ────────────────────────────────────────
function getExistingMarkersForWell(wellName) {
  // Returns { markerName: depth } for all known markers of a well
  var existing = {};

  // From wellMarkers (imported CSV)
  if(wellMarkers[wellName]) {
    wellMarkers[wellName].forEach(function(m){ existing[m.name] = m.depth; });
  }

  // From accumulatedResults as destino
  Object.keys(accumulatedResults).forEach(function(origWell) {
    Object.keys(accumulatedResults[origWell]).forEach(function(mn) {
      if(accumulatedResults[origWell][mn][wellName]) {
        if(!existing[mn]) existing[mn] = accumulatedResults[origWell][mn][wellName].md;
      }
    });
  });

  // From accumulatedResults as origen
  if(accumulatedResults[wellName]) {
    Object.keys(accumulatedResults[wellName]).forEach(function(mn) {
      var dests = accumulatedResults[wellName][mn];
      var firstDest = Object.keys(dests)[0];
      if(firstDest && !existing[mn]) existing[mn] = dests[firstDest].md;
    });
  }

  return existing;
}

// ── Marker comparison dialog ────────────────────────────────────────────────
function showMarkerCompareDialog(wL, wR, conflicts, newResults, onReplace, onKeep, onReview) {
  onReview = onReview || null;
  document.getElementById('markerCompareDialog')?.remove();

  var elevR = 0;
  var wR_data = loadedWells[wR];
  if(wR_data) {
    var t = String(wR_data.meta && wR_data.meta.ELEV || '0').split(/\s+/).filter(Boolean);
    for(var j=t.length-1;j>=0;j--){ var v=parseFloat(t[j]); if(!isNaN(v)){elevR=v;break;} }
  }

  var rows = Object.keys(conflicts).map(function(mn) {
    var existDepth = conflicts[mn] !== undefined ? conflicts[mn] : null;
    var newDepth   = newResults[mn] !== undefined ? newResults[mn] : null;
    var diff       = (existDepth!==null && newDepth!==null) ? newDepth - existDepth : null;
    var diffColor  = diff===null?'#64748b': Math.abs(diff)<5?'#059669': Math.abs(diff)<15?'#f97316':'#dc2626';
    var existTVDSS = existDepth!==null ? (elevR - existDepth).toFixed(2) : '—';
    var newTVDSS   = newDepth!==null   ? (elevR - newDepth).toFixed(2)   : '—';
    return '<tr style="border-bottom:1px solid #f1f5f9">' +
      '<td style="padding:7px 12px;font-weight:700;color:#1e293b">' + mn + '</td>' +
      '<td style="padding:7px 12px;text-align:right;font-family:monospace;color:#2563eb">' + (existDepth!==null?existDepth.toFixed(2):'—') + '</td>' +
      '<td style="padding:7px 12px;text-align:right;font-family:monospace;color:#2563eb;font-size:11px">' + existTVDSS + '</td>' +
      '<td style="padding:7px 12px;text-align:right;font-family:monospace;color:#ea580c">' + (newDepth!==null?newDepth.toFixed(2):'—') + '</td>' +
      '<td style="padding:7px 12px;text-align:right;font-family:monospace;color:#ea580c;font-size:11px">' + newTVDSS + '</td>' +
      '<td style="padding:7px 12px;text-align:right;font-weight:700;color:' + diffColor + '">' + (diff!==null?(diff>=0?'+':'')+diff.toFixed(2)+' m':'—') + '</td>' +
      '</tr>';
  }).join('');

  var dlg = document.createElement('div');
  dlg.id = 'markerCompareDialog';
  dlg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99999;display:flex;align-items:center;justify-content:center';
  dlg.innerHTML =
    '<div style="background:#fff;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.4);width:580px;max-width:95vw;font-family:system-ui">' +
    '<div style="background:#0f172a;padding:14px 20px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:18px">⚖</span>' +
      '<div><div style="font-weight:700;font-size:14px;color:#f1f5f9">Comparar Markers — ' + wR + '</div>' +
      '<div style="font-size:11px;color:#94a3b8">Markers con el mismo nombre ya existen en ' + wR + '</div></div>' +
    '</div>' +
    '<div style="padding:20px 24px">' +
      '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden">' +
        '<thead><tr style="background:#f8fafc">' +
          '<th style="padding:8px 12px;text-align:left;color:#475569">Marker</th>' +
          '<th style="padding:8px 12px;text-align:right;color:#2563eb">MD existente</th>' +
          '<th style="padding:8px 12px;text-align:right;color:#2563eb;font-size:10px">TVDSS exist.</th>' +
          '<th style="padding:8px 12px;text-align:right;color:#ea580c">MD nuevo</th>' +
          '<th style="padding:8px 12px;text-align:right;color:#ea580c;font-size:10px">TVDSS nuevo</th>' +
          '<th style="padding:8px 12px;text-align:right;color:#475569">Diferencia</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
      '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:8px 14px;margin-bottom:16px;font-size:12px;color:#1e40af">' +
        '🔵 <b>Mantener existente</b> — conserva los markers actuales de ' + wR + '<br>' +
        '🟠 <b>Usar nuevo</b> — reemplaza con los resultados de la correlación actual' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end;gap:10px">' +
        '<button onclick="document.getElementById(\'markerCompareDialog\').remove()" ' +
          'style="padding:9px 20px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:#475569;font-size:13px;cursor:pointer">Cancelar</button>' +
        '<button id="btnKeepExisting" ' +
          'style="padding:9px 20px;border:none;border-radius:6px;background:#2563eb;color:#fff;font-size:13px;cursor:pointer;font-weight:600">🔵 Mantener existente</button>' +
        (onReview ? '<button id="btnReview" ' +
          'style="padding:9px 20px;border:none;border-radius:6px;background:#7c3aed;color:#fff;font-size:13px;cursor:pointer;font-weight:600">🔍 Revisar</button>' : '') +
        '<button id="btnUseNew" ' +
          'style="padding:9px 20px;border:none;border-radius:6px;background:#ea580c;color:#fff;font-size:13px;cursor:pointer;font-weight:600">🟠 Usar nuevo</button>' +
      '</div>' +
    '</div>' +
    '</div>';

  dlg.addEventListener('click', function(e){ if(e.target===dlg) dlg.remove(); });
  document.body.appendChild(dlg);

  // Auto-validate: mark conflicts as validated using newResults depths
  function autoValidate() {
    // conflicts can be array or object
    var mNames = Array.isArray(conflicts) ? conflicts : Object.keys(conflicts);
    mNames.forEach(function(mName) {
      // Get the depth from newResults
      var newMd = newResults && (Array.isArray(newResults) ? null : newResults[mName]);
      if(!newMd) {
        // Try from accumulatedResults
        Object.keys(accumulatedResults).forEach(function(orig) {
          var acc = getAcc(orig, mName, wR);
          if(acc && acc.md) newMd = acc.md;
        });
      }
      if(!newMd) return;

      // Set validated in accumulatedResults
      Object.keys(accumulatedResults).forEach(function(orig) {
        var acc = getAcc(orig, mName, wR);
        if(acc) { acc.validated = true; setAcc(orig, mName, wR, acc); }
      });

      // Sync depth to wellMarkers[wR]
      if(!wellMarkers[wR]) wellMarkers[wR] = [];
      var wmR = wellMarkers[wR].find(function(m){ return m.name===mName; });
      if(wmR) { wmR.depth = newMd; }
      else {
        var srcM = wellMarkers[wL] && wellMarkers[wL].find(function(m){ return m.name===mName; });
        wellMarkers[wR].push({name:mName, depth:newMd,
          win:srcM?srcM.win:50, sNeg:srcM?srcM.sNeg:150, sPos:srcM?srcM.sPos:150, notes:''});
      }
    });
    setTimeout(function(){ renderMarkerDataTable(); }, 150);
    markUnsaved(); setTimeout(autoSave, 500);
  }

  document.getElementById('btnKeepExisting').addEventListener('click', function(){
    dlg.remove(); onKeep(); // Don't auto-validate - keep existing acc entry as-is
  });
  document.getElementById('btnUseNew').addEventListener('click', function(){
    dlg.remove(); onReplace(); setTimeout(autoValidate, 100);
  });
  if(onReview) {
    var _onReview = onReview;
    document.getElementById('btnReview')?.addEventListener('click', function(){
      dlg.remove(); _onReview(); setTimeout(autoValidate, 100);
    });
  }
}

function endReviewMode(useNew) {
  reviewMode = false;
  document.getElementById('reviewBanner')?.remove();

  if(useNew === null) {
    // Cancelled - restore existing result
    if(reviewData) {
      var mi = markers.findIndex(function(m){ return m.name === reviewData.mName; });
      if(mi >= 0) {
        results[mi] = { bestDepth: reviewData.existDepth, bestCC: 0, localPeaks:[], peakIdx:0 };
      }
    }
  } else if(useNew === true && reviewData) {
    // Use new result
    setAcc(reviewData.wL, reviewData.mName, reviewData.wR, reviewData.newData);
    markUnsaved(); setTimeout(autoSave, 500);
  } else if(useNew === false && reviewData) {
    // Keep existing - restore
    var mi = markers.findIndex(function(m){ return m.name === reviewData.mName; });
    if(mi >= 0) {
      results[mi] = { bestDepth: reviewData.existDepth, bestCC: 0, localPeaks:[], peakIdx:0 };
    }
    markUnsaved(); setTimeout(autoSave, 500);
  }

  reviewData = null;
  renderMarkerBody(); renderResultsBar(); renderAll();
  setTimeout(function(){ renderMarkerDataTable(); }, 50);
}

// Draw existing marker line in DESTINO when in review mode
function drawReviewMarker(ctx, wellName, tLeft, dMin, dMax) {
  if(!reviewMode || !reviewData) return;
  const wells_ = Object.keys(wellState);
  if(wells_.indexOf(wellName) !== 1) return; // only DESTINO panel
  if(reviewData.existDepth === null || reviewData.existDepth === undefined) return;

  const y = depthY(reviewData.existDepth, dMin, dMax);
  if(y < 0 || y > CANVAS_H) return;

  ctx.save();
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(tLeft, y); ctx.lineTo(tLeft + TRACK_W, y); ctx.stroke();
  ctx.fillStyle = '#2563eb';
  ctx.font = 'bold 9px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('◀ ' + reviewData.mName + ' exist.', tLeft + 3, y - 3);
  ctx.restore();
}

// ── Batch well processing after parsing ────────────────────────────────────
function processParsedWellBatch(parsedWells) {
  // Detect duplicates
  var dups = parsedWells.filter(function(pw){ return loadedWells[pw.name]; });
  var nonDups = parsedWells.filter(function(pw){ return !loadedWells[pw.name]; });

  function addWells(toAdd) {
    toAdd.forEach(function(pw) {
      setFileStatus('ok', '✓ ' + pw.name + ' cargado');
      console.log('[Loader] Parsed well:', pw.name, '| curves:', pw.well.curves.map(function(c){return c.name;}), '| depth pts:', pw.well.DEPTH.length);
      loadedWells[pw.name] = pw.well;
      wellOrder.push(pw.name);
    });
    updateWellSelectors();
    if(typeof WM !== 'undefined' && WM.windows && WM.windows['mapa']) {
      if(WM.windows['mapa'].state === 'closed') WM.open('mapa');
      else { setTimeout(function(){ _mapInitialized=false; _mapCanvas=null; _mapCtx=null; initMap(); updateMap(); setupMapClick(); }, 150); }
      WM.focus('mapa');
    }
  }

  function replaceWells(toReplace) {
    toReplace.forEach(function(pw) {
      var oldIdx = wellOrder.indexOf(pw.name);
      if(oldIdx >= 0) wellOrder.splice(oldIdx, 1);
      delete loadedWells[pw.name];
      delete wellMarkers[pw.name];
    });
    addWells(toReplace);
  }

  // Add non-duplicates first
  addWells(nonDups);

  if(!dups.length) return;

  // Show batch dialog for duplicates
  var dupNames = dups.map(function(pw){ return pw.name; });
  showDuplicateBatchDialog(dupNames, function(decision) {
    if(decision === 'cancelAll') {
      // skip all duplicates
    } else if(decision === 'replaceAll') {
      replaceWells(dups);
    } else {
      // oneByOne
      var i = 0;
      function askNext() {
        if(i >= dups.length) return;
        var pw = dups[i++];
        if(confirm('El pozo "' + pw.name + '" ya está cargado.\n\n¿Querés reemplazarlo?')) {
          var oldIdx = wellOrder.indexOf(pw.name);
          if(oldIdx >= 0) wellOrder.splice(oldIdx, 1);
          delete loadedWells[pw.name];
          delete wellMarkers[pw.name];
          addWells([pw]);
        }
        askNext();
      }
      askNext();
    }
  });
}

// ── Curve type detection ────────────────────────────────────────────────────
const CURVE_GROUPS = {
  SP:  { label:'SP / Potencial Espontáneo', patterns:/^SP$|^SP\d|SPAR|SPF|SPONT/i,  unitPatterns:/^MV$/i,    color:'#ef4444', isLog:false },
  GR:  { label:'GR / Gamma Ray',            patterns:/^GR$|^GR\d|CGR|SGR|GAPI|GAMMA/i, unitPatterns:/GAPI|API/i, color:'#22c55e', isLog:false },
  RES: { label:'Resistividad',              patterns:/RT\b|ILD|LLD|M2RX|M2R9|RDEEP|RESD|RES\b|RILM|RILD/i, unitPatterns:/OHMM|OHM/i, color:'#f97316', isLog:true  },
  SON:  { label:'Sónica / DT',               patterns:/^DT$|^DTC|^DTS|^AC\b|SONIC|DTCO|DELT/i, unitPatterns:/US\/F|US\/M|USEC/i, color:'#a855f7', isLog:false },
  COND: { label:'Conductividad',              patterns:/^COND$|^CILD|^CILM|^CMSFL|^CSFLA|CONDUCT/i, unitPatterns:/MMHO|MS\/M|MHOS\/M|MSIEMEN/i, color:'#06b6d4', isLog:false },
};

function detectCurveGroup(curveName, units) {
  for(const [group, cfg] of Object.entries(CURVE_GROUPS)) {
    if(cfg.patterns.test(curveName)) return group;
    if(units && cfg.unitPatterns && cfg.unitPatterns.test(units)) return group;
  }
  return null;
}

function classifyWellCurves(wellName) {
  const w = loadedWells[wellName];
  if(!w) return {};
  const result = { SP:[], GR:[], RES:[], SON:[], OTHER:[] };
  w.curves.forEach(function(c) {
    const units = c.unit || '';
    const group = detectCurveGroup(c.name, units);
    if(group) result[group].push({name:c.name, unit:units});
    else result.OTHER.push({name:c.name, unit:units});
  });
  return result;
}

// Apply global viewer config to a specific well
function applyViewerConfigToWell(wellName) {
  const w = loadedWells[wellName];
  if(!w || !wellState[wellName]) return;
  const curves = w.curves.map(function(c){ return c.name; });
  const classified = classifyWellCurves(wellName);

  const tracks = [];
  viewerConfig.forEach(function(slot) {
    // Find curve for this slot's group
    var candidates = classified[slot.group] || [];
    var usedGroup = slot.group;
    // Try fallback if no candidates
    if(!candidates.length && slot.fallback) {
      candidates = classified[slot.fallback] || [];
      usedGroup = slot.fallback;
    }
    if(!candidates.length) return; // skip slot if no curve found

    var curveName = candidates[0].name;
    // Use fallback group color if we had to fall back
    var trackCol = slot.color;
    if(usedGroup !== slot.group && CURVE_GROUPS[usedGroup]) {
      trackCol = CURVE_GROUPS[usedGroup].color;
    }
    tracks.push({
      curveName: curveName,
      scaleMin:  slot.scaleMin,
      scaleMax:  slot.scaleMax,
      isLog:     usedGroup !== slot.group ? CURVE_GROUPS[usedGroup].isLog : slot.isLog,
      isCorrel:  slot.group === 'RES' || slot.group === 'SP',
      color:     trackCol,
      auto:      slot.scaleMin === null && slot.scaleMax === null
    });
  });

  // Set correl track: prefer RES, or first track
  tracks.forEach(function(t){ t.isCorrel = false; });
  const resTrack = tracks.find(function(t){ return detectCurveGroup(t.curveName,'') === 'RES'; });
  if(resTrack) resTrack.isCorrel = true;
  else if(tracks.length) tracks[0].isCorrel = true;

  wellState[wellName].tracks = tracks.length ? tracks : makeDefaultTracks(wellName);
}

// ── Correl curve selector ───────────────────────────────────────────────────
function setCorrelTransform(val) {
  correlTransform = val;
  // Warn if results exist
  const hasResults = Object.keys(results).some(function(k){ return results[k]; });
  if(hasResults) {
    const warn = document.getElementById('ccWarning');
    if(warn) { warn.style.display='block'; warn.textContent='⚠ Cambió la transformación — recorrelacioná para actualizar resultados.'; }
  }
  // Update LOG state on correl track
  const isLog = val === 'log';
  Object.keys(wellState).forEach(function(wn) {
    const ws = wellState[wn];
    if(ws && ws.tracks) {
      const t = ws.tracks.find(function(t){ return t.isCorrel; });
      if(t) t.isLog = isLog;
    }
  });
  renderAll(); renderTrackControls();
}

function updateCorrelCurveSelect() {
  // Sync transform selector
  const tsel = document.getElementById('correlTransformSelect');
  if(tsel) { tsel.value = correlTransform; if(!tsel.value) tsel.value='log'; }
  const sel = document.getElementById('correlCurveSelect');
  const info = document.getElementById('correlCurveInfo');
  if(!sel) return;

  // Get available curves from ORIGEN well
  const wL = Object.keys(wellState)[0] || '';
  const w = loadedWells[wL];
  const curves = w ? w.curves.map(function(c){ return c.name; }) : [];

  // Rebuild options
  sel.innerHTML = '<option value="">— elegir —</option>';
  curves.forEach(function(cn) {
    const opt = document.createElement('option');
    opt.value = cn; opt.textContent = cn;
    sel.appendChild(opt);
  });

  // Find current correl curve from wellState tracks
  const ws = wellState[wL];
  const correlTrack = ws && ws.tracks ? ws.tracks.find(function(t){ return t.isCorrel; }) : null;
  if(correlTrack) {
    sel.value = correlTrack.curveName;
    // Auto-detect transform if not manually set
    var autoT = autoDetectTransform(correlTrack.curveName);
    if(autoT !== correlTransform) {
      correlTransform = autoT;
      var tsel2 = document.getElementById('correlTransformSelect');
      if(tsel2) tsel2.value = correlTransform;
    }
    
  }
}

function autoDetectTransform(curveName) {
  // Auto-select best transform based on curve type
  var group = detectCurveGroup(curveName, '');
  if(group === 'SP' || group === 'GR') {
    // SP/GR: Z-score works best (values can be negative, varies by region)
    return 'zscore';
  } else if(group === 'RES') {
    // Resistivity: LOG works best (compresses high values)
    return 'log';
  } else if(group === 'SON') {
    // Sonic: Z-score or LOG both ok, default log
    return 'log';
  }
  return 'log'; // default
}

function setCorrelCurve(curveName) {
  if(!curveName) return;
  const info = document.getElementById('correlCurveInfo');

  // Auto-detect best transform for this curve type
  var autoTransform = autoDetectTransform(curveName);
  if(autoTransform !== correlTransform) {
    correlTransform = autoTransform;
    var tsel = document.getElementById('correlTransformSelect');
    if(tsel) tsel.value = correlTransform;
    
  }

  // Update both ORIGEN and DESTINO wellState tracks
  Object.keys(wellState).forEach(function(wn) {
    const ws = wellState[wn];
    if(!ws || !ws.tracks) return;
    const w = loadedWells[wn];
    const curves = w ? w.curves.map(function(c){ return c.name; }) : [];

    // Find equivalent curve in this well (same group)
    const targetGroup = detectCurveGroup(curveName, '');
    let matchCurve = curveName;
    if(targetGroup) {
      const match = curves.find(function(cn){
        return detectCurveGroup(cn, '') === targetGroup;
      });
      if(match) matchCurve = match;
    }

    // Set isCorrel on matching track, unset others
    ws.tracks.forEach(function(t){ t.isCorrel = false; });
    const track = ws.tracks.find(function(t){ return t.curveName === matchCurve; });
    if(track) {
      track.isCorrel = true;
    } else if(curves.includes(matchCurve)) {
      // Add track if not visible but exists in LAS
      if(ws.tracks.length < MAX_TRACKS) {
        const preset = getCurvePreset(matchCurve) || {};
        const grp = detectCurveGroup(matchCurve,'');
        ws.tracks.push({
          curveName: matchCurve,
          scaleMin: null, scaleMax: null,
          isLog: !!preset.isLog,
          isCorrel: true,
          color: (grp && CURVE_GROUPS[grp] ? CURVE_GROUPS[grp].color : preset.color) || '#94a3b8',
          auto: true
        });
      } else {
        // Replace last non-correl track
        ws.tracks[ws.tracks.length-1] = {
          curveName: matchCurve,
          scaleMin: null, scaleMax: null,
          isLog: !!(getCurvePreset(matchCurve)||{}).isLog,
          isCorrel: true,
          color: getCurvePreset(matchCurve) ? getCurvePreset(matchCurve).color : '#94a3b8',
          auto: true
        };
      }
    }
  });

  // Update info label
  const preset = getCurvePreset(curveName);
  if(info) info.textContent = preset ? (preset.isLog ? '(LOG)' : '(LIN)') : '';

  renderAll(); renderTrackControls();
  markUnsaved(); setTimeout(autoSave, 500);
}

// ── Signal overlay: ORIGEN vs DESTINO in window range ──────────────────────
function drawSignalOverlay(markerIdx) {
  const c = document.getElementById('cSignal');
  if(!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const PL = 48, PR = 12, PT = 16, PB = 18;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,W,H);

  const m = markers[markerIdx];
  if(!m) return;

  const wells_ = Object.keys(wellState);
  const wL = wells_[0]||'', wR = wells_[1]||wL;
  const curveL = getCorrelCurve(wL);
  const curveR = getCorrelCurve(wR);
  const valsL = INTERP[wL] ? INTERP[wL][curveL] : null;
  const valsR = INTERP[wR] ? INTERP[wR][curveR] : null;

  if(!valsL && !valsR) {
    ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='center';
    ctx.fillText('Sin datos de curva', W/2, H/2);
    return;
  }

  // Get result depth for DESTINO alignment
  const r = results[markerIdx];
  const destDepth = r ? r.bestDepth : m.depth;

  // Window range
  const winStart = m.depth - m.win;
  const winEnd   = m.depth + m.win;

  // Build signal arrays in window
  const STEP_ = STEP || 0.32;
  function getSignalInWindow(vals, centerDepth) {
    if(!vals) return null;
    const iCenter = Math.round((centerDepth - (GRID[0]||0)) / STEP_);
    const iWin = Math.round(m.win / STEP_);
    const i0 = Math.max(0, iCenter - iWin);
    const i1 = Math.min(vals.length, iCenter + iWin);
    const seg = [];
    for(let i=i0; i<i1; i++) {
      const d = winStart + (i-i0)*STEP_;
      seg.push({d: d, v: vals[i]});
    }
    return seg;
  }

  const segL = getSignalInWindow(valsL, m.depth);
  const segR = getSignalInWindow(valsR, destDepth);

  // Normalize both to [0,1] for comparison
  function normalize(seg) {
    if(!seg || !seg.length) return seg;
    let mn=Infinity, mx=-Infinity;
    seg.forEach(p=>{ if(!isNaN(p.v)){if(p.v<mn)mn=p.v; if(p.v>mx)mx=p.v;} });
    const rng = mx-mn || 1;
    return seg.map(p=>({d:p.d, v:(p.v-mn)/rng}));
  }

  const nL = normalize(segL);
  const nR = normalize(segR);

  const xPos = d => PL + (d - winStart) / (winEnd - winStart) * (W - PL - PR);
  const yPos = v => PT + (1-v) * (H - PT - PB);

  // Grid lines
  ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y = PT + i*(H-PT-PB)/4;
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(W-PR,y); ctx.stroke();
  }

  // Draw ORIGEN (blue)
  if(nL && nL.length > 1) {
    ctx.beginPath(); ctx.strokeStyle='#2563eb'; ctx.lineWidth=1.5;
    nL.forEach((p,i) => { if(i===0) ctx.moveTo(xPos(p.d), yPos(p.v)); else ctx.lineTo(xPos(p.d), yPos(p.v)); });
    ctx.stroke();
  }

  // Draw DESTINO (orange) - x-axis aligned to destDepth
  if(nR && nR.length > 1) {
    const shift = destDepth - m.depth;
    ctx.beginPath(); ctx.strokeStyle='#ea580c'; ctx.lineWidth=1.5;
    nR.forEach((p,i) => {
      const xd = xPos(p.d - shift); // align to ORIGEN window
      if(i===0) ctx.moveTo(xd, yPos(p.v)); else ctx.lineTo(xd, yPos(p.v));
    });
    ctx.stroke();
  }

  // Center line (marker depth)
  const mx2 = xPos(m.depth);
  ctx.strokeStyle='rgba(100,116,139,0.3)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(mx2, PT); ctx.lineTo(mx2, H-PB); ctx.stroke();
  ctx.setLineDash([]);

  // X axis labels
  ctx.fillStyle='#64748b'; ctx.font='9px system-ui'; ctx.textAlign='center';
  const step = m.win <= 50 ? 10 : m.win <= 100 ? 20 : 50;
  for(let d=Math.ceil(winStart/step)*step; d<=winEnd; d+=step) {
    ctx.fillText(d.toFixed(0), xPos(d), H-4);
  }

  // Labels
  ctx.font='bold 9px system-ui';
  ctx.fillStyle='#2563eb'; ctx.textAlign='left';
  ctx.fillText(curveL+' ('+wL+')', PL+2, PT+10);
  ctx.fillStyle='#ea580c'; ctx.textAlign='right';
  ctx.fillText(curveR+' ('+wR+')', W-PR-2, PT+10);

  // Update info
  const infoEl = document.getElementById('signalInfo');
  if(infoEl) {
    const cc = r ? r.bestCC.toFixed(3) : '—';
    infoEl.textContent = 'Ventana: ' + m.depth.toFixed(1) + ' ± ' + m.win + 'm | Destino: ' + destDepth.toFixed(1) + 'm | CC=' + cc;
  }
}

// ── Load coordinates from external CSV ─────────────────────────────────────
function loadCoordsCSV(files) {
  if(!files || !files.length) return;
  const file = files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result.replace(/^\uFEFF/, ''); // strip BOM
    const lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if(!lines.length) return;

    // Detect separator
    const sep = lines[0].includes(';') ? ';' : lines[0].includes('\t') ? '\t' : ',';
    const headers = lines[0].split(sep).map(function(h){ return h.trim().toLowerCase(); });

    // Find column indices flexibly
    function findCol(patterns) {
      // First try exact match, then includes
      for(var i=0;i<headers.length;i++) {
        for(var p of patterns) { if(headers[i] === p) return i; }
      }
      for(var i=0;i<headers.length;i++) {
        for(var p of patterns) { if(headers[i].includes(p)) return i; }
      }
      return -1;
    }
    const iWell = findCol(['pozo','well','name','nombre','pozos']);
    const iX    = findCol(['x','xcoord','x_coord','este','easting','coord_x']);
    const iY    = findCol(['y','ycoord','y_coord','norte','northing','coord_y']);
    const iZ    = findCol(['cota','z','elev','altura','elevation','depth']);

    if(iWell < 0) { alert('No se encontró columna de nombre de pozo'); return; }

    var loaded = 0;
    for(var li=1; li<lines.length; li++) {
      const cols = lines[li].split(sep).map(function(c){ return c.trim().replace(/^"|"$/g,''); });
      const wellName = cols[iWell];
      if(!wellName) continue;
      const entry = {};
      if(iX>=0 && cols[iX] && cols[iX].trim()) entry.x = parseFloat(cols[iX].replace(',','.'));
      if(iY>=0 && cols[iY] && cols[iY].trim()) entry.y = parseFloat(cols[iY].replace(',','.'));
      if(iZ>=0 && cols[iZ] && cols[iZ].trim()) entry.elev = parseFloat(cols[iZ].replace(',','.'));
      _wellCoords[wellName] = entry;
      loaded++;

      // Update already-loaded wells - CSV always has priority
      Object.keys(loadedWells).forEach(function(wn) {
        if(wn.toLowerCase() === wellName.toLowerCase()) {
          if(!loadedWells[wn].meta) loadedWells[wn].meta = {};
          var hasCoords = loadedWells[wn].meta.XCOORD || loadedWells[wn].meta.YCOORD;
          if(hasCoords && entry.x) {
            var lasX = parseFloat(loadedWells[wn].meta.XCOORD);
            if(Math.abs(lasX - entry.x) > 1)
              setFileStatus('warn', '⚠ ' + wn + ': coordenadas CSV tienen prioridad sobre LAS');
          }
          if(entry.x    !== undefined) loadedWells[wn].meta.XCOORD = String(entry.x);
          if(entry.y    !== undefined) loadedWells[wn].meta.YCOORD = String(entry.y);
          if(entry.elev !== undefined) loadedWells[wn].meta.ELEV   = String(entry.elev);
        }
      });
    }
    setFileStatus('ok', '📍 ' + loaded + ' pozos con coordenadas cargados');
    // Open map and render
    WM.open('mapa');
    setTimeout(function(){
      initMap();
      setTimeout(function(){ mapFitAll(); }, 150);
    }, 100);
    renderMarkerDataTable && renderMarkerDataTable();
  };
  reader.readAsText(file);
}

// Apply _wellCoords to a well after loading LAS
function applyExternalCoords(wellName) {
  if(!_wellCoords || !loadedWells[wellName]) return;
  // Try exact match first, then case-insensitive
  var entry = _wellCoords[wellName];
  if(!entry) {
    var key = Object.keys(_wellCoords).find(function(k){ return k.toLowerCase()===wellName.toLowerCase(); });
    if(key) entry = _wellCoords[key];
  }
  if(!entry) return;
  if(!loadedWells[wellName].meta) loadedWells[wellName].meta = {};

  // Check if LAS has its own coords - warn if different
  var hasLasCoords = loadedWells[wellName].meta.XCOORD || loadedWells[wellName].meta.YCOORD;
  if(hasLasCoords && entry.x !== undefined) {
    var lasX = parseFloat(loadedWells[wellName].meta.XCOORD);
    var diff = Math.abs(lasX - entry.x);
    if(diff > 1) {
      setFileStatus('warn', '⚠ ' + wellName + ': coordenadas CSV tienen prioridad sobre LAS');
    }
  }

  // CSV always wins
  if(entry.x    !== undefined) loadedWells[wellName].meta.XCOORD = String(entry.x);
  if(entry.y    !== undefined) loadedWells[wellName].meta.YCOORD = String(entry.y);
  if(entry.elev !== undefined) loadedWells[wellName].meta.ELEV   = String(entry.elev);
}

function filterTable() {
  var tblEl = document.getElementById('tblSearch');
  if(!tblEl) return;
  var search = (tblEl.value || '').toLowerCase();
  var filterWell = document.getElementById('tblFilterWell')?.value || '';
  var filterMarker = document.getElementById('tblFilterMarker')?.value || '';
  var visible = 0;
  document.querySelectorAll('#markerDataTableBody tr').forEach(function(tr) {
    if(!tr.dataset.rowkey) return;
    var well   = (tr.dataset.well  ||'').toLowerCase();
    var marker = (tr.dataset.marker||'').toLowerCase();
    var dest   = (tr.dataset.dest  ||'').toLowerCase();
    var show = (!search || well.includes(search) || marker.includes(search) || dest.includes(search)) &&
               (!filterWell   || tr.dataset.well   === filterWell) &&
               (!filterMarker || tr.dataset.marker === filterMarker);
    tr.style.setProperty('display', show ? 'table-row' : 'none', 'important');
    if(show) visible++;
  });
  var stats = document.getElementById('tblStats');
  if(stats) stats.textContent = visible + ' filas visibles';
}

  document.querySelectorAll('#markerDataTableBody tr[data-rowkey]').forEach(function(tr) {

function updateWellMarkerDepth(wellName, markerName, newDepth) {
  if(isNaN(newDepth) || newDepth < 0) return;
  // Update wellMarkers
  if(wellMarkers[wellName]) {
    var wm = wellMarkers[wellName].find(function(m){ return m.name===markerName; });
    if(wm) wm.depth = newDepth;
  }
  // Update markers[] if current ORIGEN
  var curOrigin = document.getElementById('wellSelectLeft')?.value || '';
  if(curOrigin === wellName) {
    var mi = markers.findIndex(function(m){ return m.name===markerName; });
    if(mi >= 0) { markers[mi].depth = newDepth; renderMarkerBody(); renderAll(); }
  }
  // Update acc entries where this well is destino
  Object.keys(accumulatedResults).forEach(function(orig) {
    var acc = getAcc(orig, markerName, wellName);
    if(acc) { acc.md = newDepth; setAcc(orig, markerName, wellName, acc); }
  });
  setTimeout(function(){ renderMarkerDataTable(); }, 50);
  markUnsaved(); setTimeout(autoSave, 500);
}

function toggleWellMarkerValidation(wellName, markerName, checked) {
  var found = false;
  Object.keys(accumulatedResults).forEach(function(orig) {
    var acc = getAcc(orig, markerName, wellName);
    if(acc) {
      if(checked) {
        // Unvalidate all others first
        Object.keys(accumulatedResults).forEach(function(o2) {
          var a2 = getAcc(o2, markerName, wellName);
          if(a2 && o2 !== orig) { a2.validated = false; setAcc(o2, markerName, wellName, a2); }
        });
        acc.validated = true;
        if(acc.md && wellMarkers[wellName]) {
          var wmD = wellMarkers[wellName].find(function(m){ return m.name===markerName; });
          if(wmD) wmD.depth = acc.md;
        }
      } else {
        acc.validated = false;
      }
      setAcc(orig, markerName, wellName, acc);
      found = true;
    }
  });

  // If no acc entry exists (this well was only ORIGEN or imported),
  // create a self-validated entry so the checkbox works
  if(!found && checked) {
    var wData = loadedWells[wellName];
    var getN_tv = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
    var elev_tv = wData ? getN_tv(wData.meta&&wData.meta.ELEV) : (_wellCoords[wellName]&&_wellCoords[wellName].elev||0);
    var wm_tv = wellMarkers[wellName] && wellMarkers[wellName].find(function(m){ return m.name===markerName; });
    var md_tv = wm_tv ? wm_tv.depth : 0;
    // Use wellName as both origen and destino (self-validated)
    if(!accumulatedResults[wellName]) accumulatedResults[wellName] = {};
    if(!accumulatedResults[wellName][markerName]) accumulatedResults[wellName][markerName] = {};
    // Use wellName as dest key so getAcc(wellName, markerName, wellName) finds it
    if(!accumulatedResults[wellName][markerName]) accumulatedResults[wellName][markerName] = {};
    accumulatedResults[wellName][markerName][wellName] = {
      md: md_tv, tvdss: elev_tv - md_tv,
      x: wData ? getN_tv(wData.meta&&wData.meta.XCOORD) : '',
      y: wData ? getN_tv(wData.meta&&wData.meta.YCOORD) : '',
      elev: elev_tv, cc: null, validated: true, notes: ''
    };
  } else if(!found && !checked) {
    // Unvalidate self entry if exists
    if(accumulatedResults[wellName] && accumulatedResults[wellName][markerName] && accumulatedResults[wellName][markerName][wellName]) {
      accumulatedResults[wellName][markerName][wellName].validated = false;
    }
  }

  setTimeout(function(){ renderMarkerDataTable(); }, 50);
  markUnsaved(); setTimeout(autoSave, 500);
}

function saveFlatNote(wellName, markerName, text) {
  // Save note in wellMarkers and any acc entry
  if(wellMarkers[wellName]) {
    var wm = wellMarkers[wellName].find(function(m){ return m.name===markerName; });
    if(wm) wm.notes = text;
  }
  Object.keys(accumulatedResults).forEach(function(orig) {
    var acc = getAcc(orig, markerName, wellName);
    if(acc) { acc.notes = text; setAcc(orig, markerName, wellName, acc); }
  });
  markUnsaved(); setTimeout(autoSave, 500);
}

function deleteSelectedRows() {
  if(_selectedRows.size === 0) { alert('Seleccioná al menos una fila primero'); return; }
  var count = _selectedRows.size;
  if(!confirm('¿Borrar ' + count + ' marker(s) seleccionado(s)?')) return;

  _selectedRows.forEach(function(key) {
    var parts = key.split('|');
    var wellName = parts[0], markerName = parts[1];

    // Remove from wellMarkers
    if(wellMarkers[wellName]) {
      wellMarkers[wellName] = wellMarkers[wellName].filter(function(m){ return m.name !== markerName; });
      if(wellMarkers[wellName].length === 0) delete wellMarkers[wellName];
    }

    // Remove from accumulatedResults (as origen and as destino)
    if(accumulatedResults[wellName] && accumulatedResults[wellName][markerName]) {
      delete accumulatedResults[wellName][markerName];
      if(Object.keys(accumulatedResults[wellName]).length === 0) delete accumulatedResults[wellName];
    }
    // Also remove as destino
    Object.keys(accumulatedResults).forEach(function(orig) {
      if(accumulatedResults[orig][markerName] && accumulatedResults[orig][markerName][wellName]) {
        delete accumulatedResults[orig][markerName][wellName];
      }
    });

    // Remove from markers[] for ALL wells in wellState
    var wells_del = Object.keys(wellState);
    wells_del.forEach(function(wn) {
      if(wn === wellName) {
        var mi = markers.findIndex(function(m){ return m.name === markerName; });
        if(mi >= 0) {
          markers.splice(mi, 1);
          delete results[mi];
        }
      }
    });
    // Also clear results[] for this marker (by name)
    Object.keys(results).forEach(function(ri) {
      if(markers[ri] && markers[ri].name === markerName) {
        delete results[ri];
      }
    });
    // Remove from validatedMarkers
    Object.keys(validatedMarkers).forEach(function(k) {
      if(markers[k] && markers[k].name === markerName) delete validatedMarkers[k];
    });
  });

  _selectedRows.clear();
  renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderAll();
  renderMarkerDataTable(); renderMap();
  markUnsaved(); setTimeout(autoSave, 500);
}

// ── LAS Parser ─────────────────────────────────────────────────────────────
function parseLAS(text, filename) {
  _wellMeta = {}; // reset for each file
  const lines = text.split(/\r?\n/);
  let inWell=false, inCurve=false, inData=false;
  let wellName = null;
  const curveNames = [];
  const rawData = {};

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || line.startsWith('#')) continue;

    const lu = line.toUpperCase();
    if (lu.startsWith('~W')) { inWell=true; inCurve=false; inData=false; continue; }
    if (lu.startsWith('~C')) { inCurve=true; inWell=false; inData=false; continue; }
    if (lu.startsWith('~A')) { inData=true; inWell=false; inCurve=false; continue; }
    if (line.startsWith('~')) { inWell=false; inCurve=false; continue; }

    if (inWell) {
      const dot = line.indexOf('.');
      if (dot < 0) continue;
      const key = line.slice(0, dot).trim().toUpperCase();
      const rest = line.slice(dot + 1);
      const colon = rest.indexOf(':');
      const val = (colon >= 0 ? rest.slice(0, colon) : rest).trim();
      const tokens = val.split(/\s+/).filter(Boolean);
      if ((key === 'WELL' || key === 'UWI' || key === 'API') && tokens.length && !wellName)
        wellName = tokens.join(' ');
      // Store all meta fields
      if (tokens.length) _wellMeta[key] = tokens.join(' ');
    }

    if (inCurve) {
      const dot = line.indexOf('.');
      const name = (dot >= 0 ? line.slice(0, dot) : line).trim();
      if (name) { curveNames.push(name); rawData[name] = []; }
    }

    if (inData && curveNames.length) {
      const parts = line.split(/\s+/).filter(Boolean);
      if (parts.length === curveNames.length) {
        for (let j = 0; j < curveNames.length; j++) {
          const v = parseFloat(parts[j]);
          rawData[curveNames[j]].push(isNaN(v) ? null : v);
        }
      }
    }
  }

  if (!wellName) wellName = filename.replace(/\.[^.]+$/, '');
  const _w = buildWellObject(wellName, curveNames, rawData);
  if(_w) _w.meta = Object.assign({}, _wellMeta);
  _wellMeta = {}; // reset for next file
  return _w;
}

// ── LIS Parser (text-based fallback) ──────────────────────────────────────
function parseLIS(text, filename) {
  // LIS can vary widely; try to find well name and columnar data
  const lines = text.split(/\r?\n/);
  let wellName = null;

  for (const raw of lines) {
    const line = raw.trim();
    const m = line.match(/(?:WELL|WN)\s*[:=]\s*(.+)/i);
    if (m) { wellName = m[1].trim().split(/\s{2,}/)[0]; break; }
  }

  // Try to find column header row followed by numeric rows
  let curveNames = [], rawData = {}, dataStart = -1;
  for (let i = 0; i < Math.min(lines.length, 150); i++) {
    const tokens = lines[i].trim().split(/\s+/).filter(Boolean);
    if (tokens.length < 2 || tokens.length > 30) continue;
    const allAlpha = tokens.every(t => /^[A-Z][A-Z0-9_]*$/i.test(t));
    if (!allAlpha) continue;
    // Check if next line is numeric
    for (let j = i + 1; j < Math.min(lines.length, i + 5); j++) {
      const nt = lines[j].trim().split(/\s+/).filter(Boolean);
      if (!nt.length) continue;
      const allNum = nt.every(t => !isNaN(parseFloat(t)));
      if (allNum && nt.length === tokens.length) {
        curveNames = tokens;
        curveNames.forEach(n => rawData[n] = []);
        dataStart = j;
      }
      break;
    }
    if (dataStart >= 0) break;
  }

  if (dataStart >= 0) {
    for (let i = dataStart; i < lines.length; i++) {
      const parts = lines[i].trim().split(/\s+/).filter(Boolean);
      if (parts.length === curveNames.length) {
        parts.forEach((v, ci) => {
          const n = parseFloat(v);
          rawData[curveNames[ci]].push(isNaN(n) ? null : n);
        });
      }
    }
    if (!wellName) wellName = filename.replace(/\.[^.]+$/, '');
    return buildWellObject(wellName, curveNames, rawData);
  }

  // Fallback: try LAS parser
  return parseLAS(text, filename);
}

// ── Build well object ──────────────────────────────────────────────────────
function buildWellObject(wellName, curveNames, rawData) {
  if (!curveNames.length) return null;


  // Find depth column
  const depthKey = curveNames.find(n =>
    /^(DEPTH|DEPT|MD|TVD|MEASURED_DEPTH)/i.test(n)
  ) || curveNames[0];

  const NULL_VAL = -999.25;
  const isNull = v => v === null || Math.abs(v - NULL_VAL) < 0.1;

  // Subsample x2
  const total = rawData[depthKey].length;
  const indices = [];
  for (let i = 0; i < total; i += 2) indices.push(i);

  const well = { name: wellName, DEPTH: [], curves: [] };

  // Build clean depth array
  well.DEPTH = indices.map(i => {
    const v = rawData[depthKey][i];
    return isNull(v) ? null : v;
  });

  const validDepths = well.DEPTH.filter(v => v !== null);
  if (!validDepths.length) { console.error('No valid depth values in', wellName); return null; }

  // Build curve arrays
  curveNames.forEach(cn => {
    if (cn === depthKey) return;
    const sub = indices.map(i => {
      const v = rawData[cn][i];
      return isNull(v) ? null : v;
    });
    const valid = sub.filter(v => v !== null);
    if (!valid.length) return;
    let mn = valid[0], mx = valid[0];
    for (const v of valid) { if(v<mn)mn=v; if(v>mx)mx=v; }
    well[cn] = sub;
    well.curves.push({ name: cn, min: mn, max: mx });
  });

  if (!well.curves.length) { console.error('No curve data in', wellName); return null; }
  console.log('[Loader] Parsed well:', wellName, '| curves:', well.curves.map(c=>c.name), '| depth pts:', well.DEPTH.length);
  return well;
}

// ── Load files entry point ─────────────────────────────────────────────────
function loadFiles(files) {
  // Separate LAS and CSV files
  var lasFiles = [], csvFiles = [];
  Array.from(files).forEach(function(f) {
    if(f.name.toLowerCase().endsWith('.csv') || f.name.toLowerCase().endsWith('.txt')) {
      csvFiles.push(f);
    } else {
      lasFiles.push(f);
    }
  });
  if(csvFiles.length) loadCoordsCSV(csvFiles);
  if(!lasFiles.length) return;
  files = lasFiles;

  if (window.location.protocol === 'file:') {
    const msg = document.getElementById('fileStatus');
    if(msg) { msg.style.display='block'; msg.style.color='#f87171'; msg.textContent='⚠ Abrí desde servidor local. Doble click en iniciar.bat'; }
    return;
  }
  const arr = Array.from(files);
  let parsed = [];
  let errors = 0;
  let done = 0;

  if(!arr.length) return;

  arr.forEach(function(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'dlis') {
      setFileStatus('error', file.name + ': Formato DLIS no soportado.');
      done++; if(done + errors === arr.length) finishLoading(parsed);
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const text = e.target.result;
        const well = ext === 'lis' ? parseLIS(text, file.name) : parseLAS(text, file.name);
        if (!well) {
          setFileStatus('error', file.name + ': No se pudieron parsear los datos.');
          errors++; done++; if(done + errors === arr.length) finishLoading(parsed);
          return;
        }
        console.log('[Loader] Parsed well:', well.name, '| curves:', well.curves.map(function(c){return c.name;}), '| depth pts:', well.DEPTH.length);
        parsed.push({well: well, name: well.name});
        done++;
        if(done + errors === arr.length) finishLoading(parsed);
      } catch(err) {
        setFileStatus('error', file.name + ': Error al leer: ' + err.message);
        errors++; done++; if(done + errors === arr.length) finishLoading(parsed);
      }
    };
    reader.readAsText(file, 'latin-1');
  });

  function finishLoading(parsedWells) {
    window._applySelectionToAll = null; // reset for each new batch
    if(!parsedWells.length) return;

    // Detect duplicates
    var dups = parsedWells.filter(function(pw){ return !!loadedWells[pw.name]; });
    var nonDups = parsedWells.filter(function(pw){ return !loadedWells[pw.name]; });

    function addWell(pw, curveSelection) {
      // Filter curves based on selection
      if(curveSelection && Object.keys(curveSelection).length > 0) {
        var keepCurves = Object.values(curveSelection);
        pw.well.curves = pw.well.curves.filter(function(c){ return keepCurves.includes(c.name); });
        // Also filter the data arrays
        keepCurves.forEach(function(cn){
          // data already in pw.well[cn] - keep as is
        });
        // Remove data for unselected curves
        pw.well.curves.forEach(function(c){ /* keep */ });
        // Clean up unneeded curve data to save memory
        Object.keys(pw.well).forEach(function(k){
          if(k !== 'DEPTH' && k !== 'name' && k !== 'meta' && k !== 'curves' && k !== 'unit') {
            if(!keepCurves.includes(k)) delete pw.well[k];
          }
        });
      }
      loadedWells[pw.name] = pw.well;
      applyExternalCoords(pw.name);
      wellOrder.push(pw.name);
      setFileStatus('ok', '✓ ' + pw.name + ' cargado (' + pw.well.curves.length + ' curvas)');
    }

    function replaceWell(pw) {
      var oldIdx = wellOrder.indexOf(pw.name);
      if(oldIdx >= 0) wellOrder.splice(oldIdx, 1);
      delete loadedWells[pw.name];
      delete wellMarkers[pw.name];
      addWell(pw);
    }

    function finalizeLoad() {
      updateWellSelectors();
      if(typeof WM !== 'undefined' && WM.windows && WM.windows['mapa']) {
        if(WM.windows['mapa'].state === 'closed') WM.open('mapa');
        else { setTimeout(function(){ _mapInitialized=false; _mapCanvas=null; _mapCtx=null; initMap(); updateMap(); setupMapClick(); }, 150); }
        WM.focus('mapa');
      }
    }

    // Add non-duplicates - show curve selection for each
    var nonDupIdx = 0;
    function processNextNonDup() {
      if(nonDupIdx >= nonDups.length) {
        // Done with non-dups, handle dups
        handleDups();
        return;
      }
      var pw = nonDups[nonDupIdx++];
      // Temporarily add to loadedWells so classifyWellCurves works
      loadedWells[pw.name] = pw.well;
      // If user clicked "Aplicar a todos", skip dialog
      if(window._applySelectionToAll) {
        delete loadedWells[pw.name];
        // Re-map selection by GROUP for this well (curve names may differ)
        var templateSel = window._applySelectionToAll;
        var adaptedSel = {};
        // Temporarily load well to classify curves
        loadedWells[pw.name] = pw.well;
        var classified = classifyWellCurves(pw.name);
        delete loadedWells[pw.name];
        Object.keys(templateSel).forEach(function(group) {
          // Find equivalent curve in this well by group
          if(classified[group] && classified[group].length > 0) {
            adaptedSel[group] = classified[group][0].name;
          }
          // If group not found, skip (don't force wrong curve name)
        });
        addWell(pw, Object.keys(adaptedSel).length > 0 ? adaptedSel : templateSel);
        processNextNonDup();
        return;
      }
      showCurveSelectionDialog(pw.name, function(selection) {
        if(selection === null) {
          delete loadedWells[pw.name];
        } else {
          delete loadedWells[pw.name];
          addWell(pw, selection);
        }
        processNextNonDup();
      });
    }
    processNextNonDup();
    return; // handleDups called inside processNextNonDup

    function handleDups() {
    if(!dups.length) {
      finalizeLoad();
      return;
    }

    // Show batch dialog for duplicates
    var dupNames = dups.map(function(pw){ return pw.name; });
    showDuplicateBatchDialog(dupNames, function(decision) {
      if(decision === 'replaceAll') {
        dups.forEach(replaceWell);
        finalizeLoad();
      } else if(decision === 'oneByOne') {
        var i = 0;
        function askNext() {
          if(i >= dups.length) { finalizeLoad(); return; }
          var pw = dups[i++];
          if(confirm('El pozo "' + pw.name + '" ya está cargado.\n\n¿Querés reemplazarlo?')) {
            replaceWell(pw);
          }
          askNext();
        }
        askNext();
      } else {
        // cancelAll - just finalize with what we have
        finalizeLoad();
      }
    });
    } // end handleDups
  }
}

// ── Well selector UI ───────────────────────────────────────────────────────
function updateWellSelectors() {
  ['Left','Right'].forEach((side, si) => {
    const sel = document.getElementById('wellSelect' + side);
    if (!sel) return;
    const prev = sel.value;
    if (!wellOrder.length) {
      sel.innerHTML = '<option value="">— cargar archivo —</option>';
      return;
    }
    sel.innerHTML = wellOrder.map(n =>
      `<option value="${n}"${n===prev?' selected':''}>${n}</option>`
    ).join('');
    // Auto-select: left=first well, right=second well (if available)
    if (!prev || !loadedWells[prev]) {
      const target = wellOrder[si] || wellOrder[0];
      if (target) sel.value = target;
    }
    // If left and right are the same, fix right to second well
    const selL = document.getElementById('wellSelectLeft');
    const selR = document.getElementById('wellSelectRight');
    if (selL && selR && selL.value === selR.value && wellOrder.length > 1) {
      selR.value = wellOrder.find(n => n !== selL.value) || wellOrder[1] || wellOrder[0];
    }
  });
  onWellSelectionChange();
}

function onWellSelectionChange() {
  const selL = document.getElementById('wellSelectLeft');
  const selR = document.getElementById('wellSelectRight');
  if (!selL || !selR) return;
  const wL = selL.value, wR = selR.value;
  if (!wL || !wR || !loadedWells[wL] || !loadedWells[wR]) {
    // Show empty state
    showEmptyState();
    return;
  }

  console.log('[Loader] Switching wells:', wL, '↔', wR);

  // Update WDATA
  WDATA[wL] = loadedWells[wL];
  WDATA[wR] = loadedWells[wR];

  // Reset wellState
  Object.keys(wellState).forEach(k => delete wellState[k]);
  wellState[wL] = { tracks: [], dMin: null, dMax: null };
  wellState[wR] = { tracks: [], dMin: null, dMax: null };
  applyViewerConfigToWell(wL);
  applyViewerConfigToWell(wR);

  // Reset correlation state
  results = {}; ghostShifts = {};

  // Rebuild grid + interp
  const dL = loadedWells[wL].DEPTH.filter(v=>v!==null);
  const dR = loadedWells[wR].DEPTH.filter(v=>v!==null);
  if (!dL.length || !dR.length) { console.error('Empty depth arrays'); return; }

  // Filter NaN values from depth arrays
  const dLclean = dL.filter(function(d){ return !isNaN(d) && isFinite(d); });
  const dRclean = dR.filter(function(d){ return !isNaN(d) && isFinite(d); });
  window._DMIN = Math.max(dLclean[0]||0, dRclean[0]||0);
  window._DMAX = Math.min(dLclean[dLclean.length-1]||9999, dRclean[dRclean.length-1]||9999);
  console.log('[Loader] Common depth range:', window._DMIN, '-', window._DMAX);
  const dri = document.getElementById('depthRangeInfo');
  if(dri) dri.textContent = 'Rango común: ' + (window._DMIN||0).toFixed(0) + ' – ' + (window._DMAX||0).toFixed(0) + ' m';

  GRID = [];
  for (let d = window._DMIN; d <= window._DMAX; d += STEP)
    GRID.push(parseFloat(d.toFixed(2)));

  INTERP[wL] = {};
  INTERP[wR] = {};
  [wL, wR].forEach(wn => {
    loadedWells[wn].curves.forEach(c => {
      INTERP[wn][c.name] = interpArray(GRID, loadedWells[wn].DEPTH, loadedWells[wn][c.name]);
    });
  });

  // Set initial depth viewport
  const range = Math.min(400, window._DMAX - window._DMIN);
  wellState[wL].dMin = window._DMIN; wellState[wL].dMax = window._DMIN + range;
  wellState[wR].dMin = window._DMIN; wellState[wR].dMax = window._DMIN + range;

  // Update UI labels
  const tL = document.getElementById('wellTitleLeft');
  const tR = document.getElementById('wellTitleRight');
  if (tL) tL.textContent = wL;
  if (tR) tR.textContent = wR;
  const lL = document.getElementById('trackLabelLeft');
  const lR = document.getElementById('trackLabelRight');
  if (lL) lL.textContent = wL;
  if (lR) lR.textContent = wR;

  // Load markers for new ORIGEN well
  const _newOrigin = document.getElementById('wellSelectLeft')?.value || '';
  markers.length = 0;
  Object.keys(results).forEach(k => delete results[k]);
  Object.keys(ghostShifts).forEach(k => delete ghostShifts[k]);
  activeIdx = 0;
  // Load from wellMarkers if available
  if(_newOrigin && wellMarkers[_newOrigin] && wellMarkers[_newOrigin].length) {
    wellMarkers[_newOrigin].forEach(function(m) {
      // Opción A: use depth from accumulatedResults if this well was a DESTINO
      var bestDepth = m.depth;
      Object.keys(accumulatedResults).forEach(function(prevOrigen) {
        if(prevOrigen === _newOrigin) return;
        var acc = getAcc(prevOrigen, m.name, _newOrigin);
        if(acc && acc.md && !isNaN(acc.md)) {
          bestDepth = acc.md;
        }
      });
      markers.push({name:m.name, depth:bestDepth, win:m.win||50, sNeg:m.sNeg||150, sPos:m.sPos||150});
    });
  } else if(_newOrigin) {
    // Recover markers from accumulatedResults where _newOrigin appears as DESTINO
    var recovered = {};
    Object.keys(accumulatedResults).forEach(function(origWell) {
      if(origWell === _newOrigin) return;
      Object.keys(accumulatedResults[origWell]).forEach(function(mn) {
        if(accumulatedResults[origWell][mn] && accumulatedResults[origWell][mn][_newOrigin]) {
          recovered[mn] = accumulatedResults[origWell][mn][_newOrigin].md;
        }
      });
    });
    // Also check if _newOrigin was itself ORIGEN
    if(accumulatedResults[_newOrigin]) {
      Object.keys(accumulatedResults[_newOrigin]).forEach(function(mn) {
        if(!recovered[mn]) {
          var dests = accumulatedResults[_newOrigin][mn];
          var firstDest = Object.keys(dests)[0];
          if(firstDest) recovered[mn] = dests[firstDest].md;
        }
      });
    }
    var recParams = typeof getGlobalParams==='function' ? getGlobalParams() : {win:50,sNeg:150,sPos:150};
    Object.entries(recovered).forEach(function(entry) {
      markers.push({name:entry[0], depth:entry[1], win:recParams.win, sNeg:recParams.sNeg, sPos:recParams.sPos});
    });
    if(markers.length) wellMarkers[_newOrigin] = markers.map(function(m){ return Object.assign({},m); });
  }
  // If recovered markers exist and DESTINO is set, restore results from accumulatedResults
  const _destWell = document.getElementById('wellSelectRight')?.value || '';
  if(_destWell && _destWell !== _newOrigin && markers.length) {
    markers.forEach(function(m, i) {
      var found = null;
      // 1. Direct: _newOrigin -> _destWell
      if(accumulatedResults[_newOrigin] && accumulatedResults[_newOrigin][m.name] && accumulatedResults[_newOrigin][m.name][_destWell])
        found = accumulatedResults[_newOrigin][m.name][_destWell];
      // 2. Via common origin: find any orig that has both _newOrigin and _destWell as destinos
      if(!found) {
        Object.keys(accumulatedResults).forEach(function(origWell) {
          if(found) return;
          var acc = accumulatedResults[origWell];
          if(acc[m.name] && acc[m.name][_destWell]) {
            found = acc[m.name][_destWell];
          }
        });
      }
      if(found) {
        results[i] = {bestDepth: found.md, bestCC: found.cc, localPeaks:[], peakIdx:0};
      }
    });
  }
  renderMarkerBody(); renderResultsBar(); renderMarkerTabs();
  renderAll();
  setTimeout(function(){ updateCorrelCurveSelect(); updateCorrelCurve2Select(); }, 100);
  // Always open and update map when wells change, bring to front
  if(typeof WM!=='undefined' && WM.windows && WM.windows['mapa']) {
    if(WM.windows['mapa'].state === 'closed') WM.open('mapa');
    else { setTimeout(()=>{ _mapInitialized=false; _mapCanvas=null; _mapCtx=null; initMap(); updateMap(); setupMapClick(); }, 150); }
    if(typeof WM !== 'undefined') WM.focus('mapa');
  }
}

function getCurvePreset(name) {
  const upper = name.toUpperCase();
  if(CURVE_PRESETS[upper]) return CURVE_PRESETS[upper];
  // Fuzzy match
  for(const key of Object.keys(CURVE_PRESETS)) {
    if(upper.startsWith(key) || key.startsWith(upper)) return CURVE_PRESETS[key];
  }
  return null;
}

function makeDefaultTracks(wellName) {
  const w = loadedWells[wellName];
  if (!w || !w.curves.length) return [
    {curveName:'UNKNOWN', scaleMin:null, scaleMax:null, isLog:false, isCorrel:true, color:'#94a3b8', auto:true}
  ];

  const curves = w.curves.map(c => c.name);

  // Find best SP and RES curves
  const isSP  = n => /^SP$|^SP_|SPON|GR$|^GR_|GAMMA/i.test(n);
  const isRES = n => /M2RX|M2R9|RT\b|ILD|LLD|RDEEP|RESD|RES\b/i.test(n);

  const spCurve  = curves.find(isSP)  || curves[0];
  const resCurve = curves.find(isRES) || (curves.length > 1 ? curves[1] : null);

  const tracks = [];
  // Track 1: SP (auto scale, green)
  const spPreset = getCurvePreset(spCurve) || {};
  tracks.push({
    curveName: spCurve,
    scaleMin: null, scaleMax: null,  // auto
    isLog: false,
    isCorrel: !resCurve,
    color: spPreset.color || '#ef4444',
    auto: true
  });

  // Track 2: Resistivity (auto scale, red, log)
  if(resCurve) {
    const resPreset = getCurvePreset(resCurve) || {};
    tracks.push({
      curveName: resCurve,
      scaleMin: null, scaleMax: null,  // auto
      isLog: true,
      isCorrel: true,
      color: resPreset.color || '#f97316',
      auto: true
    });
  }

  return tracks;
}

function setupDropZone() {

  if (!zone) return;
  zone.addEventListener('dragenter', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', e => { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);

  document.addEventListener('dragover', e => e.preventDefault());

    loadFiles(e.dataTransfer.files);
  });
}

function updateMarkerDepthFromTable(i, val) {

// ── Sync results to accumulatedResults ────────────────────────────────────
function syncAccumulatedResult(i) {
  if (!results[i]) return;
  const wells = Object.keys(wellState);
  const wL = wells[0]||'', wR = wells[1]||'';
  if (!wR || wR === wL) return;
  const wR_data = loadedWells[wR];
  const getN = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
  const elevR = wR_data ? getN(wR_data.meta && wR_data.meta.ELEV) : 0;
  if (!accumulatedResults[i]) accumulatedResults[i] = {};
  const mName_s = markers[i] ? markers[i].name : ('M'+i);
  const prev_s = getAcc(wL, mName_s, wR) || {};
  const newDepth_s = results[i].bestDepth;
  setAcc(wL, mName_s, wR, {
    md: newDepth_s, tvdss: elevR - newDepth_s,
    x:  wR_data ? getN(wR_data.meta && wR_data.meta.XCOORD) : '',
    y:  wR_data ? getN(wR_data.meta && wR_data.meta.YCOORD) : '',
    elev: elevR, cc: results[i].bestCC,
    validated: prev_s.validated || false,
    notes: prev_s.notes || ''
  });

  // ── Sync to wellMarkers[wR] so wR can act as ORIGEN in future correlations ──
  if(!wellMarkers[wR]) wellMarkers[wR] = [];
  var wmR = wellMarkers[wR].find(function(m){ return m.name === mName_s; });
  if(wmR) {
    wmR.depth = newDepth_s;
  } else {
    var srcM = wellMarkers[wL] && wellMarkers[wL].find(function(m){ return m.name === mName_s; });
    wellMarkers[wR].push({
      name: mName_s, depth: newDepth_s,
      win:  srcM ? srcM.win  : markers[i] ? markers[i].win  : 50,
      sNeg: srcM ? srcM.sNeg : markers[i] ? markers[i].sNeg : 150,
      sPos: srcM ? srcM.sPos : markers[i] ? markers[i].sPos : 150,
      notes: ''
    });
  }
}
function updateDestDepthFromTable(i, val) {

}

// ── Export ────────────────────────────────────────────────────────────────
function exportMarkersCSV(selectedKeys) {
  var esc = function(s){ return '"'+String(s||'').replace(/"/g,'""')+'"'; };
  var getN = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };

  var csvRows = ['Pozo,Marker,MD (m),TVDSS (m),X,Y,Cota (m),CC,Validado,Notas'];

  // Build same flat list as renderMarkerDataTable
  var allWells = new Set([...Object.keys(loadedWells), ...Object.keys(wellMarkers)]);
  var exportRows = [];

  allWells.forEach(function(wellName) {
    var wData = loadedWells[wellName];
    var elev   = wData ? getN(wData.meta && wData.meta.ELEV)   : (_wellCoords[wellName]&&_wellCoords[wellName].elev||0);
    var xCoord = wData ? getN(wData.meta && wData.meta.XCOORD) : (_wellCoords[wellName]&&_wellCoords[wellName].x||'');
    var yCoord = wData ? getN(wData.meta && wData.meta.YCOORD) : (_wellCoords[wellName]&&_wellCoords[wellName].y||'');
    var wms = wellMarkers[wellName] || [];

    if(wms.length === 0) return; // skip wells without markers

    wms.forEach(function(m) {
      var rowkey = wellName+'|'+m.name;
      // Filter by selection if provided
      if(selectedKeys && selectedKeys.size > 0 && !selectedKeys.has(rowkey)) return;

      var bestCC = null, validated = false, notes = '';
      Object.keys(accumulatedResults).forEach(function(orig) {
        var acc = getAcc(orig, m.name, wellName);
        if(acc) {
          if(acc.cc !== undefined) bestCC = acc.cc;
          if(acc.validated) validated = true;
          if(acc.notes) notes = acc.notes;
        }
      });
      if(m.notes) notes = m.notes;
      var md = m.depth;
      var tvdss = elev && md ? elev - md : null;

      exportRows.push({
        wellName: wellName, markerName: m.name, md: md, tvdss: tvdss,
        x: xCoord, y: yCoord, elev: elev, cc: bestCC, validated: validated, notes: notes
      });
    });
  });

  // Sort same as table: by marker then well
  exportRows.sort(function(a,b){
    if(a.markerName < b.markerName) return -1;
    if(a.markerName > b.markerName) return 1;
    if(a.wellName < b.wellName) return -1;
    if(a.wellName > b.wellName) return 1;
    return 0;
  });

  exportRows.forEach(function(r) {
    csvRows.push([
      esc(r.wellName), esc(r.markerName),
      r.md !== null ? r.md.toFixed(2) : '',
      r.tvdss !== null ? r.tvdss.toFixed(2) : '',
      r.x ? Number(r.x).toFixed(0) : '',
      r.y ? Number(r.y).toFixed(0) : '',
      r.elev ? r.elev.toFixed(2) : '',
      r.cc !== null ? r.cc.toFixed(4) : '',
      r.validated ? 'SI' : 'NO',
      esc(r.notes)
    ].join(','));
  });

  var blob = new Blob([csvRows.join('\n')], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'correlacion_markers.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function handleCSVImport(input) {

  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {

    if (lines.length < 2) { alert('CSV vacío o inválido.'); return; }
    const header = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const nameIdx  = header.findIndex(h=>h.includes('nombre')||h.includes('name'));
    const origIdx  = header.findIndex(h=>h.includes('origen')||h.includes('origin')||h.includes('lm-728')||h.includes('left'));
    const destIdx  = header.findIndex(h=>h.includes('destino')||h.includes('dest')||h.includes('lm-729')||h.includes('right'));
    const noteIdx  = header.findIndex(h=>h.includes('nota')||h.includes('note')||h.includes('comment'));
    if (origIdx < 0) { alert('No se encontró columna de profundidad ORIGEN en el CSV.'); return; }
    const {win,sNeg,sPos} = getGlobalParams();
    let added = 0;
    lines.slice(1).forEach((line, li) => {
      const cols = line.split(',');
      const dOrig = parseFloat(cols[origIdx]);
      if (isNaN(dOrig)) return;
      const name = nameIdx>=0 && cols[nameIdx]?.trim() ? cols[nameIdx].trim() : 'M'+(markers.length+1);
      markers.push({depth: dOrig, name, win, sNeg, sPos});
      const idx = markers.length - 1;
      if (destIdx >= 0) {
        const dDest = parseFloat(cols[destIdx]);
        if (!isNaN(dDest)) {
          // Create a manual result (no CC curve)
          results[idx] = {bestDepth: dDest, bestCC: 0, depths729: [], ccVals: [], localPeaks: [], peakIdx: 0};
        }
      }
      if (noteIdx >= 0 && cols[noteIdx]?.trim()) markerNotes[idx] = cols[noteIdx].trim();
      added++;
    });
    renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderCorrelTable(); renderAll();
    alert(added + ' marker(s) importados.');
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Role headers ───────────────────────────────────────────────────────────
function updateRoleHeaders() {
  const wells = Object.keys(wellState);
  const wL = wells[0]||'—', wR = wells[1]||'—';

  // Well names
  const tL = document.getElementById('wellTitleLeft');
  const tR = document.getElementById('wellTitleRight');
  if(tL) tL.textContent = wL;
  if(tR) tR.textContent = wR;
  const lL = document.getElementById('trackLabelLeft');
  const lR = document.getElementById('trackLabelRight');
  if(lL) lL.textContent = wL;
  if(lR) lR.textContent = wR;

  // Diferencia de espesor (destino vs origen) en header DESTINO
  const destEl = document.getElementById('destShiftInfo');
  if(destEl) {
    if(results[activeIdx]) {
      const activeDeptDest = results[activeIdx].bestDepth;
      const activeDeptOrig = markers[activeIdx].depth;
      // Sorted by depth for both wells
      const destDepths = markers.map(function(m,i){
        return {name:m.name, depthD:results[i]?results[i].bestDepth:null, depthO:m.depth, idx:i};
      }).filter(function(d){return d.depthD!==null;})
        .sort(function(a,b){return a.depthD-b.depthD;});
      const activePos = destDepths.findIndex(function(d){return d.idx===activeIdx;});
      const parts = [];
      if(activePos > 0) {
        const upper = destDepths[activePos-1];
        // Espesor en destino vs espesor en origen
        const espDest = activeDeptDest - upper.depthD;
        const espOrig = activeDeptOrig - upper.depthO;
        const diff = espDest - espOrig;
        const sign = diff >= 0 ? '+' : '';
        parts.push('↑'+upper.name+': '+sign+diff.toFixed(1)+'m');
      }
      if(activePos >= 0 && activePos < destDepths.length-1) {
        const lower = destDepths[activePos+1];
        const espDest = lower.depthD - activeDeptDest;
        const espOrig = lower.depthO - activeDeptOrig;
        const diff = espDest - espOrig;
        const sign = diff >= 0 ? '+' : '';
        parts.push('↓'+lower.name+': '+sign+diff.toFixed(1)+'m');
      }
      destEl.textContent = parts.length > 0 ? parts.join('  |  ') : '';
    } else {
      destEl.textContent = '';
    }
  }

  // Origin: marker count
  const origEl = document.getElementById('originShiftInfo');
  if(origEl){
    origEl.textContent = markers.length
      ? markers.length+' marker'+(markers.length>1?'s':'')
      : '';
  }
}

  delete loadedWells[name];

  delete _wellCoords[name];

  Object.keys(_wellCoords).forEach(function(k){

// ── Depth mode helpers ────────────────────────────────────────────────────
function getDepthMode() {
  const el = document.querySelector('input[name="depthMode"]:checked');
  return el ? el.value : 'md';
}

function getElev(wellName) {
  const w = loadedWells[wellName];
  if (!w || !w.meta) return 0;
  const raw = w.meta.ELEV || w.meta.KB || w.meta.GL || '0';
  // parseLastNum: take last numeric token
  const tokens = String(raw).split(/\s+/).filter(Boolean);
  for (let i=tokens.length-1; i>=0; i--) {
    const v = parseFloat(tokens[i]);
    if (!isNaN(v)) return v;
  }
  return 0;
}

function mdToDisplay(md, wellName) {
  if (getDepthMode() === 'tvdss') {
    const elev = getElev(wellName);
    return elev - md;  // positive above sea level, negative below
  }
  return md;
}

function displayToMd(display, wellName) {
  if (getDepthMode() === 'tvdss') {
    const elev = getElev(wellName);
    return elev - display;
  }
  return display;
}

function depthAxisLabel() {
  return getDepthMode() === 'tvdss' ? 'TVDSS (m)' : 'MD (m)';
}

function buildGrid(){ /* no-op: grid built by onWellSelectionChange */ }

function interpArray(xNew, xOld, yOld){
  const out = new Float64Array(xNew.length);
  for(let k=0; k<xNew.length; k++){
    const x = xNew[k];
    let lo=0, hi=xOld.length-1;
    while(lo<hi-1){ const mid=(lo+hi)>>1; if(xOld[mid]<=x) lo=mid; else hi=mid; }
    if(yOld[lo]==null||yOld[hi]==null){ out[k]=NaN; continue; }
    const t = (xOld[lo]===xOld[hi]) ? 0 : (x-xOld[lo])/(xOld[hi]-xOld[lo]);
    out[k] = yOld[lo] + t*(yOld[hi]-yOld[lo]);
  }
  return out;
}

function interpVal(arr728, d){
  let lo=0, hi=GRID.length-1;
  while(lo<hi-1){ const mid=(lo+hi)>>1; if(GRID[mid]<=d) lo=mid; else hi=mid; }
  const t=(GRID[lo]===GRID[hi])?0:(d-GRID[lo])/(GRID[hi]-GRID[lo]);
  return arr728[lo]+t*(arr728[hi]-arr728[lo]);
}
