// ── Canvas layout ──────────────────────────────────────────────────────────
const PAD = { top:52, bot:20, left:48, right:4 };
const TRACK_W = 160;
const HIT_PX = 8; // pixels tolerance for marker hit detection // px per curve track
const DEPTH_W = 52;  // depth axis track
const CANVAS_H = 560;

function totalCanvasW(nTracks){
  return DEPTH_W + nTracks * TRACK_W + PAD.right;
}

function depthY(d, dMin, dMax){
  return PAD.top + (d-dMin)/(dMax-dMin)*(CANVAS_H-PAD.top-PAD.bot);
}
function depthFromY(y, dMin, dMax){
  return dMin + (y-PAD.top)/(CANVAS_H-PAD.top-PAD.bot)*(dMax-dMin);
}
function scaleX(v, sMin, sMax, isLog, trackLeft){
  if(isLog){
    const lMin=Math.log10(Math.max(sMin,0.001)), lMax=Math.log10(Math.max(sMax,0.001));
    return trackLeft + (Math.log10(Math.max(v,0.001))-lMin)/(lMax-lMin)*TRACK_W;
  } else {
    return trackLeft + (v-sMin)/(sMax-sMin)*TRACK_W;
  }
}

// ── Render a single well canvas ────────────────────────────────────────────
function renderWell(wellName){
  const ws = wellState[wellName];
  const nTracks = ws.tracks.length;
  const W = totalCanvasW(nTracks);
  const wells=Object.keys(wellState);
  const side=wells.indexOf(wellName)===0?'LEFT':'RIGHT';
  const c = document.getElementById('cvs_'+side);
  if(!c) return;
  c.width = W; c.height = CANVAS_H;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,W,CANVAS_H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,CANVAS_H);

  let {dMin,dMax} = ws;
  if(dMin==null||dMax==null){
    const dminG=window._DMIN||0, dmaxG=window._DMAX||9999;
    dMin=dminG; dMax=Math.min(dminG+400,dmaxG);
    ws.dMin=dMin; ws.dMax=dMax;
  }
  const interpW = INTERP[wellName];
  const _ssCb = document.getElementById('chkShowShading');
  const showShading = _ssCb ? _ssCb.checked : true;

  // ── Depth track ──
  drawDepthAxis(ctx, dMin, dMax, 0, DEPTH_W, wellName);

  // ── Curve tracks ──
  ws.tracks.forEach((tr, ti)=>{
    const tLeft = DEPTH_W + ti*TRACK_W;
    const vals = interpW[tr.curveName];
    if(!vals){ drawEmptyTrack(ctx, tLeft, tr); return; }

    // Auto-scale if null
    const autoScale = autoScaleCurve(vals, tr.isLog);
    const sMin = tr.scaleMin ?? autoScale.min;
    const sMax = tr.scaleMax ?? autoScale.max;

    // Background
    ctx.fillStyle = tr.isCorrel ? 'rgba(99,102,241,0.04)' : '#fafafa';
    ctx.fillRect(tLeft, PAD.top, TRACK_W, CANVAS_H-PAD.top-PAD.bot);

    // Track border
    ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=0.5;
    ctx.strokeRect(tLeft, 0, TRACK_W, CANVAS_H);

    // Header
    drawTrackHeader(ctx, tr, ti, tLeft, sMin, sMax, wellName);

    // Vertical grid lines
    drawTrackGrid(ctx, sMin, sMax, tr.isLog, tLeft, dMin, dMax);

    // Depth grid lines
    const ds = depthStep(dMax-dMin);
    ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=0.5;
    for(let d=Math.ceil(dMin/ds)*ds; d<=dMax; d+=ds){
      const y=depthY(d,dMin,dMax);
      ctx.beginPath(); ctx.moveTo(tLeft,y); ctx.lineTo(tLeft+TRACK_W,y); ctx.stroke();
    }

     // Shaded window for correl markers — active=solid, others=faint
    // Determine if this is ORIGEN (left) or DESTINO (right) panel
    const _selL = document.getElementById('wellSelectLeft');
    const _selR = document.getElementById('wellSelectRight');
    const _originWell = _selL ? _selL.value : Object.keys(wellState)[0];
    if(showShading){
      const wells_ = Object.keys(wellState);
      const isLeft_ = wellName === _originWell;
      markers.forEach((m, mi) => {
        const r = results[mi];
        const isActive = mi === activeIdx;
        if(!isActive) return; // only shade active marker
        const alpha = '44';
        if(isLeft_){
          // ORIGEN: correlation window ±win
          const yT = depthY(Math.max(dMin, m.depth - m.win), dMin, dMax);
          const yB = depthY(Math.min(dMax, m.depth + m.win), dMin, dMax);
          ctx.fillStyle = col(mi) + alpha;
          ctx.fillRect(tLeft, yT, TRACK_W, yB-yT);
          if(isActive){
            ctx.strokeStyle = col(mi)+'70'; ctx.lineWidth=1;
            ctx.setLineDash([3,2]);
            ctx.strokeRect(tLeft, yT, TRACK_W, yB-yT);
            ctx.setLineDash([]);
            // Label: ±win value
            ctx.save();
            ctx.font = 'bold 9px system-ui';
            ctx.fillStyle = col(mi);
            ctx.textAlign = 'left';
            // Top label: -win
            if(yT > PAD.top + 2) {
              ctx.fillText('-' + m.win + 'm', tLeft+3, yT+10);
            }
            // Bottom label: +win
            if(yB < CANVAS_H - PAD.bot - 2) {
              ctx.fillText('+' + m.win + 'm', tLeft+3, yB-3);
            }
            ctx.restore();
          }
        } else {
          // DESTINO: search range centered on ORIGIN marker depth (where the algorithm searched)
          const yT = depthY(Math.max(dMin, m.depth - m.sNeg - m.win), dMin, dMax);
          const yB = depthY(Math.min(dMax, m.depth + m.sPos + m.win), dMin, dMax);
          ctx.fillStyle = col(mi) + alpha;
          ctx.fillRect(tLeft, yT, TRACK_W, yB-yT);
          if(isActive){
            ctx.strokeStyle = col(mi)+'70'; ctx.lineWidth=1;
            ctx.setLineDash([3,2]);
            ctx.strokeRect(tLeft, yT, TRACK_W, yB-yT);
            ctx.setLineDash([]);
            // Labels: search range
            ctx.save();
            ctx.font = 'bold 9px system-ui';
            ctx.fillStyle = col(mi);
            ctx.textAlign = 'left';
            if(yT > PAD.top + 2) {
              ctx.fillText('-' + (m.sNeg+m.win) + 'm', tLeft+3, yT+10);
            }
            if(yB < CANVAS_H - PAD.bot - 2) {
              ctx.fillText('+' + (m.sPos+m.win) + 'm', tLeft+3, yB-3);
            }
            ctx.restore();
          }
        }
      });
    }

    // Curve
    ctx.beginPath(); ctx.strokeStyle=tr.color||trackColor(tr,ti); ctx.lineWidth=1.4;
    let i0c = Math.max(0, GRID.findIndex(d=>d>=dMin)-1);
    let i1c = GRID.findIndex(d=>d>dMax); if(i1c<0) i1c=GRID.length;
    let firstC=true;
    for(let i=i0c;i<i1c;i++){
      const v=vals[i]; if(isNaN(v)||v==null){firstC=true;continue;}
      const x=scaleX(v,sMin,sMax,tr.isLog,tLeft);
      const y=depthY(GRID[i],dMin,dMax);
      if(firstC){ctx.moveTo(x,y);firstC=false;}else ctx.lineTo(x,y);
    }
    ctx.stroke();

    // Ghost (only on DESTINO, only for correl track)
    const wells_g=Object.keys(wellState);
    if(wells_g.indexOf(wellName)===1 && document.getElementById('chkGhost')?.checked){
      // Draw ghost for each DESTINO track using matching ORIGEN track
      console.log('[Ghost] drawing track', tr.curveName, 'for well', wellName);
      drawGhost(ctx, tr, tLeft, sMin, sMax, dMin, dMax);
    }

    // Marker lines
    drawMarkerLines(ctx, wellName, tLeft, dMin, dMax);
    drawReviewMarker(ctx, wellName, tLeft, dMin, dMax);
    // Draw provisional markers if in cross-val mode — show in DESTINO panel
    if(crossValActive && Object.keys(provisionalMarkers).length) {
      const wells_pv=Object.keys(wellState);
      if(wells_pv.indexOf(wellName)===1) { // only on DESTINO panel
        ctx.save();
        ctx.strokeStyle='#7c3aed'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
        Object.values(provisionalMarkers).forEach(function(pm){
          const y=depthY(pm.depth,dMin,dMax);
          ctx.beginPath(); ctx.moveTo(tLeft,y); ctx.lineTo(tLeft+TRACK_W,y); ctx.stroke();
          ctx.fillStyle='#7c3aed'; ctx.font='bold 9px system-ui'; ctx.textAlign='left';
          ctx.fillText('◆'+pm.name,tLeft+3,y-3);
        });
        ctx.restore();
      }
    }

  });  // end tracks.forEach
}  // end renderWell

function drawDepthAxis(ctx, dMin, dMax, x0, w, wellName){
  ctx.fillStyle='#f8fafc'; ctx.fillRect(x0,0,w,CANVAS_H);
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=0.5; ctx.strokeRect(x0,0,w,CANVAS_H);
  const mode = getDepthMode();
  const lbl1 = mode==='tvdss' ? 'TVDSS' : 'DEPTH';
  const lbl2 = mode==='tvdss' ? '(m bsl)' : '(m)';
  ctx.fillStyle='#475569'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
  ctx.fillText(lbl1, x0+w/2, 14);
  ctx.fillStyle='#94a3b8'; ctx.font='8px system-ui';
  ctx.fillText(lbl2, x0+w/2, 24);
  ctx.fillStyle='#c7d2fe'; ctx.font='8px system-ui'; ctx.fillText('⇕ pan', x0+w/2, 34);
  const ds=depthStep(dMax-dMin);
  ctx.fillStyle='#374151'; ctx.textAlign='right'; ctx.font='10px system-ui';
  for(let d=Math.ceil(dMin/ds)*ds; d<=dMax; d+=ds){
    const y=depthY(d,dMin,dMax);
    const dispVal = mdToDisplay(d, wellName);
    ctx.fillText(dispVal.toFixed(0), x0+w-3, y+3);
    ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x0+w,y); ctx.stroke();
  }
}

function drawTrackHeader(ctx, tr, ti, tLeft, sMin, sMax, wellName){
  const trackCol = tr.color || trackColor(tr, ti);
  
  // Background
  ctx.fillStyle='#f8fafc';
  ctx.fillRect(tLeft, 0, TRACK_W, PAD.top);
  
  // Color bar at top
  ctx.fillStyle = trackCol;
  ctx.fillRect(tLeft, 0, TRACK_W, 4);
  
  // Correl indicator
  if(tr.isCorrel){
    ctx.fillStyle='rgba(99,102,241,0.12)';
    ctx.fillRect(tLeft, 4, TRACK_W, PAD.top-4);
  }
  
  // Curve name
  ctx.fillStyle = trackCol;
  ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(tr.curveName, tLeft + TRACK_W/2, 18);
  
  // Scale min | max
  if(sMin !== undefined && sMax !== undefined && sMin !== null && sMax !== null) {
    ctx.fillStyle = '#64748b';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(tr.isLog ? sMin.toExponential(0) : sMin.toFixed(1), tLeft+3, 30);
    ctx.textAlign = 'right';
    ctx.fillText(tr.isLog ? sMax.toExponential(0) : sMax.toFixed(1), tLeft+TRACK_W-3, 30);
    // Scale type indicator
    ctx.textAlign = 'center';
    ctx.fillStyle = tr.isLog ? '#f97316' : '#94a3b8';
    ctx.fillText(tr.isLog ? 'LOG' : 'LIN', tLeft+TRACK_W/2, 30);
  }
  
  // Correl star
  if(tr.isCorrel){
    ctx.fillStyle='#6366f1'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
    ctx.fillText('★ CORREL', tLeft+TRACK_W/2, 42);
  }
  
  // Border
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=0.5;
  ctx.strokeRect(tLeft, 0, TRACK_W, PAD.top);
}

function drawTrackGrid(ctx, sMin, sMax, isLog, tLeft, dMin, dMax){
  const H = CANVAS_H-PAD.top-PAD.bot;
  if(isLog){
    const lMin=Math.log10(Math.max(sMin,0.001)), lMax=Math.log10(Math.max(sMax,0.001));
    [0.001,0.01,0.1,1,2,5,10,20,50,100,200,500,1000,2000,5000].forEach(v=>{
      const lv=Math.log10(v);
      if(lv<lMin||lv>lMax) return;
      const x=tLeft+(lv-lMin)/(lMax-lMin)*TRACK_W;
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,PAD.top+H); ctx.stroke();
      ctx.fillStyle='#94a3b8'; ctx.font='8px system-ui'; ctx.textAlign='center';
      ctx.fillText(v<1?v:v>=1000?v/1000+'k':v, x, PAD.top+H+12);
    });
  } else {
    const range=sMax-sMin, rawStep=range/5;
    const mag=Math.pow(10,Math.floor(Math.log10(Math.abs(rawStep)||1)));
    const niceStep=Math.ceil(rawStep/mag)*mag||1;
    for(let v=Math.ceil(sMin/niceStep)*niceStep; v<=sMax+niceStep*0.01; v+=niceStep){
      const x=tLeft+(v-sMin)/(sMax-sMin)*TRACK_W;
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,PAD.top+H); ctx.stroke();
      ctx.fillStyle='#94a3b8'; ctx.font='8px system-ui'; ctx.textAlign='center';
      ctx.fillText(v.toFixed(Math.abs(v)<10?1:0), x, PAD.top+H+12);
    }
  }
}

function drawEmptyTrack(ctx, tLeft, tr){
  ctx.fillStyle='#f8fafc'; ctx.fillRect(tLeft,0,TRACK_W,CANVAS_H);
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=0.5; ctx.strokeRect(tLeft,0,TRACK_W,CANVAS_H);
  ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='center';
  ctx.fillText('Sin datos', tLeft+TRACK_W/2, CANVAS_H/2);
}

function drawGhost(ctx, tr, tLeft, sMin, sMax, dMin, dMax){
  const ghostCol = document.getElementById('ghostColor')?.value||'#000000';
  const ghostOp  = (parseInt(document.getElementById('ghostOpacity')?.value||50))/100;
  const wells=Object.keys(wellState);
  const srcWell=wells[0]; // left/reference well
  const srcWs = wellState[srcWell];

  // Find matching ORIGEN track for this DESTINO track (same curve group)
  const destGroup = detectCurveGroup(tr.curveName, '');
  let srcCurve = null;
  if(srcWs && srcWs.tracks) {
    // First try: same curve name
    const exactMatch = srcWs.tracks.find(t => t.curveName === tr.curveName);
    if(exactMatch) srcCurve = exactMatch.curveName;
    // Second try: same group
    if(!srcCurve && destGroup) {
      const groupMatch = srcWs.tracks.find(t => detectCurveGroup(t.curveName,'') === destGroup);
      if(groupMatch) srcCurve = groupMatch.curveName;
    }
    // Fallback: correl curve
    if(!srcCurve) {
      const correlTrack = srcWs.tracks.find(t => t.isCorrel);
      if(correlTrack) srcCurve = correlTrack.curveName;
    }
  }
  if(!srcCurve) srcCurve = getCorrelCurve(srcWell) || tr.curveName;

  const arr728 = INTERP[srcWell]?.[srcCurve];
  if(!arr728) return;
  // Draw ghost only for the active marker
  const r = results[activeIdx];
  if(!r) return;
  const shift = r.bestDepth - markers[activeIdx].depth + (ghostShifts[activeIdx]||0);
  ctx.save();
  ctx.globalAlpha=ghostOp;
  ctx.strokeStyle=ghostCol; ctx.lineWidth=1.2;
  ctx.beginPath();
  let i0=Math.max(0,GRID.findIndex(d=>d>=dMin)-1);
  let i1=GRID.findIndex(d=>d>dMax); if(i1<0) i1=GRID.length;
  let first=true;
  for(let j=i0;j<i1;j++){
    const d729=GRID[j], d728=d729-shift;
    if(d728<DMIN||d728>DMAX){first=true;continue;}
    const v=interpVal(arr728, d728);
    if(isNaN(v)){first=true;continue;}
    const x=scaleX(v,sMin,sMax,tr.isLog,tLeft);
    const y=depthY(d729,dMin,dMax);
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawMarkerLines(ctx, wellName, tLeft, dMin, dMax){
  const wells__=Object.keys(wellState);
  const isLeft__=wells__.indexOf(wellName)===0;

  // Build marker list for this well
  var mlist = [];

  if(isLeft__) {
    // ORIGEN: use current markers[]
    mlist = markers.map(function(m,i){ return {...m, idx:i, fromResult:false}; });
  } else {
    // DESTINO: use correlation results
    var fromResults = markers.map(function(m,i){
      return results[i] ? {...m, depth:results[i].bestDepth, idx:i, fromResult:true} : null;
    }).filter(Boolean);

    // Also add markers from wellMarkers[wellName] if they exist
    var fromImport = [];
    if(wellMarkers[wellName] && wellMarkers[wellName].length) {
      wellMarkers[wellName].forEach(function(wm, wi) {
        // Find matching marker index by name
        var mi = markers.findIndex(function(m){ return m.name === wm.name; });
        var alreadyInResults = fromResults.some(function(r){ return r.name === wm.name; });
        if(!alreadyInResults) {
          fromImport.push({...wm, idx: mi >= 0 ? mi : wi, fromResult:false});
        }
      });
    }
    mlist = fromResults.concat(fromImport);
  }

  mlist.forEach(function(m){
    if(m.depth<dMin||m.depth>dMax) return;
    const y=depthY(m.depth,dMin,dMax);
    const isActive = m.idx===activeIdx;
    ctx.strokeStyle=col(m.idx);
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(tLeft,y); ctx.lineTo(tLeft+TRACK_W,y); ctx.stroke();
    ctx.setLineDash([]);
    // Label
    ctx.fillStyle=col(m.idx);
    ctx.font = isActive ? 'bold 10px system-ui' : '9px system-ui';
    ctx.textAlign='left';
    const dispD = mdToDisplay(m.depth, wellName);
    ctx.fillText(m.name+' '+dispD.toFixed(1)+'m', tLeft+3, y-3);
  });
}

function trackColor(tr, ti){
  if(tr && tr.color) return tr.color;
  const TRACK_COLORS=['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4','#ec4899','#84cc16'];
  return TRACK_COLORS[ti % TRACK_COLORS.length];
}

function autoScaleCurve(vals, isLog){
  let min=Infinity, max=-Infinity;
  for(let i=0;i<vals.length;i++){
    const v=vals[i];
    if(isNaN(v)||v==null) continue;
    if(isLog&&v<=0) continue;
    if(v<min) min=v; if(v>max) max=v;
  }
  if(isLog){ min=Math.max(min,0.1); max=Math.max(max,min*10); }
  return {min,max};
}

function depthStep(range){
  if(range<=50) return 5;
  if(range<=100) return 10;
  if(range<=200) return 20;
  if(range<=500) return 50;
  if(range<=1000) return 100;
  return 200;
}

// ── Render both wells ──────────────────────────────────────────────────────
function renderAll(){
  const wells = Object.keys(wellState);
  wells.forEach(wn => renderWell(wn));
  renderTrackControls();
  updateRoleHeaders();
  // Update table if visible
  renderMarkerDataTable(); // always keep table in sync
  // Re-render map if window is open
  if(_mapInitialized && WM.windows['mapa'] && WM.windows['mapa'].state !== 'closed') renderMap();

  const ndEl=document.getElementById('newDepth'); if(ndEl) ndEl.placeholder=getDepthMode()==='tvdss'?'TVDSS (m)':'MD (m)';
  // Persist current markers to wellMarkers
  const _origWell = document.getElementById('wellSelectLeft')?.value || '';
  if(_origWell && markers.length) wellMarkers[_origWell] = markers.map(function(m){return Object.assign({},m);});}

function setTrackColor(wn, ti, color) {

function setTrackCurve(wn, ti, curveName) {
  if(wellState[wn]?.tracks?.[ti]) {
    wellState[wn].tracks[ti].curveName = curveName;

    const preset = getCurvePreset(curveName);
    if(preset) {
      if(wellState[wn].tracks[ti].scaleMin === null) wellState[wn].tracks[ti].scaleMin = preset.scaleMin;
      if(wellState[wn].tracks[ti].scaleMax === null) wellState[wn].tracks[ti].scaleMax = preset.scaleMax;
      wellState[wn].tracks[ti].isLog = preset.isLog;
      wellState[wn].tracks[ti].color = preset.color;
    }
    renderAll(); renderTrackControls();

}
function renderTrackControls(){
  Object.keys(wellState).forEach(function(wn){
    const wells2 = Object.keys(wellState);
    const side2  = wells2.indexOf(wn) === 0 ? 'LEFT' : 'RIGHT';
    const el  = document.getElementById('trackCtrl_' + side2);
    const lbl = document.getElementById('trackLabel' + (side2==='LEFT'?'Left':'Right'));

    const ws = wellState[wn];
    if(!ws) return;

    const availCurves = loadedWells[wn] ? loadedWells[wn].curves.map(function(c){return c.name;}) : [];
    const activeCurves = ws.tracks.map(function(t){return t.curveName;});

    // Clear and rebuild
    while(el.firstChild) el.removeChild(el.firstChild);

    availCurves.forEach(function(curveName) {
      const isActive = activeCurves.includes(curveName);
      const preset   = getCurvePreset(curveName) || {};
      const trackIdx = ws.tracks.findIndex(function(t){return t.curveName===curveName;});
      const tr       = isActive ? ws.tracks[trackIdx] : null;
      const color    = tr ? tr.color : (preset.color || '#94a3b8');

      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:4px;margin-bottom:2px;background:' + (isActive ? '#1e3a5f' : 'transparent');

      // Checkbox

      cb.type = 'checkbox';
      cb.checked = isActive;
      cb.style.cssText = 'width:14px;height:14px;accent-color:'+color+';cursor:pointer;flex-shrink:0';
      cb.addEventListener('change', function(e) {
        e.stopPropagation();

            cb.checked = false;
            alert('Máximo ' + MAX_TRACKS + ' curvas. Destildá una primero.');
            return;
          }
          // Use CURVE_GROUPS color first, then preset, then fallback
          var grp = detectCurveGroup(curveName, '');
          var grpColor = grp && CURVE_GROUPS[grp] ? CURVE_GROUPS[grp].color : null;
          var p = getCurvePreset(curveName) || {};
          var trackColor_ = grpColor || p.color || '#94a3b8';
          ws.tracks.push({curveName:curveName, scaleMin:null, scaleMax:null, isLog:!!p.isLog, isCorrel:false, color:trackColor_, auto:true});
        } else {
          ws.tracks.splice(trackIdx, 1);
        }
        renderAll(); renderTrackControls();
      });

      // Color dot
      var dot = document.createElement('span');
      dot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:'+color+';flex-shrink:0';

      // Curve name
      var name = document.createElement('span');

      name.style.cssText = 'font-size:12px;font-weight:' + (isActive?'700':'400') + ';color:' + (isActive?'#e2e8f0':'#64748b') + ';flex:1';

      row.appendChild(cb);
      row.appendChild(dot);

      // If active: show scale inputs and LOG toggle inline

        minLbl.style.cssText = 'font-size:9px;color:#94a3b8';

        minInput.type = 'number';
        minInput.placeholder = 'auto';
        minInput.step = 'any';
        minInput.value = tr.scaleMin !== null && tr.scaleMin !== undefined ? tr.scaleMin : '';
        minInput.style.cssText = 'width:50px;font-size:10px;padding:1px 3px;border:1px solid #475569;border-radius:3px;background:#0f172a;color:#e2e8f0';
        minInput.addEventListener('change', function(e){
          e.stopPropagation();
          ws.tracks[trackIdx].scaleMin = minInput.value === '' ? null : parseFloat(minInput.value);
          ws.tracks[trackIdx].auto = false;
          renderAll();
        });

        // Max input
        var maxLbl = document.createElement('span');
        maxLbl.textContent = 'Max';
        maxLbl.style.cssText = 'font-size:9px;color:#94a3b8';
        var maxInput = document.createElement('input');
        maxInput.type = 'number';
        maxInput.placeholder = 'auto';
        maxInput.step = 'any';
        maxInput.value = tr.scaleMax !== null && tr.scaleMax !== undefined ? tr.scaleMax : '';
        maxInput.style.cssText = 'width:50px;font-size:10px;padding:1px 3px;border:1px solid #475569;border-radius:3px;background:#0f172a;color:#e2e8f0';
        maxInput.addEventListener('change', function(e){
          e.stopPropagation();
          ws.tracks[trackIdx].scaleMax = maxInput.value === '' ? null : parseFloat(maxInput.value);
          ws.tracks[trackIdx].auto = false;
          renderAll();
        });

        // LOG toggle
        var logLbl = document.createElement('label');
        logLbl.style.cssText = 'display:flex;align-items:center;gap:2px;font-size:9px;color:#f97316;cursor:pointer;flex-shrink:0';
        var logCb = document.createElement('input');
        logCb.type = 'checkbox';
        logCb.checked = !!tr.isLog;
        logCb.style.cssText = 'width:11px;height:11px;accent-color:#f97316';
        logCb.addEventListener('change', function(e){
          e.stopPropagation();
          ws.tracks[trackIdx].isLog = logCb.checked;
          renderAll();
        });
        logLbl.appendChild(logCb);
        logLbl.appendChild(document.createTextNode('LOG'));

        // Color picker
        var colorInput = document.createElement('input');
        colorInput.type = 'color';
        colorInput.value = color;
        colorInput.title = 'Color';
        colorInput.style.cssText = 'width:20px;height:20px;padding:0;border:none;cursor:pointer;border-radius:3px;flex-shrink:0';
        colorInput.addEventListener('change', function(e){
          e.stopPropagation();
          ws.tracks[trackIdx].color = colorInput.value;
          renderAll(); renderTrackControls();
        });

        row.appendChild(minLbl); row.appendChild(minInput);
        row.appendChild(maxLbl); row.appendChild(maxInput);
        row.appendChild(logLbl);
        row.appendChild(colorInput);
      }

      el.appendChild(row);
    });
  });
}

function setTrackScale(wn,ti,minmax,val){
  const v=parseFloat(val);
  if(wellState[wn]?.tracks?.[ti]) wellState[wn].tracks[ti][minmax==='min'?'scaleMin':'scaleMax']=isNaN(v)?null:v;
  renderAll();
}
function setTrackLog(wn,ti,val){
  wellState[wn].tracks[ti].isLog=val==='log';
  // reset manual scale on type change
  wellState[wn].tracks[ti].scaleMin=null; wellState[wn].tracks[ti].scaleMax=null;
  renderAll();
}
function setCorrelTrack(wn,ti){
  wellState[wn]?.tracks.forEach((t,i)=>t.isCorrel=i===ti);
  renderAll();
}
function addTrack(wn, curveName) {
  const ws = wellState[wn];
  if(!ws) return;
  if(ws.tracks.length >= MAX_TRACKS) {
    alert('Máximo ' + MAX_TRACKS + ' curvas por pozo. Destildá una para cambiarla.');
    return;
  }
  const w = loadedWells[wn];
  const curves = w ? w.curves.map(c => c.name) : ['UNKNOWN'];
  const usedCurves = ws.tracks.map(t => t.curveName);
  const curve = curveName || curves.find(c => !usedCurves.includes(c)) || curves[0];
  const preset = getCurvePreset(curve) || {};
  ws.tracks.push({
    curveName: curve,
    scaleMin: null, scaleMax: null,
    isLog: !!preset.isLog,
    isCorrel: false,
    color: preset.color || '#94a3b8',
    auto: true
  });
  renderAll(); renderTrackControls();
}
function removeTrack(wn,ti){
  if(wellState[wn]?.tracks.length<=1) return;
  wellState[wn]?.tracks.splice(ti,1);
  // ensure one correl track
  if(!wellState[wn]?.tracks.some(t=>t.isCorrel)) wellState[wn].tracks[0].isCorrel=true;
  renderAll();
}

// ── Zoom (MB2 drag = vertical stretch) ────────────────────────────────────
let zoomDrag = null; // {wellName, startY, startDMin, startDMax}
let panDrag  = null; // {wellName, startY, startDMin, startDMax}

function setupZoom(wellName){ setupZoomSide(Object.keys(wellState).indexOf(wellName)===0?'LEFT':'RIGHT'); }
function setupZoomSide(side){
  const c=document.getElementById('cvs_'+side);
  if(!c) return;
  c.addEventListener('contextmenu', e=>e.preventDefault());
  c.addEventListener('mousedown', e=>{
    if(e.button===2){
      const wn=getWellForSide(side);
      const rect=c.getBoundingClientRect();
      const sy=(e.clientY-rect.top)*(CANVAS_H/rect.height);
      const ws=wellState[wn];
      if(!ws) return;
      zoomDrag={side,startY:sy,startDMin:ws.dMin,startDMax:ws.dMax,
        anchorD:depthFromY(sy,ws.dMin,ws.dMax)};
      e.preventDefault();
    }
  });
  window.addEventListener('mousemove', e=>{
    if(!zoomDrag||zoomDrag.side!==side) return;
    const c2=document.getElementById('cvs_'+side);
    const rect=c2.getBoundingClientRect();
    const cy=(e.clientY-rect.top)*(CANVAS_H/rect.height);
    const dy=cy-zoomDrag.startY;
    const factor=Math.exp(-dy/300);
    const range=(zoomDrag.startDMax-zoomDrag.startDMin)*factor;
    const t=(zoomDrag.startY-PAD.top)/(CANVAS_H-PAD.top-PAD.bot);
    const dMinLimit=window._DMIN||DMIN, dMaxLimit=window._DMAX||DMAX;
    let newMin=zoomDrag.anchorD-t*range;
    let newMax=newMin+range;
    if(newMin<dMinLimit){newMin=dMinLimit;newMax=Math.min(dMaxLimit,dMinLimit+range);}
    if(newMax>dMaxLimit){newMax=dMaxLimit;newMin=Math.max(dMinLimit,dMaxLimit-range);}
    syncDepth(newMin,newMax);
    renderAll();
  });
  window.addEventListener('mouseup', e=>{
    if(e.button===2&&zoomDrag&&zoomDrag.side===side) zoomDrag=null;
  });
}

// ── Pan (MB1 on depth column = vertical pan) ──────────────────────────────
function getWellForSide(side){
  const wells=Object.keys(wellState);
  if(!wells.length) return null;
  return side==='LEFT'?wells[0]:(wells[1]||null);
}

function setupInteraction(side){
  // Unified setup for a canvas side — called once, uses getWellForSide() at event time
  setupMarkerDragSide(side);
  setupZoomSide(side);
  setupPanSide(side);
}

function setupPan(wellName){ setupPanSide(Object.keys(wellState).indexOf(wellName)===0?'LEFT':'RIGHT'); }
function setupPanSide(side){
  // Canvas may not exist at setup time — use lazy lookup in handlers
  const getCanvas = () => document.getElementById('cvs_'+side);

  window.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;
    const c = getCanvas();
    if(!c || e.target !== c) return;
    const rect = c.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (c.width / rect.width);
    const cy = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
    if(cx > DEPTH_W) return;
    const wn = getWellForSide(side);
    const ws = wn ? wellState[wn] : null;
    if(!ws) return;
    panDrag = {side, startY: cy, startDMin: ws.dMin, startDMax: ws.dMax};
    e.preventDefault();
  });

  window.addEventListener('mousemove', e=>{
    if(!panDrag || panDrag.side !== side) return;
    const c = getCanvas();
    if(!c) return;
    const rect = c.getBoundingClientRect();
    const cy = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    const dy = cy - panDrag.startY;
    const range = panDrag.startDMax - panDrag.startDMin;
    const depthPerPx = range / (CANVAS_H - PAD.top - PAD.bot);
    let delta = -dy * depthPerPx;
    let newMin = panDrag.startDMin + delta;
    let newMax = panDrag.startDMax + delta;
    const dMinLimit = window._DMIN||DMIN, dMaxLimit = window._DMAX||DMAX;
    if(newMin < dMinLimit){ newMin = dMinLimit; newMax = dMinLimit + range; }
    if(newMax > dMaxLimit){ newMax = dMaxLimit; newMin = dMaxLimit - range; }
    syncDepth(newMin, newMax);
    renderAll();
  });

  window.addEventListener('mouseup', e=>{
    if(e.button === 0 && panDrag && panDrag.side === side) panDrag = null;
  });

  // Cursor hint on hover
  window.addEventListener('mousemove', e=>{
    const c = getCanvas();
    if(!c || e.target !== c) return;
    if(panDrag && panDrag.side === side){ c.style.cursor='grabbing'; return; }
    const rect = c.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (c.width / rect.width);
    if(cx <= DEPTH_W) c.style.cursor = 'grab';
  });
}

function hitMarker(cy, wellName){
  const ws=wellState[wellName];
  if(!ws) return -1;
  const wells__=Object.keys(wellState); const isLeft__=wells__.indexOf(wellName)===0;
  const mlist = isLeft__
    ? markers.map((m,i)=>({...m,idx:i}))
    : markers.map((m,i)=>results[i]?{...m,depth:results[i].bestDepth,idx:i}:null).filter(Boolean);
  for(const m of mlist){
    if(!m) continue;
    const y=depthY(m.depth,ws.dMin,ws.dMax);
    if(Math.abs(cy-y)<=HIT_PX) return m.idx;
  }
  return -1;
}

function hitGhost(cy, wellName){
  if(!document.getElementById('chkGhost')?.checked) return -1;
  const ws=wellState[wellName];
  // Only check the active marker's ghost
  const r=results[activeIdx]; if(!r) return -1;
  const shift=r.bestDepth-markers[activeIdx].depth+(ghostShifts[activeIdx]||0);
  const ghostD=markers[activeIdx].depth+shift;
  const y=depthY(ghostD,ws.dMin,ws.dMax);
  return Math.abs(cy-y)<=HIT_PX ? activeIdx : -1;
}

function setupMarkerDrag(wellName){ setupMarkerDragSide(Object.keys(wellState).indexOf(wellName)===0?'LEFT':'RIGHT'); }
function setupMarkerDragSide(side){
  const wellName=()=>getWellForSide(side);
  const c=document.getElementById('cvs_'+side);
  if(!c) return;
  c.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    const rect=c.getBoundingClientRect();
    const cy=(e.clientY-rect.top)*(CANVAS_H/rect.height);
    const wn_=wellName(); if(!wn_||!wellState[wn_]){c.style.cursor='default';return;}
    const ws=wellState[wn_]||wellState[wellName()];
    const mi=hitMarker(cy,wn_);
    if(mi>=0){
      drag={wellName:wellName(),markerIdx:mi,isGhost:false,lastY:cy,side};
      e.preventDefault(); return;
    }
    if(Object.keys(wellState).indexOf(wellName)===1){
      const gi=hitGhost(cy,wellName);
      if(gi>=0){ drag={wellName:wellName(),markerIdx:gi,isGhost:true,lastY:cy,side}; e.preventDefault(); }
    }
  });
  c.addEventListener('mousemove', e=>{
    const rect=c.getBoundingClientRect();
    const cy=(e.clientY-rect.top)*(CANVAS_H/rect.height);
    const wn_=wellName(); if(!wn_||!wellState[wn_]){c.style.cursor='default';return;}
    const ws=wellState[wn_]||wellState[wellName()];
    if(!drag){
      // cursor
      const mi=hitMarker(cy,wn_);
      const gi=Object.keys(wellState).indexOf(wn_)===1?hitGhost(cy,wn_):-1;
      c.style.cursor=(mi>=0||gi>=0)?'ns-resize':'default';
      return;
    }
    if(drag.side!==side) return;
    e.preventDefault();
    const prevD=depthFromY(drag.lastY,ws.dMin,ws.dMax);
    let newD=depthFromY(cy,ws.dMin,ws.dMax);
    newD=Math.max(DMIN,Math.min(DMAX,newD));
    if(drag.isGhost){
      ghostShifts[drag.markerIdx]=(ghostShifts[drag.markerIdx]||0)+(newD-prevD);
      drag.lastY=cy;
    } else if(drag.side==='LEFT'){
      markers[drag.markerIdx].depth=parseFloat(newD.toFixed(2));
      delete results[drag.markerIdx];
      renderMarkerBody(); renderResultsBar(); renderMarkerTabs();
    } else {
      if(results[drag.markerIdx]){
        const nd=parseFloat(newD.toFixed(2));
        const ncc=interpCC(results[drag.markerIdx],nd);
        results[drag.markerIdx]={...results[drag.markerIdx],bestDepth:nd,bestCC:ncc};
        syncAccumulatedResult(drag.markerIdx);
        // In review mode: update reviewData (banner refreshes on mouseup)
        if(reviewMode && reviewData && markers[drag.markerIdx] && markers[drag.markerIdx].name === reviewData.mName) {
          reviewData.newData = {...reviewData.newData, md: nd, cc: ncc};
        }
        drag.lastY=cy;
        renderMarkerBody(); renderResultsBar();
      }
    }
    renderAll();
    if(results[activeIdx]) drawCCPanel(activeIdx);
  });
  c.addEventListener('mouseup', e=>{
    if(e.button!==0||!drag) return;
    if(drag.isGhost&&drag.side===side){
      const idx=drag.markerIdx, r=results[idx];
      if(r){
        const finalShift=Math.round((ghostShifts[idx]||0)/0.1)*0.1;
        const nd=Math.round((r.bestDepth+finalShift)/0.1)*0.1;
        const ncc=interpCC(r,nd);
        results[idx]={...r,bestDepth:nd,bestCC:ncc};
        ghostShifts[idx]=0;
        renderMarkerBody(); renderResultsBar();
        if(idx===activeIdx) drawCCPanel(idx);
        renderAll();
      }
    }
        // Refresh review banner on drag end
    if(reviewMode && reviewData) {
      showReviewBanner(reviewData.wL, reviewData.wR, reviewData.mName, reviewData.newData.md, reviewData.existDepth);
    }
    drag=null;
  });
}

// ── Correlation (reuse previous logic) ────────────────────────────────────
const COLORS=['#ef4444','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#10b981','#f97316','#6366f1'];
// markers, results, activeIdx declared at top
const col=i=>COLORS[i%COLORS.length];

function getCorrelCurve(wellName){
  const ws=wellState[wellName];
  const w = loadedWells[wellName];
  const curves = w ? w.curves.map(function(c){return c.name;}) : [];

  // If user set a preference, find equivalent curve in this well
  if(preferredCorrelCurve) {
    // Exact match
    if(curves.includes(preferredCorrelCurve)) return preferredCorrelCurve;
    // Same group match
    const prefGroup = detectCurveGroup(preferredCorrelCurve, '');
    if(prefGroup) {
      const match = curves.find(function(cn){ return detectCurveGroup(cn,'') === prefGroup; });
      if(match) return match;
    }
  }

  // Default: find RT/resistivity curve
  if(ws && ws.tracks) {
    const tr = ws.tracks.find(function(t){ return t.isCorrel; });
    if(tr) return tr.curveName;
  }

  // Fallback: find any RES curve
  const resCurve = curves.find(function(cn){ return detectCurveGroup(cn,'') === 'RES'; });
  if(resCurve) return resCurve;

  return curves[0] || 'M2RX';
}

function correlate(idx){
  const m=markers[idx];
  const wells_c=Object.keys(wellState);
  const curve728=getCorrelCurve(wells_c[0]||'');
  const curve729=getCorrelCurve(wells_c[1]||wells_c[0]||'');
  const wells=Object.keys(wellState);
  const wSrc=wells[0], wTgt=wells[1]||wells[0];
  const raw728=INTERP[wSrc]?.[curve728]||new Float64Array(GRID.length);
  const raw729=INTERP[wTgt]?.[curve729]||new Float64Array(GRID.length);
  // Transform is applied later via applyTransform using correlTransform setting
  const arr728 = raw728;
  const arr729 = raw729;
  const iCenter=GRID.findIndex(d=>d>=m.depth);
  const winS=Math.floor(m.win/STEP);
  const i0=Math.max(0,iCenter-winS), i1=Math.min(GRID.length,iCenter+winS);
  // Apply transform to both curves before correlation
  function applyTransform(arr, mode) {
    if(!arr) return arr;
    const out = new Float64Array(arr.length);
    if(mode === 'log') {
      for(let i=0;i<arr.length;i++) out[i] = arr[i]>0 ? Math.log10(arr[i]) : 0;
    } else if(mode === 'sqrt') {
      for(let i=0;i<arr.length;i++) out[i] = arr[i]>0 ? Math.sqrt(arr[i]) : 0;
    } else if(mode === 'deriv') {
      for(let i=1;i<arr.length-1;i++) out[i] = (arr[i+1]-arr[i-1])/(2*STEP);
      out[0]=out[1]; out[arr.length-1]=out[arr.length-2];
    } else if(mode === 'zscore') {
      // Z-score normalization within the full array (local context)
      let sum=0, sum2=0, n=0;
      for(let i=0;i<arr.length;i++) { if(!isNaN(arr[i])&&isFinite(arr[i])){sum+=arr[i];sum2+=arr[i]*arr[i];n++;} }
      const mean = n>0 ? sum/n : 0;
      const std  = n>1 ? Math.sqrt((sum2 - n*mean*mean)/(n-1)) : 1;
      const s    = std > 0.0001 ? std : 1;
      for(let i=0;i<arr.length;i++) out[i] = (arr[i] - mean) / s;
    } else {
      for(let i=0;i<arr.length;i++) out[i] = arr[i];
    }
    return out;
  }
  const tArr728 = applyTransform(arr728, correlTransform);
  const tArr729 = applyTransform(arr729, correlTransform);
  const template=Array.from(tArr728.slice(i0,i1));
  const sNS=Math.max(5, Math.floor(m.sNeg/STEP));
  const sPS=Math.max(5, Math.floor(m.sPos/STEP));
  // Note: minimum 5 steps ensures CC curve is always visible
  const depths729=[], ccVals=[];
  // Dual-curve setup
  const curve2Name = correlCurve2 && correlCurve2 !== curve728 ? correlCurve2 : null;
  const raw728b = curve2Name ? (INTERP[wSrc]?.[curve2Name] || null) : null;
  const raw729b = curve2Name ? (INTERP[wTgt]?.[curve2Name] || null) : null;
  const tArr728b = raw728b ? applyTransform(raw728b, autoDetectTransform(curve2Name)) : null;
  const tArr729b = raw729b ? applyTransform(raw729b, autoDetectTransform(curve2Name)) : null;
  const template2 = tArr728b ? Array.from(tArr728b.slice(i0,i1)) : null;
  const w1 = curve2Name ? (100 - correlCurve2Weight) / 100 : 1;
  const w2 = curve2Name ? correlCurve2Weight / 100 : 0;

  for(let off=-sNS;off<=sPS;off++){
    const j0=i0+off, j1=i1+off;
    if(j0<0||j1>GRID.length){depths729.push(null);ccVals.push(null);continue;}
    const seg=Array.from(tArr729.slice(j0,j1));
    if(seg.length!==template.length){depths729.push(null);ccVals.push(null);continue;}
    const cc1 = ncc(template, seg);
    let ccFinal = cc1;
    if(curve2Name && template2 && tArr729b) {
      const seg2 = Array.from(tArr729b.slice(j0,j1));
      if(seg2.length === template2.length) {
        const cc2 = ncc(template2, seg2);
        if(correlDualMode === 'product') {
          // Media geométrica: √(cc1 × cc2) - preserves scale
          var p = cc1 * cc2;
          ccFinal = p >= 0 ? Math.sqrt(p) : -Math.sqrt(-p);
        } else {
          // Weighted sum
          ccFinal = w1 * cc1 + w2 * cc2;
        }
      }
    }
    depths729.push(parseFloat((m.depth+off*STEP).toFixed(2)));
    ccVals.push(ccFinal);
  }
  let bestCC=-Infinity, bestDepth=m.depth;
  for(let i=0;i<ccVals.length;i++){
    if(ccVals[i]!==null&&ccVals[i]>bestCC){bestCC=ccVals[i];bestDepth=depths729[i];}
  }
  // Check template variance — skip NaN, flag if too low
  const tvalid=template.filter(v=>!isNaN(v)&&isFinite(v));
  const tmean=tvalid.length?tvalid.reduce((s,v)=>s+v,0)/tvalid.length:0;
  const tstd=tvalid.length?Math.sqrt(tvalid.reduce((s,v)=>s+(v-tmean)**2,0)/tvalid.length):0;
  const lowVariance = tstd < 0.05; // very strict — only flag truly flat zones

  const localPeaks=[];
  for(let i=1;i<ccVals.length-1;i++){
    if(depths729[i]===null||ccVals[i]===null) continue;
    const prev=ccVals[i-1]??-999, next=ccVals[i+1]??-999;
    if(ccVals[i]>=prev&&ccVals[i]>=next&&ccVals[i]>0)
      localPeaks.push({depth:depths729[i],cc:ccVals[i]});
  }
  localPeaks.sort((a,b)=>b.cc-a.cc);
  const bestIdx=localPeaks.findIndex(p=>p.depth===bestDepth);
  return {bestDepth,bestCC,depths729,ccVals,localPeaks,peakIdx:bestIdx>=0?bestIdx:0,lowVariance,templateStd:tstd};
}
function ncc(a,b){
  // Filter out NaN pairs
  const pa=[], pb=[];
  for(let i=0;i<a.length;i++){
    if(!isNaN(a[i])&&!isNaN(b[i])&&isFinite(a[i])&&isFinite(b[i])){pa.push(a[i]);pb.push(b[i]);}
  }
  if(pa.length<4) return 0;
  const ma=mean(pa),mb=mean(pb),ta=pa.map(v=>v-ma),tb=pb.map(v=>v-mb);
  const sa=std(ta),sb=std(tb);
  if(sa<1e-10||sb<1e-10) return 0;
  let s=0; for(let i=0;i<pa.length;i++) s+=ta[i]*tb[i];
  return s/(pa.length*sa*sb);
}
function mean(a){return a.reduce((s,v)=>s+v,0)/a.length;}
function std(a){const m=mean(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length);}

function interpCC(r,d){
  const{depths729,ccVals}=r;
  for(let i=0;i<depths729.length-1;i++){
    const d0=depths729[i],d1=depths729[i+1];
    if(d0===null||d1===null) continue;
    if(d>=d0&&d<=d1){
      const t=(d-d0)/(d1-d0);
      return (ccVals[i]??0)+t*((ccVals[i+1]??0)-(ccVals[i]??0));
    }
  }
  let best=null,bestDist=Infinity;
  for(let i=0;i<depths729.length;i++){
    if(depths729[i]===null||ccVals[i]===null) continue;
    const dist=Math.abs(depths729[i]-d);
    if(dist<bestDist){bestDist=dist;best=ccVals[i];}
  }
  return best??0;
}

function ccColor(cc){
  const t=Math.max(0,Math.min(1,cc));
  let r,g;
  if(t<0.5){r=220;g=Math.round(t*2*210);}
  else{r=Math.round((1-(t-0.5)*2)*210);g=170;}
  const fg=t>0.55?'#1a3a1a':t>0.3?'#3a2a00':'#3a0000';
  return `background:rgb(${r},${g},60);color:${fg};border-radius:4px;padding:2px 6px;`;
}

      <td>
        ${r ? `<label onclick="event.stopPropagation()" title="${isValidated?'Validado — click para desvalidar':'Marcar como validado'}"
          style="cursor:pointer;display:flex;align-items:center;justify-content:center">

}
function renderResultsBar(){

function renderMarkerTabs(){

function jumpPeakFor(idx,dir){
  const r=results[idx];if(!r||!r.localPeaks||!r.localPeaks.length) return;
  const newIdx=(r.peakIdx+dir+r.localPeaks.length)%r.localPeaks.length;
  const p=r.localPeaks[newIdx];
  results[idx]={...r,bestDepth:p.depth,bestCC:p.cc,peakIdx:newIdx};
  if(idx===activeIdx) drawCCPanel(idx);
  renderMarkerBody(); renderResultsBar(); renderAll();

  // Update accumulatedResults and wellMarkers with new peak
  var wells_jp = Object.keys(wellState);
  var wL_jp = wells_jp[0]||'', wR_jp = wells_jp[1]||'';
  var mName_jp = markers[idx] ? markers[idx].name : ('M'+idx);
  if(wL_jp && wR_jp && wL_jp !== wR_jp) {
    var existing_jp = getAcc(wL_jp, mName_jp, wR_jp);
    if(existing_jp) {
      existing_jp.md = p.depth; existing_jp.cc = p.cc;
      var wR_data_jp = loadedWells[wR_jp];
      var getN_jp = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
      if(wR_data_jp) existing_jp.tvdss = getN_jp(wR_data_jp.meta&&wR_data_jp.meta.ELEV) - p.depth;
      setAcc(wL_jp, mName_jp, wR_jp, existing_jp);
      // Sync wellMarkers if validated
      if(existing_jp.validated && wellMarkers[wR_jp]) {
        var wmJp = wellMarkers[wR_jp].find(function(m){ return m.name===mName_jp; });
        if(wmJp) wmJp.depth = p.depth;
      }
    }
    setTimeout(function(){ renderMarkerDataTable(); renderMap(); }, 50);
  }

  // Refresh review banner if in review mode
  if(reviewMode && reviewData && markers[idx] && markers[idx].name === reviewData.mName) {
    reviewData.newData = {...reviewData.newData, md: p.depth, cc: p.cc};
    showReviewBanner(reviewData.wL, reviewData.wR, reviewData.mName, p.depth, reviewData.existDepth);
  }
}
function jumpPeak(dir){jumpPeakFor(activeIdx,dir);}

function runOne(i){
  results[i]=correlate(i); activeIdx=i; ghostShifts[i]=0;
  renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderAll();
  requestAnimationFrame(()=>drawCCPanel(i));

  const wells_ro=Object.keys(wellState);
  const wL_ro=wells_ro[0]||'', wR_ro=wells_ro[1]||'';
  if(results[i] && wR_ro && wL_ro && wR_ro!==wL_ro) {
    const r_ro=results[i];
    const wR_data=loadedWells[wR_ro];
    const getN=function(s){var t=String(s||'').split(/\s+/).filter(Boolean);for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;}return 0;};
    const elevR=wR_data?(getN(wR_data.meta&&wR_data.meta.ELEV)||0):0;
    const mName_ro=markers[i]?markers[i].name:('M'+i);
    const newData={
      md:r_ro.bestDepth, tvdss:elevR-r_ro.bestDepth,
      x:wR_data?getN(wR_data.meta&&wR_data.meta.XCOORD):'',
      y:wR_data?getN(wR_data.meta&&wR_data.meta.YCOORD):'',
      elev:elevR, cc:r_ro.bestCC, validated:false, wL:wL_ro, wR:wR_ro
    };

    // Check for conflict (skip if in review mode)
    const existing=getExistingMarkersForWell(wR_ro);
    if(!reviewMode && existing[mName_ro] !== undefined) {
      // Conflict — show compare dialog
      const conflicts={};
      conflicts[mName_ro]=existing[mName_ro];
      const newDepths={};
      newDepths[mName_ro]=newData.md;
      showMarkerCompareDialog(wL_ro, wR_ro, conflicts, newDepths,
        function(){
          var validatedEntry = Object.assign({}, newData, {validated: true});
          // Unvalidate other correlations for same dest+marker
          Object.keys(accumulatedResults).forEach(function(o2) {
            if(o2 === wL_ro) return;
            var a2 = getAcc(o2, mName_ro, wR_ro);
            if(a2 && a2.validated) { a2.validated = false; setAcc(o2, mName_ro, wR_ro, a2); }
          });
          setAcc(wL_ro,mName_ro,wR_ro,validatedEntry);
          // Update results[i] so visor shows new depth
          if(results[i]) results[i] = Object.assign({}, results[i], {bestDepth: newData.md, bestCC: newData.cc});
          if(!wellMarkers[wR_ro]) wellMarkers[wR_ro] = [];
          var wmR = wellMarkers[wR_ro].find(function(m){ return m.name===mName_ro; });
          if(wmR) { wmR.depth = newData.md; }
          else {
            var srcM = wellMarkers[wL_ro] && wellMarkers[wL_ro].find(function(m){ return m.name===mName_ro; });
            wellMarkers[wR_ro].push({name:mName_ro, depth:newData.md,
              win:srcM?srcM.win:50, sNeg:srcM?srcM.sNeg:150, sPos:srcM?srcM.sPos:150, notes:''});
          }
          renderMarkerBody(); renderResultsBar(); renderAll();
          setTimeout(()=>{ renderMarkerDataTable(); if(_mapInitialized) renderMap(); else updateMap(); },50); markUnsaved(); setTimeout(autoSave,500);
        },
        function(){
          // Mantener existente: restore results[i] to existing depth
          // Restore ALL conflicting markers to their existing depths
          Object.keys(conflicts).forEach(function(mn) {
            var existD = conflicts[mn];
            if(existD === undefined) return;
            // Find marker index by name
            var mi = markers.findIndex(function(m){ return m.name === mn; });
            if(mi >= 0 && results[mi]) {
              results[mi] = Object.assign({}, results[mi], {bestDepth: existD});
            }
            // Restore wellMarkers
            if(wellMarkers[wR_ro]) {
              var wmK = wellMarkers[wR_ro].find(function(m){ return m.name===mn; });
              if(wmK) wmK.depth = existD;
            }
          });
          renderMarkerBody(); renderResultsBar(); renderAll();

          // Save acc for ALL conflicting markers with existing depths
          var wR_data_keep = loadedWells[wR_ro];
          var getN_keep = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
          var elevKeep = wR_data_keep ? getN_keep(wR_data_keep.meta&&wR_data_keep.meta.ELEV) : 0;
          Object.keys(conflicts).forEach(function(mn) {
            var existD = conflicts[mn];
            if(existD === undefined) return;
            var accK = getAcc(wL_ro, mn, wR_ro);
            var keepEntry = {
              md: existD, tvdss: elevKeep - existD,
              x: wR_data_keep ? getN_keep(wR_data_keep.meta&&wR_data_keep.meta.XCOORD) : '',
              y: wR_data_keep ? getN_keep(wR_data_keep.meta&&wR_data_keep.meta.YCOORD) : '',
              elev: elevKeep,
              cc: accK ? accK.cc : null,
              validated: true, notes: accK ? accK.notes : ''
            };
            setAcc(wL_ro, mn, wR_ro, keepEntry);
            Object.keys(accumulatedResults).forEach(function(o2) {
              if(o2 === wL_ro) return;
              var a2 = getAcc(o2, mn, wR_ro);
              if(a2 && a2.validated) { a2.validated = false; setAcc(o2, mn, wR_ro, a2); }
            });
          });
          renderMarkerBody(); renderResultsBar(); renderAll();
          setTimeout(()=>{ renderMarkerDataTable(); if(_mapInitialized) renderMap(); else updateMap(); },50);
          markUnsaved(); setTimeout(autoSave,500);
        },
        function(){ startReviewMode(wL_ro, wR_ro, mName_ro, newData, conflicts[mName_ro]); }
      );
    } else {
      if(reviewMode && reviewData && reviewData.mName === mName_ro) {
        // In review mode: update the new data being reviewed
        reviewData.newData = newData;
        // Update banner delta
        showReviewBanner(wL_ro, wR_ro, mName_ro, newData.md, reviewData.existDepth);
      } else {
        // No conflict - auto-validate and sync to wellMarkers
        var autoEntry = Object.assign({}, newData, {validated: true});
        setAcc(wL_ro, mName_ro, wR_ro, autoEntry);
        // Sync to wellMarkers[wR] as definitive origin
        if(!wellMarkers[wR_ro]) wellMarkers[wR_ro] = [];
        var wmAuto = wellMarkers[wR_ro].find(function(m){ return m.name===mName_ro; });
        if(wmAuto) { wmAuto.depth = newData.md; }
        else {
          var srcMAuto = wellMarkers[wL_ro] && wellMarkers[wL_ro].find(function(m){ return m.name===mName_ro; });
          wellMarkers[wR_ro].push({name:mName_ro, depth:newData.md,
            win:srcMAuto?srcMAuto.win:50, sNeg:srcMAuto?srcMAuto.sNeg:150, sPos:srcMAuto?srcMAuto.sPos:150, notes:''});
        }
        setTimeout(()=>{ renderMarkerDataTable(); if(_mapInitialized) renderMap(); else updateMap(); },50);
        markUnsaved(); setTimeout(autoSave,500);
      }
    }
  } else {
    setTimeout(()=>renderMarkerDataTable(),50);
    markUnsaved(); setTimeout(autoSave,500);
  }
}
function runAll(){
  if(!markers.length){alert('Agregá al menos un marker.');return;}
  const wells_ra=Object.keys(wellState);
  const wL_ra=wells_ra[0]||'', wR_ra=wells_ra[1]||'';
  markers.forEach((_,i)=>{
    results[i]=correlate(i); ghostShifts[i]=0;
    // Stage result for conflict check
    if(results[i] && wR_ra && wL_ra && wR_ra !== wL_ra) {
      const r_ra=results[i];
      const wR_data=loadedWells[wR_ra];
      const getN=function(s){var t=String(s||'').split(/\s+/).filter(Boolean);for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;}return 0;};
      const elevR=wR_data?(getN(wR_data.meta&&wR_data.meta.ELEV)||0):0;
      const mName = markers[i] ? markers[i].name : ('M'+i);
      if(!window._pendingResults) window._pendingResults = {};
      window._pendingResults[mName] = {
        md:r_ra.bestDepth, tvdss:elevR-r_ra.bestDepth,
        x:wR_data?getN(wR_data.meta&&wR_data.meta.XCOORD):'',
        y:wR_data?getN(wR_data.meta&&wR_data.meta.YCOORD):'',
        elev:elevR, cc:r_ra.bestCC, validated:false, wL:wL_ra, wR:wR_ra
      };
    }
  });
  activeIdx=0;
  renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderAll();
  requestAnimationFrame(()=>drawCCPanel(activeIdx));

  // Check for conflicts with existing markers in DESTINO
  if(window._pendingResults && Object.keys(window._pendingResults).length) {
    var pending = window._pendingResults;
    window._pendingResults = null;
    var wR_check = Object.values(pending)[0].wR;
    var wL_check = Object.values(pending)[0].wL;
    var existing = getExistingMarkersForWell(wR_check);
    var conflicts = {};
    var hasConflict = false;
    Object.keys(pending).forEach(function(mn) {
      if(existing[mn] !== undefined) { conflicts[mn] = existing[mn]; hasConflict = true; }
    });

    var doSave = function(useNew) {
      Object.keys(pending).forEach(function(mn) {
        if(useNew || !conflicts[mn]) {
          var entry = Object.assign({}, pending[mn], {validated: true});
          // First save the new result
          setAcc(wL_check, mn, wR_check, entry);
          // Then unvalidate ALL other correlations for same destino+marker
          Object.keys(accumulatedResults).forEach(function(prevOrig) {
            if(prevOrig === wL_check) return;
            var prevAcc = getAcc(prevOrig, mn, wR_check);
            if(prevAcc && prevAcc.validated) {
              prevAcc.validated = false;
              setAcc(prevOrig, mn, wR_check, prevAcc);
            }
          });
          // Sync to wellMarkers[wR_check] as definitive origin
          if(entry.md) {
            if(!wellMarkers[wR_check]) wellMarkers[wR_check] = [];
            var wmR2 = wellMarkers[wR_check].find(function(m){ return m.name===mn; });
            if(wmR2) { wmR2.depth = entry.md; }
            else {
              var srcM2 = wellMarkers[wL_check] && wellMarkers[wL_check].find(function(m){ return m.name===mn; });
              wellMarkers[wR_check].push({name:mn, depth:entry.md,
                win:srcM2?srcM2.win:50, sNeg:srcM2?srcM2.sNeg:150, sPos:srcM2?srcM2.sPos:150, notes:''});
            }
          }
        }
      });
      // Save non-conflicting markers in all cases
      if(!useNew) {
        Object.keys(pending).forEach(function(mn) {
          if(!conflicts[mn]) {
            var entryNC = Object.assign({}, pending[mn], {validated: true});
            setAcc(wL_check, mn, wR_check, entryNC);
          }
        });
        // Restore results[] for conflicting markers to EXISTING depth (visor)
        Object.keys(conflicts).forEach(function(mn) {
          var existD = conflicts[mn];
          var mi = markers.findIndex(function(m){ return m.name === mn; });
          if(mi >= 0 && results[mi]) {
            results[mi] = Object.assign({}, results[mi], {bestDepth: existD});
          }
          // Also save acc with existing depth and validated:true
          var wR_data_k = loadedWells[wR_check];
          var getN_k = function(s){ var t=String(s||'').split(/[\s]+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
          var elevK = wR_data_k ? getN_k(wR_data_k.meta&&wR_data_k.meta.ELEV) : 0;
          var accK = getAcc(wL_check, mn, wR_check);
          setAcc(wL_check, mn, wR_check, {
            md: existD, tvdss: elevK - existD,
            x: wR_data_k ? getN_k(wR_data_k.meta&&wR_data_k.meta.XCOORD) : '',
            y: wR_data_k ? getN_k(wR_data_k.meta&&wR_data_k.meta.YCOORD) : '',
            elev: elevK, cc: accK ? accK.cc : null,
            validated: true, notes: accK ? accK.notes : ''
          });
          // Restore wellMarkers
          if(wellMarkers[wR_check]) {
            var wmK = wellMarkers[wR_check].find(function(m){ return m.name===mn; });
            if(wmK) wmK.depth = existD;
          }
        });
        renderMarkerBody(); renderResultsBar(); renderAll();
      }
      renderMarkerDataTable();
      setTimeout(renderMap, 50);
      markUnsaved(); setTimeout(autoSave,500);
    };

    if(hasConflict) {
      var newDepths = {};
      Object.keys(pending).forEach(function(mn){ newDepths[mn] = pending[mn].md; });
      var conflictNames = Object.keys(conflicts);
      var wL_rv=wL_check, wR_rv=wR_check;
      var conflictName = Object.keys(conflicts)[0];
      var newDataRv = pending[conflictName];
      showMarkerCompareDialog(wL_check, wR_check, conflicts, newDepths,
        function(){ doSave(true); },
        function(){ doSave(false); },
        conflictName ? function(){ startReviewMode(wL_rv, wR_rv, conflictName, newDataRv, conflicts[conflictName]); } : null
      );
    } else {
      doSave(true);
    }
  }
}
function showMarkerCC(i){activeIdx=i;renderMarkerTabs();if(results[i])drawCCPanel(i);renderAll();}

let vpCC={dMin:0,dMax:1};
const CC_PL=50,CC_PR=15,CC_PT=18,CC_PB=28;

function drawCCPanel(idx){
  if(!results[idx]||!markers[idx]) return;
  const r=results[idx],m=markers[idx];
  // Ensure canvas has correct dimensions
  const cCC=document.getElementById('cCC');

  if(cCC.height<50){ cCC.height=200; }
  document.getElementById('ccTitle').textContent='Correlación cruzada — '+m.name+' (LM-728: '+m.depth.toFixed(2)+' m | ventana ±'+m.win+'m | búsq. −'+m.sNeg+'/+'+m.sPos+'m) | Curva: '+getCorrelCurve(Object.keys(wellState)[0]||'');
  document.getElementById('ccInfo').textContent='Pico: '+r.bestDepth.toFixed(2)+' m | CC = '+r.bestCC.toFixed(4);
  const nP=r.localPeaks?r.localPeaks.length:'?';
  document.getElementById('peakRank').textContent=r.localPeaks?(r.peakIdx+1)+'/'+nP+' picos':'';
  const warn = document.getElementById('ccWarning');
  if(r.lowVariance){
    if(warn){ warn.style.display='block';
      warn.textContent='⚠ Baja varianza en la ventana (σ='+r.templateStd.toFixed(3)+'): la curva '+getCorrelCurve(Object.keys(wellState)[0]||'')+' es muy plana en '+m.depth.toFixed(0)+'m. Intentá con SP u otra curva, o mové el marker.';
    }
  } else {
    if(warn) warn.style.display='none';
  }
  requestAnimationFrame(()=>drawCCCurve('cCC',r.depths729,r.ccVals,r.bestDepth,col(idx),m.depth,m.sNeg,m.sPos,r.lowVariance,m.win));
}

function drawCCCurve(id,depths,vals,bestDepth,peakColor,markerD,searchNeg,searchPos,lowVar=false,win=0){
  const c=document.getElementById(id);
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height,PL=CC_PL,PR=CC_PR,PT=CC_PT,PB=CC_PB;
  console.log('[CC] drawCCCurve W='+W+' H='+H+' depths='+depths.length+' bestDepth='+bestDepth);
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // Compute min/max without spread to avoid stack overflow on large arrays
  let dMin=Infinity,dMax=-Infinity,vMin=Infinity,vMax=-Infinity;
  for(let i=0;i<depths.length;i++){
    const d=depths[i],v=vals[i];
    if(d!==null&&!isNaN(d)){if(d<dMin)dMin=d;if(d>dMax)dMax=d;}
    if(v!==null&&!isNaN(v)){if(v<vMin)vMin=v;if(v>vMax)vMax=v;}
  }
  console.log('[CC] dMin='+dMin+' dMax='+dMax+' vMin='+vMin+' vMax='+vMax);
  if(dMin===Infinity||vMin===Infinity){ console.log('[CC] NO VALID DATA'); return; }
  const vRange=vMax-vMin||1;
  vpCC={dMin,dMax};
  const xPos=d=>PL+(d-dMin)/(dMax-dMin)*(W-PL-PR);
  const yPos=v=>PT+(1-(v-vMin)/vRange)*(H-PT-PB);
  ctx.fillStyle='rgba(124,58,237,0.05)';
  ctx.fillRect(Math.max(PL,xPos(markerD-searchNeg)),PT,
    Math.min(W-PR,xPos(markerD+searchPos))-Math.max(PL,xPos(markerD-searchNeg)),H-PT-PB);
  ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const v=vMin+i*(vMax-vMin)/4,y=yPos(v);
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(2),PL-3,y+3);
  }
  if(markerD>=dMin&&markerD<=dMax){
    const mx=xPos(markerD);
    ctx.strokeStyle='rgba(100,116,139,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(mx,PT);ctx.lineTo(mx,H-PB);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#94a3b8';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText('ref: '+markerD.toFixed(0)+'m',mx,PT-4);
  }
  ctx.beginPath();ctx.strokeStyle='#7c3aed';ctx.lineWidth=1.5;
  let first=true;
  for(let i=0;i<depths.length;i++){
    if(depths[i]===null||vals[i]===null){first=true;continue;}
    const x=xPos(depths[i]),y=yPos(vals[i]);
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  }
  ctx.stroke();
  const bx=xPos(bestDepth);
  ctx.strokeStyle=peakColor;ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(bx,PT);ctx.lineTo(bx,H-PB);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=peakColor;ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillText(bestDepth.toFixed(2)+' m',bx,PT-4);
  const handleY=(PT+H-PB)/2;
  ctx.beginPath();ctx.arc(bx,handleY,6,0,Math.PI*2);
  ctx.fillStyle=peakColor;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  // X axis: show both absolute depth AND offset from marker
  ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='center';
  const dr=dMax-dMin,xs=dr<=10?1:dr<=50?5:dr<=100?10:dr<=200?20:dr<=400?50:100;
  for(let d=Math.ceil(dMin/xs)*xs;d<=dMax;d+=xs){
    const offset=d-markerD;
    const lbl=d.toFixed(0)+'m ('+(offset>=0?'+':'')+offset.toFixed(0)+')';
    ctx.fillText(lbl,xPos(d),H-8);
  }
  ctx.fillStyle='#94a3b8';ctx.font='10px system-ui';ctx.textAlign='center';
  ctx.fillText('Profundidad destino (m) | offset respecto a marker',W/2,H-1);
  // Low variance overlay
  if(lowVar){
    ctx.save();
    ctx.globalAlpha=0.7;
    ctx.fillStyle='#fef9c3';
    ctx.fillRect(PL,PT,W-PL-PR,H-PT-PB);
    ctx.globalAlpha=1;
    ctx.fillStyle='#92400e';
    ctx.font='bold 13px system-ui';
    ctx.textAlign='center';
    ctx.fillText('⚠  Curva muy plana en esta zona — correlación no confiable',W/2,(PT+H-PB)/2-10);
    ctx.font='11px system-ui';
    ctx.fillStyle='#78350f';
    ctx.fillText('Intentá con SP u otra curva, o desplazá el marker a una zona con más variación',W/2,(PT+H-PB)/2+12);
    ctx.restore();
  }
}

// CC drag
function setupCCDrag(){
  const c=document.getElementById('cCC');
  let ccDrag=null;
  c.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    const rect=c.getBoundingClientRect();
    const cx=(e.clientX-rect.left)*(c.width/rect.width);
    if(results[activeIdx]){
      const bx=CC_PL+(results[activeIdx].bestDepth-vpCC.dMin)/(vpCC.dMax-vpCC.dMin)*(c.width-CC_PL-CC_PR);
      if(Math.abs(cx-bx)<=8){ccDrag=true;e.preventDefault();}
    }
  });
  c.addEventListener('mousemove',e=>{
    const rect=c.getBoundingClientRect();
    const cx=(e.clientX-rect.left)*(c.width/rect.width);
    if(!ccDrag){
      if(results[activeIdx]){
        const bx=CC_PL+(results[activeIdx].bestDepth-vpCC.dMin)/(vpCC.dMax-vpCC.dMin)*(c.width-CC_PL-CC_PR);
        c.style.cursor=Math.abs(cx-bx)<=8?'ew-resize':'default';
      } return;
    }
    let newD=vpCC.dMin+(cx-CC_PL)/(c.width-CC_PL-CC_PR)*(vpCC.dMax-vpCC.dMin);
    newD=Math.round(Math.max(DMIN,Math.min(DMAX,newD))/0.1)*0.1;
    if(results[activeIdx]){
      const ncc2=interpCC(results[activeIdx],newD);
      results[activeIdx]={...results[activeIdx],bestDepth:newD,bestCC:ncc2};
      // In review mode: update reviewData and refresh banner
      if(reviewMode && reviewData && markers[activeIdx] && markers[activeIdx].name === reviewData.mName) {
        reviewData.newData = {...reviewData.newData, md: newD, cc: ncc2};
        // Banner refreshes on mouseup - update delta display only
        const deltaEl = document.querySelector('#reviewBanner .review-delta');
        if(deltaEl) {
          const d = newD - reviewData.existDepth;
          deltaEl.textContent = 'Δ ' + (d>=0?'+':'') + d.toFixed(2) + ' m';
        }
      }
      renderMarkerBody();renderResultsBar();renderAll();drawCCPanel(activeIdx);
    }
    e.preventDefault();
  });
  c.addEventListener('mouseup',()=>{
    if(reviewMode && reviewData && ccDrag) {
      showReviewBanner(reviewData.wL, reviewData.wR, reviewData.mName, reviewData.newData.md, reviewData.existDepth);
    }
    ccDrag=null;
  });
  c.addEventListener('mouseleave',()=>{ccDrag=null;});
}
