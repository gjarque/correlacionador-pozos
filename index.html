// ── localStorage autosave ──────────────────────────────────────────────────
const LS_KEY = 'wellCorrelProject';
let _unsavedChanges = false;

function markUnsaved() {
  _unsavedChanges = true;
  const el = document.getElementById('saveIndicator');
  if (el) { el.textContent = '● cambios sin guardar'; el.className = 'save-indicator unsaved'; }
}

function markSaved() {
  _unsavedChanges = false;
  const el = document.getElementById('saveIndicator');
  if (el) { el.textContent = '✓ guardado'; el.className = 'save-indicator saved'; }
  setTimeout(() => {
    if (!_unsavedChanges && el) { el.textContent = ''; }
  }, 3000);
}

function autoSave() {
  try {
    const state = buildProjectState();
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    const el = document.getElementById('tblAutoSave');
    if (el) { el.textContent = 'Autoguardado ' + new Date().toLocaleTimeString(); }
    markSaved();
  } catch(e) {
    console.warn('localStorage save failed:', e.message);
  }
}

function autoLoad() {
  // Only restore if DOM elements exist
  if(!document.getElementById('markerBody')) return false;
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (!state || !state.markers) return false;
    restoreProjectState(state);
    const el = document.getElementById('autoSaveInfo');
    if (el) el.textContent = 'Restaurado: ' + (state.savedAt || '');
    return true;
  } catch(e) {
    console.warn('localStorage load failed:', e.message);
    return false;
  }
}

// ── Project state ──────────────────────────────────────────────────────────
function buildProjectState() {
  const wells = Object.keys(wellState);
  return {
    savedAt: new Date().toISOString(),
    version: 2,
    wellNames: wells,
    wellLeft:  document.getElementById('wellSelectLeft')?.value  || '',
    wellRight: document.getElementById('wellSelectRight')?.value || '',
    markers: markers.map((m, i) => ({
      name:    m.name,
      depth:   m.depth,
      win:     m.win,
      sNeg:    m.sNeg,
      sPos:    m.sPos,
      notes:   markerNotes[i] || '',
      result:  results[i] ? {
        bestDepth: results[i].bestDepth,
        bestCC:    results[i].bestCC,
        peakIdx:   results[i].peakIdx || 0
      } : null
    })),
    ghostShifts: Object.fromEntries(Object.entries(ghostShifts).map(([k,v])=>[k,v])),
    validatedMarkers: Object.fromEntries(Object.entries(validatedMarkers).map(([k,v])=>[k,v])),
    accumulatedResults: JSON.parse(JSON.stringify(accumulatedResults)),
    wellMarkers: JSON.parse(JSON.stringify(wellMarkers))
  };
}

function restoreProjectState(state) {
  if (!state.markers) return;
  // Restore markers
  markers.length = 0;
  Object.keys(results).forEach(k => delete results[k]);
  Object.keys(markerNotes).forEach(k => delete markerNotes[k]);
  Object.keys(ghostShifts).forEach(k => delete ghostShifts[k]);

  state.markers.forEach((m, i) => {
    // Only restore to wellMarkers, not to active markers array
    const wL_restore = state.wellLeft || '';
    if(wL_restore && m.name && m.depth) {
      if(!wellMarkers[wL_restore]) wellMarkers[wL_restore] = [];
      if(!wellMarkers[wL_restore].find(function(wm){ return wm.name===m.name; })) {
        wellMarkers[wL_restore].push({name:m.name, depth:m.depth, win:m.win||50, sNeg:m.sNeg||150, sPos:m.sPos||150});
      }
    }
    markers.push({
      name:  m.name  || ('M'+(i+1)),
      depth: m.depth || 0,
      win:   m.win   || 50,
      sNeg:  m.sNeg  || 150,
      sPos:  m.sPos  || 150
    });
    if (m.notes) markerNotes[i] = m.notes;
    if (m.result) {
      results[i] = {
        bestDepth:  m.result.bestDepth,
        bestCC:     m.result.bestCC,
        peakIdx:    m.result.peakIdx || 0,
        depths729:  [],
        ccVals:     [],
        localPeaks: []
      };
    }
  });

  if (state.ghostShifts) {
    Object.entries(state.ghostShifts).forEach(([k,v]) => { ghostShifts[parseInt(k)] = v; });
  }
  if (state.validatedMarkers) {
    Object.keys(validatedMarkers).forEach(k => delete validatedMarkers[k]);
    Object.entries(state.validatedMarkers).forEach(([k,v]) => { validatedMarkers[parseInt(k)] = v; });
  }
  if (state.accumulatedResults) {
    Object.keys(accumulatedResults).forEach(k => delete accumulatedResults[k]);
    Object.entries(state.accumulatedResults).forEach(([k,v]) => {
      // Skip numeric keys (from old sessions)
      if(!isNaN(parseInt(k)) && String(parseInt(k)) === k) return;
      accumulatedResults[k] = v;
    });
  }
  if (state.wellMarkers && Object.keys(state.wellMarkers).length) {
    Object.keys(wellMarkers).forEach(k => delete wellMarkers[k]);
    Object.assign(wellMarkers, state.wellMarkers);
  }

  renderMarkerBody(); renderResultsBar(); renderMarkerTabs();
  renderMarkerDataTable();
  renderAll();
}

// ── Save / Load project file ───────────────────────────────────────────────

function handleProjectLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      if (!state.markers) { alert('Archivo de proyecto inválido.'); return; }
      restoreProjectState(state);
      alert('Proyecto cargado: ' + state.markers.length + ' markers.');
    } catch(err) {
      alert('Error al cargar proyecto: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Marker data table (Tab Tabla) ──────────────────────────────────────────
function renderMarkerDataTable() {
  var tbody = document.getElementById('markerDataTableBody');
  var stats = document.getElementById('tblStats');
  if(!tbody) return;

  var getN = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){ var v=parseFloat(t[j]); if(!isNaN(v)) return v; } return 0; };
  var esc = function(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); };

  // Build flat list: one row per well+marker with definitive value
  // Source: wellMarkers (definitive depth) + accumulatedResults (CC, validated)
  var rows = [];
  var allWells = new Set([...Object.keys(loadedWells), ...Object.keys(wellMarkers)]);

  // Collect all marker names across all wells
  var allMarkerNames = new Set();
  Object.keys(wellMarkers).forEach(function(wn) {
    (wellMarkers[wn]||[]).forEach(function(m){ allMarkerNames.add(m.name); });
  });
  // Also from current markers[]
  markers.forEach(function(m){ allMarkerNames.add(m.name); });

  allWells.forEach(function(wellName) {
    var wData = loadedWells[wellName];
    var elev  = wData ? getN(wData.meta && wData.meta.ELEV)   : (_wellCoords[wellName]&&_wellCoords[wellName].elev||0);
    var xCoord= wData ? getN(wData.meta && wData.meta.XCOORD) : (_wellCoords[wellName]&&_wellCoords[wellName].x||'');
    var yCoord= wData ? getN(wData.meta && wData.meta.YCOORD) : (_wellCoords[wellName]&&_wellCoords[wellName].y||'');

    var wms = wellMarkers[wellName] || [];
    // Also include markers from current ORIGEN if this is the current well
    var curOrigin = document.getElementById('wellSelectLeft')?.value || '';
    if(wellName === curOrigin && markers.length) {
      markers.forEach(function(m) {
        if(!wms.find(function(w){ return w.name===m.name; })) {
          wms = wms.concat([m]);
        }
      });
    }

    if(wms.length === 0) {
      // Well loaded but no markers - show placeholder
      rows.push({ wellName: wellName, markerName: '—', md: null, tvdss: null,
        x: xCoord, y: yCoord, elev: elev, cc: null, validated: false, notes: '', isPlaceholder: true });
    } else {
      wms.forEach(function(m) {
        // Find best CC and validated status from accumulatedResults
        var bestCC = null, validated = false, notes = '';
        // Check if this well was a DESTINO
        Object.keys(accumulatedResults).forEach(function(orig) {
          // Check as destino
          var acc = getAcc(orig, m.name, wellName);
          if(acc) {
            if(acc.cc !== undefined && acc.cc !== null) bestCC = acc.cc;
            if(acc.validated) validated = true;
            if(acc.notes) notes = acc.notes;
          }
        });
        // Check if this well was an ORIGEN (use its own marker's notes)
        if(wellMarkers[wellName]) {
          var wm = wellMarkers[wellName].find(function(w){ return w.name===m.name; });
          if(wm && wm.notes) notes = wm.notes;
        }
        var md = m.depth;
        var tvdss = elev && md ? elev - md : null;
        rows.push({ wellName: wellName, markerName: m.name, md: md,
          tvdss: tvdss, x: xCoord, y: yCoord, elev: elev,
          cc: bestCC, validated: validated, notes: notes, isPlaceholder: false });
      });
    }
  });

  // Sort: by marker name, then by well name
  rows.sort(function(a,b){
    if(a.markerName < b.markerName) return -1;
    if(a.markerName > b.markerName) return 1;
    if(a.wellName < b.wellName) return -1;
    if(a.wellName > b.wellName) return 1;
    return 0;
  });

  var html_rows = '';
  var lastMarker = null;
  rows.forEach(function(row) {
    // Separator between marker groups
    if(row.markerName !== lastMarker && lastMarker !== null) {
      html_rows += '<tr style="height:4px;background:#e2e8f0"><td colspan="12"></td></tr>';
    }
    lastMarker = row.markerName;

    var rowkey = row.wellName+'|'+row.markerName;
    var isChecked = _selectedRows.has(rowkey);
    var isVal = row.validated;
    var rowBg = isVal ? 'background:#f0fdf4' : 'background:#fff';

    html_rows += '<tr style="border-bottom:1px solid #f1f5f9;'+rowBg+';cursor:pointer" data-rowkey="'+rowkey+'" data-well="'+esc(row.wellName)+'" data-marker="'+esc(row.markerName)+'">';
    html_rows += '<td style="padding:4px;text-align:center"><input type="checkbox" '+(isChecked?'checked':'')+' class="row-cb" data-rowkey="'+rowkey+'" onclick="event.stopPropagation()"></td>';

    // Well name (colored by group like visor)
    html_rows += '<td style="padding:6px 8px;font-weight:700;font-size:12px;color:#2563eb;cursor:pointer" onclick="event.stopPropagation();focusWellInVisor(\''+esc(row.wellName)+'\')">' + esc(row.wellName) + '</td>';

    // Marker with color dot
    if(!row.isPlaceholder) {
      var mIdx = markers.findIndex(function(m){ return m.name===row.markerName; });
      var dotColor = mIdx>=0 ? col(mIdx) : '#94a3b8';
      html_rows += '<td style="padding:6px 8px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+dotColor+';margin-right:4px"></span>'+esc(row.markerName)+'</td>';
    } else {
      html_rows += '<td style="padding:6px 8px;color:#94a3b8">—</td>';
    }

    // MD (editable)
    if(row.md !== null) {
      html_rows += '<td style="padding:4px 6px;text-align:right"><input type="number" step="0.1" value="'+row.md.toFixed(2)+'" '+
        'style="width:70px;font-size:11px;font-family:monospace;padding:2px 4px;border:1px solid transparent;border-radius:3px;background:transparent;color:inherit;text-align:right" '+
        'onchange="event.stopPropagation();updateWellMarkerDepth(\''+esc(row.wellName)+'\',\''+esc(row.markerName)+'\',parseFloat(this.value))" '+
        'onclick="event.stopPropagation()" '+
        'onfocus="this.style.background=\'#fff\';this.style.border=\'1px solid #3b82f6\';this.style.color=\'#1e293b\'" '+
        'onblur="this.style.background=\'transparent\';this.style.border=\'1px solid transparent\';this.style.color=\'inherit\'"></td>';
    } else {
      html_rows += '<td style="padding:6px 8px;text-align:right;color:#94a3b8">—</td>';
    }

    // TVDSS
    html_rows += '<td style="padding:6px 8px;text-align:right;font-family:monospace;font-size:11px;color:#3b82f6">' + (row.tvdss!==null ? row.tvdss.toFixed(2) : '—') + '</td>';
    // X Y Cota
    html_rows += '<td style="padding:6px 8px;text-align:right;font-family:monospace;font-size:11px">' + (row.x ? Number(row.x).toFixed(0) : '') + '</td>';
    html_rows += '<td style="padding:6px 8px;text-align:right;font-family:monospace;font-size:11px">' + (row.y ? Number(row.y).toFixed(0) : '') + '</td>';
    html_rows += '<td style="padding:6px 8px;text-align:right;font-family:monospace;font-size:11px">' + (row.elev ? row.elev.toFixed(2) : '—') + '</td>';
    // CC
    var ccBg = row.cc!==null ? (row.cc>=0.7?'background:#16a34a;color:#fff':row.cc>=0.4?'background:#ca8a04;color:#fff':'background:#dc2626;color:#fff') : '';
    html_rows += '<td style="padding:4px 6px;text-align:center"><span style="'+ccBg+';border-radius:4px;padding:2px 5px;font-size:11px;font-weight:600">'+(row.cc!==null?row.cc.toFixed(3):'')+'</span></td>';
    // Validated checkbox
    html_rows += '<td style="padding:6px 8px;text-align:center"><label onclick="event.stopPropagation()" style="cursor:pointer">'+
      '<input type="checkbox"'+(isVal?' checked':'')+
      ' onchange="event.stopPropagation();toggleWellMarkerValidation(\''+esc(row.wellName)+'\',\''+esc(row.markerName)+'\',this.checked)" '+
      'onclick="event.stopPropagation()" '+
      'style="width:15px;height:15px;cursor:pointer;accent-color:#059669">'+
      (isVal?' <span style="font-size:9px;color:#059669;font-weight:700">OK</span>':'')+'</label></td>';
    // Notes
    html_rows += '<td style="padding:4px 6px"><input type="text" class="note-input-flat" data-well="'+esc(row.wellName)+'" data-marker="'+esc(row.markerName)+'" placeholder="nota..." '+
      'style="width:100%;font-size:11px;padding:2px 6px;border:1px solid transparent;border-radius:3px;background:transparent;color:inherit"></td>';
    html_rows += '</tr>';
  });

  tbody.innerHTML = html_rows;

  // Populate filters
  populateTableFilters();
  filterTable();

  // Notes events
  tbody.querySelectorAll('.note-input-flat').forEach(function(inp) {
    var wn = inp.dataset.well, mn = inp.dataset.marker;
    // Load existing note
    var note = '';
    Object.keys(accumulatedResults).forEach(function(orig) {
      var acc = getAcc(orig, mn, wn);
      if(acc && acc.notes) note = acc.notes;
    });
    if(!note && wellMarkers[wn]) {
      var wm = wellMarkers[wn] && wellMarkers[wn].find(function(m){ return m.name===mn; });
      if(wm && wm.notes) note = wm.notes;
    }
    inp.value = note;
    inp.addEventListener('change', function(e){ e.stopPropagation(); saveFlatNote(wn, mn, inp.value); });
    inp.addEventListener('click', function(e){ e.stopPropagation(); });
    inp.addEventListener('focus', function(){ inp.style.background='#fff'; inp.style.border='1px solid #3b82f6'; inp.style.color='#1e293b'; });
    inp.addEventListener('blur',  function(){ inp.style.background='transparent'; inp.style.border='1px solid transparent'; inp.style.color='inherit'; });
  });

  // Row click and checkbox events
  tbody.querySelectorAll('tr[data-rowkey]').forEach(function(tr) {
    tr.addEventListener('click', function(e) {
      if(e.target.tagName==='INPUT') return;
      var well = tr.dataset.well;
      if(well) focusWellInVisor(well);
      tbody.querySelectorAll('tr').forEach(function(r){ r.style.outline=''; });
      tr.style.outline='2px solid #6366f1';
    });
  });
  tbody.querySelectorAll('.row-cb').forEach(function(cb) {
    cb.addEventListener('change', function(e){ e.stopPropagation(); toggleRowSelect(cb.dataset.rowkey, cb.checked); });
  });

  // Stats
  var total = rows.filter(function(r){ return !r.isPlaceholder; }).length;
  var validated = rows.filter(function(r){ return r.validated; }).length;
  if(stats) stats.textContent = total+' markers | '+validated+' validados';
}


function updateMarkerDepthByName(origenWell, markerName, newDepth) {
  if(isNaN(newDepth) || newDepth < 0) return;
  // Update in markers[] if current origen
  const curOrigin = document.getElementById('wellSelectLeft')?.value || '';
  if(curOrigin === origenWell) {
    const mi = markers.findIndex(function(m){ return m.name === markerName; });
    if(mi >= 0) { markers[mi].depth = newDepth; renderAll(); if(results[mi]) requestAnimationFrame(function(){ drawCCPanel(mi); }); }
  }
  // Update in wellMarkers
  if(wellMarkers[origenWell]) {
    const wm = wellMarkers[origenWell].find(function(m){ return m.name === markerName; });
    if(wm) wm.depth = newDepth;
  }
  renderMarkerBody(); renderResultsBar();
  setTimeout(function(){ renderMarkerDataTable(); }, 50);
  markUnsaved(); setTimeout(autoSave, 500);
}

function updateAccDepth(origenWell, markerName, destinoWell, newDepth) {
  if(isNaN(newDepth) || newDepth < 0) return;
  const acc = getAcc(origenWell, markerName, destinoWell);
  if(acc) {
    acc.md = newDepth;
    // Recalculate TVDSS
    const wR_data = loadedWells[destinoWell];
    if(wR_data) {
      const t = String(wR_data.meta && wR_data.meta.ELEV || '0').split(/\s+/).filter(Boolean);
      let elev = 0;
      for(var j=t.length-1;j>=0;j--){ var v=parseFloat(t[j]); if(!isNaN(v)){elev=v;break;} }
      // Also check _wellCoords
      if(!elev && _wellCoords[destinoWell] && _wellCoords[destinoWell].elev) {
        elev = _wellCoords[destinoWell].elev;
      }
      acc.tvdss = elev - newDepth;
      acc.elev = elev;
    }
    setAcc(origenWell, markerName, destinoWell, acc);

    // ── Sync to wellMarkers[destinoWell] so it acts as correct ORIGEN later ──
    if(!wellMarkers[destinoWell]) wellMarkers[destinoWell] = [];
    var wmDest = wellMarkers[destinoWell].find(function(m){ return m.name === markerName; });
    if(wmDest) {
      // Update existing marker
      wmDest.depth = newDepth;
    } else {
      // Create new marker entry for this well
      var srcMarker = wellMarkers[origenWell] && wellMarkers[origenWell].find(function(m){ return m.name === markerName; });
      wellMarkers[destinoWell].push({
        name:  markerName,
        depth: newDepth,
        win:   srcMarker ? srcMarker.win  : 50,
        sNeg:  srcMarker ? srcMarker.sNeg : 150,
        sPos:  srcMarker ? srcMarker.sPos : 150,
        notes: ''
      });
    }

    // Update results[] if currently showing this pair
    const wells_ = Object.keys(wellState);
    if(wells_[0] === origenWell && wells_[1] === destinoWell) {
      const mi = markers.findIndex(function(m){ return m.name === markerName; });
      if(mi >= 0 && results[mi]) { results[mi].bestDepth = newDepth; renderAll(); requestAnimationFrame(function(){ drawCCPanel(mi); }); }
    }
  }
  setTimeout(function(){ renderMarkerDataTable(); }, 50);
  markUnsaved(); setTimeout(autoSave, 500);
}


function saveNote(origenWell, markerName, destinoWell, text) {
  var acc = getAcc(origenWell, markerName, destinoWell);
  if(acc) { acc.notes = text; setAcc(origenWell, markerName, destinoWell, acc); }
  markUnsaved(); setTimeout(autoSave, 500);
}

function saveOriginNote(origenWell, markerName, text) {
  if(wellMarkers[origenWell]) {
    var m = wellMarkers[origenWell].find(function(m){ return m.name===markerName; });
    if(m) m.notes = text;
  }
  markUnsaved(); setTimeout(autoSave, 500);
}

function toggleValidationByName(origenWell, markerName, destinoWell) {
  var existing = getAcc(origenWell, markerName, destinoWell);
  if(existing) {
    existing.validated = !existing.validated;
    setAcc(origenWell, markerName, destinoWell, existing);

    // When validating: sync depth to wellMarkers[destinoWell] as definitive origin
    if(existing.validated && existing.md) {
      // Unvalidate all other correlations for same destino+marker
      Object.keys(accumulatedResults).forEach(function(otherOrig) {
        if(otherOrig === origenWell) return;
        var otherAcc = getAcc(otherOrig, markerName, destinoWell);
        if(otherAcc && otherAcc.validated) {
          otherAcc.validated = false;
          setAcc(otherOrig, markerName, destinoWell, otherAcc);
        }
      });
      if(!wellMarkers[destinoWell]) wellMarkers[destinoWell] = [];
      var wmD = wellMarkers[destinoWell].find(function(m){ return m.name === markerName; });
      if(wmD) {
        wmD.depth = existing.md;
      } else {
        var srcM = wellMarkers[origenWell] && wellMarkers[origenWell].find(function(m){ return m.name === markerName; });
        wellMarkers[destinoWell].push({
          name: markerName, depth: existing.md,
          win:  srcM ? srcM.win  : 50,
          sNeg: srcM ? srcM.sNeg : 150,
          sPos: srcM ? srcM.sPos : 150,
          notes: ''
        });
      }
      // Also update markers[] if destinoWell is current ORIGEN
      var curOrigin = document.getElementById('wellSelectLeft')?.value || '';
      if(curOrigin === destinoWell) {
        var mi = markers.findIndex(function(m){ return m.name === markerName; });
        if(mi >= 0) {
          markers[mi].depth = existing.md;
          renderMarkerBody(); renderAll();
        }
      }
    }

    markUnsaved(); setTimeout(autoSave, 500);
    renderMarkerDataTable();
    renderMarkerBody();
  }
}

function importMarkersExcel(input) {
  console.log('[ImportMarkers] called, files:', input.files.length);
  var file = input.files[0];
  if(!file) return;
  console.log('[ImportMarkers] file:', file.name, 'size:', file.size);
  var ext = file.name.split('.').pop().toLowerCase();
  var reader = new FileReader();

  reader.onload = function(e) {
    var rows = [];
    try {
      if(ext === 'csv') {
        // Remove BOM if present
        var text = e.target.result.replace(/^\uFEFF/, '').replace(/^\xEF\xBB\xBF/, '');
        var lines = text.split(/\r?\n/).filter(Boolean);
        // Detect separator: ; or , or tab
        var sep = lines[0].includes(';') ? ';' : lines[0].includes('\t') ? '\t' : ',';
        var header = lines[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/[^a-z0-9]/g,'');});
        var iPoz  = header.findIndex(function(h){return /pozo|well/.test(h);});
        var iMark = header.findIndex(function(h){return /marker|name|nombre/.test(h);});
        var iMD   = header.findIndex(function(h){return /^md$|depth|prof/.test(h);});
        if(iPoz<0||iMark<0||iMD<0){ alert('Columnas no reconocidas. Necesito: Pozo, Marker, MD\n\nEncabezados encontrados: ' + header.join(', ')); return; }
        lines.slice(1).forEach(function(line){
          var cols = line.split(sep);
          var well=(cols[iPoz]||'').trim(), name=(cols[iMark]||'').trim(), md=parseFloat(cols[iMD]);
          if(well&&name&&!isNaN(md)) rows.push({well:well,name:name,md:md});
        });
      } else {
        if(typeof XLSX==='undefined'){
          document.getElementById('importMarkersDialog')?.remove();
          showXlsxHelpDialog();
          return;
        }
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var data=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!data.length){alert('Hoja vacía.');return;}
        var origKeys=Object.keys(data[0]);
        var keys=origKeys.map(function(k){return k.toLowerCase();});
        var iPoz  = keys.findIndex(function(h){return /pozo|well/.test(h);});
        var iMark = keys.findIndex(function(h){return /marker|name|nombre/.test(h);});
        var iMD   = keys.findIndex(function(h){return /^md$|depth|prof/.test(h);});
        if(iPoz<0||iMark<0||iMD<0){alert('Columnas no reconocidas. Necesito: Pozo, Marker, MD');return;}
        data.forEach(function(row){
          var well=String(row[origKeys[iPoz]]||'').trim(), name=String(row[origKeys[iMark]]||'').trim(), md=parseFloat(row[origKeys[iMD]]);
          if(well&&name&&!isNaN(md)) rows.push({well:well,name:name,md:md});
        });
      }
    } catch(err){ alert('Error: '+err.message); return; }

    if(!rows.length){alert('No se encontraron filas válidas.');return;}

    // Group by well
    var byWell={};
    rows.forEach(function(r){
      if(!byWell[r.well]) byWell[r.well]=[];
      byWell[r.well].push({name:r.name,depth:r.md,win:50,sNeg:150,sPos:150});
    });

    // Show confirm dialog (only found wells will be passed back)
    console.log('[ImportMarkers] byWell:', Object.keys(byWell), 'rows:', rows.length);
    showImportConfirmDialog(byWell, function(foundWells){
      // Apply import - only wells that are loaded
      Object.entries(foundWells).forEach(function(e){ wellMarkers[e[0]]=e[1]; });

      // Load markers for current ORIGEN
      var curOrigin=document.getElementById('wellSelectLeft')?.value||'';
      if(curOrigin && wellMarkers[curOrigin]) {
        markers.length=0;
        Object.keys(results).forEach(function(k){delete results[k];});
        wellMarkers[curOrigin].forEach(function(m){
          var bestDepth2 = m.depth;
          Object.keys(accumulatedResults).forEach(function(prevOrigen) {
            if(prevOrigen === curOrigin) return;
            var acc = getAcc(prevOrigen, m.name, curOrigin);
            if(acc && acc.md && !isNaN(acc.md)) bestDepth2 = acc.md;
          });
          markers.push({name:m.name,depth:bestDepth2,win:m.win||50,sNeg:m.sNeg||150,sPos:m.sPos||150});
        });
        activeIdx=0;
      }
      renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderAll();
      renderMarkerDataTable();
      markUnsaved(); setTimeout(autoSave,500);
    });
  };

  if(ext==='csv') reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

// ── Cross-validation ───────────────────────────────────────────────────────

function startCrossValidation() {
  // Get current ORIGEN and DESTINO
  const wL = document.getElementById('wellSelectLeft')?.value || '';
  const wR = document.getElementById('wellSelectRight')?.value || '';
  if (!wL || !wR || wL === wR) {
    alert('Seleccioná dos pozos distintos como ORIGEN y DESTINO.'); return;
  }

  // Strategy: find a "reference well" that has correlated against BOTH wL and wR
  // OR find direct correlations from any well to wL that we can use as markers
  
  // Option 1: wL has results against wR directly
  var available = [];
  var refOrigin = null;
  var accForOrigen = accumulatedResults[wL];
  if(accForOrigen) {
    const direct = Object.keys(accForOrigen).filter(function(mn){
      return accForOrigen[mn] && accForOrigen[mn][wR];
    });
    if(direct.length) { available = direct; refOrigin = wL; }
  }

  // Option 2: find another well that correlated against wL as destino
  // Use those results as the provisional markers for wL
  if(!available.length) {
    Object.keys(accumulatedResults).forEach(function(origWell) {
      if(origWell === wL || origWell === wR) return;
      const accOrig = accumulatedResults[origWell];
      const viaOrig = Object.keys(accOrig).filter(function(mn){
        return accOrig[mn] && accOrig[mn][wL];
      });
      if(viaOrig.length > available.length) {
        available = viaOrig;
        refOrigin = origWell;
        accForOrigen = accOrig;
      }
    });
  }

  if(!available.length || !refOrigin) {
    alert('No hay correlaciones disponibles para ' + wL + '. Primero correlacioná ' + wL + ' contra otro pozo.'); 
    return;
  }

  // Show confirmation dialog
  showCrossValDialog(wL, wR, available, accForOrigen, refOrigin);
}

function activateCrossVal(wL, wR) {
  crossValActive = true;
  provisionalMarkers = {};

  const {win:gWin, sNeg:gSNeg, sPos:gSPos} = getGlobalParams();

  // Provisional markers = expected positions in wR (DESTINO)
  // Source: any common origin that correlated against BOTH wL and wR
  var markerSource = {}; // markerName -> expected depth in wR

  Object.keys(accumulatedResults).forEach(function(origWell) {
    var acc = accumulatedResults[origWell];
    Object.keys(acc).forEach(function(mn) {
      // This origin has a result for wR — use that as the expected position
      if(acc[mn] && acc[mn][wR] && !markerSource[mn]) {
        markerSource[mn] = acc[mn][wR].md;
      }
    });
  });

  // Also check if wL has direct results against wR
  if(accumulatedResults[wL]) {
    Object.keys(accumulatedResults[wL]).forEach(function(mn) {
      if(accumulatedResults[wL][mn] && accumulatedResults[wL][mn][wR]) {
        markerSource[mn] = accumulatedResults[wL][mn][wR].md;
      }
    });
  }

  if(!Object.keys(markerSource).length) {
    alert('No se encontraron correlaciones previas para ' + wR + '. Primero correlacioná un pozo común contra ' + wR + '.');
    crossValActive = false;
    return;
  }

  // Store provisional markers (expected positions in DESTINO = wR)
  Object.entries(markerSource).forEach(function(entry) {
    provisionalMarkers[entry[0]] = {
      name: entry[0], depth: entry[1],
      win: gWin, sNeg: gSNeg, sPos: gSPos
    };
  });

  // Keep current ORIGEN markers intact — don't replace
  // Just run correlation with current markers against wR
  Object.keys(results).forEach(function(k){ delete results[k]; });

  renderMarkerBody(); renderMarkerTabs(); renderAll();
  runAll();
  showCrossValBanner(wL, wR);
}

function showCrossValBanner(wL, wR) {
  document.getElementById('crossValBanner')?.remove();
  const banner = document.createElement('div');
  banner.id = 'crossValBanner';
  banner.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:99990;' +
    'background:#4c1d95;color:#e9d5ff;padding:8px 20px;border-radius:0 0 8px 8px;' +
    'display:flex;align-items:center;gap:12px;font-family:system-ui;font-size:13px;' +
    'box-shadow:0 4px 12px rgba(0,0,0,.3)';
  banner.innerHTML =
    '<span>🔄 <b>Modo validación cruzada:</b> ' + wL + ' → ' + wR + ' (markers provisorios)</span>' +
    '<button onclick="acceptCrossVal(\'' + wL + '\',\'' + wR + '\')" ' +
      'style="padding:5px 14px;background:#059669;color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px">✓ Aceptar</button>' +
    '<button onclick="cancelCrossVal()" ' +
      'style="padding:5px 14px;background:#dc2626;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px">✕ Cancelar</button>';
  document.body.appendChild(banner);
}

function acceptCrossVal(wL, wR) {
  // Save cross-validation results to accumulatedResults
  // Using wR as the new origen, and current DESTINO as destinoWell
  const wDest = document.getElementById('wellSelectRight')?.value || '';
  if(!wDest || wDest === wR) { alert('Seleccioná un pozo DESTINO diferente a ' + wR); return; }

  markers.forEach(function(m, i) {
    if(!results[i]) return;
    const r = results[i];
    const wDest_data = loadedWells[wDest];
    const getN = function(s){ var t=String(s||'').split(/\s+/).filter(Boolean); for(var j=t.length-1;j>=0;j--){var v=parseFloat(t[j]);if(!isNaN(v))return v;} return 0; };
    const elevD = wDest_data ? getN(wDest_data.meta && wDest_data.meta.ELEV) : 0;
    setAcc(wR, m.name, wDest, {
      md: r.bestDepth, tvdss: elevD - r.bestDepth,
      x: wDest_data ? getN(wDest_data.meta && wDest_data.meta.XCOORD) : '',
      y: wDest_data ? getN(wDest_data.meta && wDest_data.meta.YCOORD) : '',
      elev: elevD, cc: r.bestCC, validated: false
    });
  });

  cancelCrossVal();
  renderMarkerDataTable();
  alert('Correlación cruzada guardada en la tabla de resultados.');
}

function cancelCrossVal() {
  crossValActive = false;
  provisionalMarkers = {};
  document.getElementById('crossValBanner')?.remove();
  // Restore markers from wellMarkers for current ORIGEN
  const curOrigin = document.getElementById('wellSelectLeft')?.value || '';
  markers.length = 0;
  Object.keys(results).forEach(k => delete results[k]);
  console.log('[WellChange] curOrigin='+curOrigin+' wellMarkers='+JSON.stringify(wellMarkers[curOrigin]||null)+' accKeys='+JSON.stringify(Object.keys(accumulatedResults)));
  if(curOrigin && wellMarkers[curOrigin]) {
    wellMarkers[curOrigin].forEach(function(m){
      // Opción A: check if this well was a DESTINO in a previous correlation
      var bestDepth = m.depth;
      Object.keys(accumulatedResults).forEach(function(prevOrigen) {
        if(prevOrigen === curOrigin) return;
        var acc = getAcc(prevOrigen, m.name, curOrigin);
        console.log('[OpcionA] checking acc['+prevOrigen+']['+m.name+']['+curOrigin+']='+JSON.stringify(acc));
        if(acc && acc.md && !isNaN(acc.md)) {
          bestDepth = acc.md;
        }
      });
      markers.push({name:m.name, depth:bestDepth, win:m.win||50, sNeg:m.sNeg||150, sPos:m.sPos||150});
    });
  }
  activeIdx = 0;
  renderMarkerBody(); renderResultsBar(); renderMarkerTabs(); renderAll();
}

// ── Gauss-Krüger → WGS84 ──────────────────────────────────────────
function gkToLatLon(xRaw, yRaw) {
  const prefix = Math.floor(xRaw / 1000000);
  const fajaMap = {1:{cm:-72,fe:1500000},2:{cm:-69,fe:2500000},
                   3:{cm:-66,fe:3500000},4:{cm:-63,fe:4500000},5:{cm:-60,fe:5500000}};
  const faja = fajaMap[prefix] || fajaMap[2];
  const a=6378137, fi=1/298.257222101, b=a*(1-fi), e2=1-(b/a)**2, k0=1;
  const lon0 = faja.cm * Math.PI/180;
  const x = xRaw - faja.fe, y = yRaw - 10000000;
  const M=y/k0, mu=M/(a*(1-e2/4-3*e2**2/64-5*e2**3/256));
  const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const phi1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const N1=a/Math.sqrt(1-e2*Math.sin(phi1)**2), T1=Math.tan(phi1)**2;
  const R1=a*(1-e2)/(1-e2*Math.sin(phi1)**2)**1.5, D=x/(N1*k0);
  const lat=phi1-(N1*Math.tan(phi1)/R1)*(D**2/2-(5+3*T1)*D**4/24);
  const lon=lon0+(D-(1+2*T1)*D**3/6)/Math.cos(phi1);
  return {lat:lat*180/Math.PI, lon:lon*180/Math.PI};
}

function extractWellCoords(well) {
  if (!well.meta) return null;
  const parseLastNum = s => {
    const tokens = String(s).split(/\s+/).filter(Boolean);
    for (let i=tokens.length-1; i>=0; i--) {
      const v = parseFloat(tokens[i]);
      if (!isNaN(v) && Math.abs(v) > 0.001) return v;
    }
    return 0;
  };
  const x = parseLastNum(well.meta.XCOORD || well.meta.X || well.meta.EASTING || '');
  const y = parseLastNum(well.meta.YCOORD || well.meta.Y || well.meta.NORTHING || '');
  if (!x || !y) return null;
  if (Math.abs(x) > 180 || Math.abs(y) > 90) return gkToLatLon(x, y);
  return {lat: y, lon: x};
}

// ── Map state ─────────────────────────────────────────────────────

// lat/lon → canvas pixel
function latLonToCanvas(lat, lon) {
  const c = _mapCanvas;
  if (!c) return {x:0,y:0};
  const cx = c.width/2  + (lon - _mapView.lon) * _mapView.zoom;
  const cy = c.height/2 - (lat - _mapView.lat) * _mapView.zoom * 1.5; // approx Mercator
  return {x:cx, y:cy};
}
function canvasToLatLon(px, py) {
  const c = _mapCanvas;
  if (!c) return {lat:0,lon:0};
  return {
    lat: _mapView.lat + (c.height/2 - py) / (_mapView.zoom * 1.5),
    lon: _mapView.lon + (px - c.width/2) / _mapView.zoom
  };
}

function initMap() {
  if (_mapInitialized) { renderMap(); return; }
  const vp = document.getElementById('mapViewport');
  const c  = document.getElementById('mapCanvas');
  if (!vp || !c) return;

  // Force canvas to fill viewport — use offsetWidth as fallback
  const vpW = vp.offsetWidth  || vp.clientWidth  || 600;
  const vpH = vp.offsetHeight || vp.clientHeight || 400;
  c.width  = vpW;
  c.height = vpH;
  c.style.width  = '100%';
  c.style.height = '100%';
  c.style.display = 'block';
  _mapCanvas = c;
  _mapCtx = c.getContext('2d');
  console.log('[Map] Canvas size:', c.width, c.height);

  // Mouse drag to pan
  c.addEventListener('mousedown', e => {
    _mapDrag = {sx: e.clientX, sy: e.clientY, lat: _mapView.lat, lon: _mapView.lon};
    c.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!_mapDrag) {
      // Show coords on hover
      if (e.target === c) {
        const rect = c.getBoundingClientRect();
        const pos = canvasToLatLon(e.clientX-rect.left, e.clientY-rect.top);
        const el = document.getElementById('mapCoordInfo');
        if (el) el.textContent = pos.lat.toFixed(4)+'°, '+pos.lon.toFixed(4)+'°';
      }
      return;
    }
    const dx = e.clientX - _mapDrag.sx;
    const dy = e.clientY - _mapDrag.sy;
    _mapView.lat = _mapDrag.lat + dy / (_mapView.zoom * 1.5);
    _mapView.lon = _mapDrag.lon - dx / _mapView.zoom;
    renderMap();
  });
  window.addEventListener('mouseup', () => {
    _mapDrag = null;
    if (_mapCanvas) _mapCanvas.style.cursor = 'grab';
  });
  // Scroll wheel zoom
  c.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = c.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const before = canvasToLatLon(mx, my);
    _mapView.zoom *= e.deltaY < 0 ? 1.15 : 0.87;
    _mapView.zoom = Math.max(20, Math.min(50000, _mapView.zoom));
    const after = canvasToLatLon(mx, my);
    _mapView.lat += before.lat - after.lat;
    _mapView.lon += before.lon - after.lon;
    renderMap();
  }, {passive:false});
  // Resize observer
  new ResizeObserver(() => {
    c.width  = vp.clientWidth  || 600;
    c.height = vp.clientHeight || 400;
    renderMap();
  }).observe(vp);

  _mapInitialized = true;

  // If coords already loaded, fit to them
  if(Object.keys(_wellCoords).length > 0 || Object.keys(loadedWells).length > 0) {
    setTimeout(mapFitAll, 50);
  }

  // ResizeObserver: resize canvas pixel dimensions when container changes
  if(window.ResizeObserver) {
    var _mapRafPending = false;
    const _mapRO = new ResizeObserver(function(entries) {
      if(_mapRafPending) return;
      _mapRafPending = true;
      requestAnimationFrame(function() {
        _mapRafPending = false;
        const vp2 = document.getElementById('mapViewport');
        if(!vp2 || !_mapCanvas) return;
        const w = vp2.clientWidth;
        const h = vp2.clientHeight;
        if(w > 10 && h > 10) {
          const saveLat = _mapView.lat;
          const saveLon = _mapView.lon;
          _mapCanvas.width  = w;
          _mapCanvas.height = h;
          _mapCanvas.style.width  = w + 'px';
          _mapCanvas.style.height = h + 'px';
          _mapView.lat = saveLat;
          _mapView.lon = saveLon;
          renderMap();
        }
      });
    });
    _mapRO.observe(vp);
  }

  renderMap();
}

function mapZoom(dir) {
  _mapView.zoom *= dir > 0 ? 1.3 : 0.77;
  _mapView.zoom = Math.max(20, Math.min(50000, _mapView.zoom));
  renderMap();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function renderMap() {
  const c = _mapCanvas, ctx = _mapCtx;
  if (!c || !ctx) return;
  const W = c.width, H = c.height;

  // Background
  ctx.fillStyle = '#e8f0f8';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (lat/lon graticule)
  ctx.strokeStyle = 'rgba(100,130,180,0.2)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3,3]);
  const gridStep = _mapView.zoom < 100 ? 5 : _mapView.zoom < 500 ? 1 : _mapView.zoom < 2000 ? 0.5 : 0.1;
  const minLon = canvasToLatLon(0,0).lon, maxLon = canvasToLatLon(W,0).lon;
  const minLat = canvasToLatLon(0,H).lat, maxLat = canvasToLatLon(0,0).lat;
  for (let lon = Math.ceil(minLon/gridStep)*gridStep; lon <= maxLon; lon += gridStep) {
    const p = latLonToCanvas(minLat, lon);
    ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x, H); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='9px system-ui'; ctx.textAlign='center';
    ctx.fillText(lon.toFixed(gridStep<1?1:0)+'°', p.x, H-4);
  }
  for (let lat = Math.ceil(minLat/gridStep)*gridStep; lat <= maxLat; lat += gridStep) {
    const p = latLonToCanvas(lat, minLon);
    ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(W, p.y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='9px system-ui'; ctx.textAlign='left';
    ctx.fillText(lat.toFixed(gridStep<1?1:0)+'°', 4, p.y-3);
  }
  ctx.setLineDash([]);

  // Compass rose (top RIGHT corner, always visible near wells)
  const cr = {x: W-24, y:28, r:12};
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.arc(cr.x, cr.y, cr.r+4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e293b'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
  ctx.fillText('N', cr.x, cr.y-cr.r+1);
  ctx.beginPath(); ctx.moveTo(cr.x, cr.y-cr.r+3); ctx.lineTo(cr.x-4, cr.y+4);
  ctx.lineTo(cr.x, cr.y+1); ctx.fillStyle='#1e293b'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(cr.x, cr.y-cr.r+3); ctx.lineTo(cr.x+4, cr.y+4);
  ctx.lineTo(cr.x, cr.y+1); ctx.fillStyle='#94a3b8'; ctx.fill();
  ctx.restore();

  // Scale bar (bottom LEFT, near wells)
  const scaleMeters = 111000 / _mapView.zoom * 80;
  const niceDist = niceNumber(scaleMeters);
  const barPx = niceDist / scaleMeters * 80;
  const bx = 16, by = H-10;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(bx-4, by-18, barPx+8, 22);
  ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(bx,by-4); ctx.lineTo(bx+barPx,by-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,by-8); ctx.lineTo(bx,by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+barPx,by-8); ctx.lineTo(bx+barPx,by); ctx.stroke();
  ctx.fillStyle='#1e293b'; ctx.font='bold 10px system-ui'; ctx.textAlign='center';
  ctx.fillText(niceDist>=1000?(niceDist/1000).toFixed(1)+'km':niceDist+'m', bx+barPx/2, by-8);
  ctx.restore();

  // Well selectors
  const wells = Object.keys(wellState);
  const wL = wells[0], wR = wells[1];

  // Draw connections between ORIGEN and DESTINO
  const allCoords = {};
  // Wells from LAS files
  Object.entries(loadedWells).forEach(([name, well]) => {
    const coords = extractWellCoords(well);
    if (coords) allCoords[name] = coords;
  });
  // Wells from external coords CSV (even without LAS)
  Object.entries(_wellCoords).forEach(([name, entry]) => {
    if(allCoords[name]) return; // LAS coords take priority
    if(!entry.x || !entry.y) return;
    const coord = (Math.abs(entry.x) > 180 || Math.abs(entry.y) > 90)
      ? gkToLatLon(entry.x, entry.y)
      : {lat: entry.y, lon: entry.x};
    if(coord) allCoords[name] = coord;
  });

  if (wL && wR && allCoords[wL] && allCoords[wR]) {
    const p1 = latLonToCanvas(allCoords[wL].lat, allCoords[wL].lon);
    const p2 = latLonToCanvas(allCoords[wR].lat, allCoords[wR].lon);
    ctx.strokeStyle = 'rgba(99,102,241,0.6)';
    ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    ctx.setLineDash([]);
    // Labels between wells
    const dist = Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);
    const realDist = dist / _mapView.zoom * 111000;
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const distLbl = realDist>=1000?(realDist/1000).toFixed(1)+' km':realDist.toFixed(0)+' m';

    // CC average
    const ccValues = markers.map((_,i)=>results[i]?results[i].bestCC:null).filter(v=>v!==null);
    const avgCC = ccValues.length ? ccValues.reduce((s,v)=>s+v,0)/ccValues.length : null;

    ctx.save();
    ctx.textAlign='center';

    // Distance label (small white pill)
    ctx.font='bold 10px system-ui';
    const dw2=ctx.measureText('↔ '+distLbl).width;
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.fillRect(mx-dw2/2-3, my-14, dw2+6, 13);
    ctx.fillStyle='#1e293b';
    ctx.fillText('↔ '+distLbl, mx, my-4);

    // CC pill just below, colored background
    if(avgCC !== null){
      const t=Math.max(0,Math.min(1,avgCC));
      const r=t<0.5?220:Math.round((1-(t-0.5)*2)*210);
      const g=t<0.5?Math.round(t*2*200):170;
      // CC label shown on correlation lines instead
    }
    ctx.restore();
  }

  // ── Draw correlation lines between wells ──────────────────────────────────
  const mapMarkerFilter = document.getElementById('mapMarkerFilter')?.value || '';
  const showUnvalidated = document.getElementById('mapShowUnvalidated')?.checked !== false;

  // Update marker selector options
  var mapMarkerSel = document.getElementById('mapMarkerFilter');
  if(mapMarkerSel) {
    var curVal = mapMarkerSel.value;
    var allMNames = new Set();
    Object.keys(accumulatedResults).forEach(function(orig) {
      Object.keys(accumulatedResults[orig]||{}).forEach(function(mn){ allMNames.add(mn); });
    });
    if(mapMarkerSel.options.length - 1 !== allMNames.size) {
      mapMarkerSel.innerHTML = '<option value="">— Todos —</option>';
      Array.from(allMNames).sort().forEach(function(mn) {
        mapMarkerSel.innerHTML += '<option value="'+mn+'"'+(mn===curVal?' selected':'')+'>'+mn+'</option>';
      });
    }
  }

  // Draw lines
  Object.keys(accumulatedResults).forEach(function(orig) {
    var pOrig = allCoords[orig];
    if(!pOrig) return;
    var cOrig = latLonToCanvas(pOrig.lat, pOrig.lon);
    Object.keys(accumulatedResults[orig]||{}).forEach(function(mName) {
      if(mapMarkerFilter && mName !== mapMarkerFilter) return;
      var mIdx = markers.findIndex(function(m){ return m.name===mName; });
      var lineColor = mIdx>=0 ? col(mIdx) : '#6366f1';
      Object.keys(accumulatedResults[orig][mName]||{}).forEach(function(dest) {
        var acc = accumulatedResults[orig][mName][dest];
        if(!acc) return;
        if(!showUnvalidated && !acc.validated) return;
        var pDest = allCoords[dest];
        if(!pDest) return;
        var cDest = latLonToCanvas(pDest.lat, pDest.lon);
        // Line width based on CC
        var lw = acc.cc ? Math.max(1, Math.min(4, acc.cc * 4)) : 1.5;
        ctx.save();
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = lw;
        ctx.globalAlpha = acc.validated ? 0.85 : 0.35;
        if(!acc.validated) ctx.setLineDash([6,4]);
        ctx.beginPath();
        ctx.moveTo(cOrig.x, cOrig.y);
        ctx.lineTo(cDest.x, cDest.y);
        ctx.stroke();
        ctx.setLineDash([]);
        // Midpoint label with marker name and CC
        var mx = (cOrig.x+cDest.x)/2, my = (cOrig.y+cDest.y)/2;
        ctx.globalAlpha = 0.9;
        ctx.font = 'bold 9px system-ui';
        ctx.fillStyle = '#fff';
        var lbl = mName + (acc.cc ? ' '+acc.cc.toFixed(2) : '');
        var tw = ctx.measureText(lbl).width;
        ctx.fillRect(mx-tw/2-2, my-7, tw+4, 12);
        ctx.fillStyle = lineColor;
        ctx.textAlign = 'center';
        ctx.fillText(lbl, mx, my+3);
        ctx.restore();
      });
    });
  });

  // Draw wells - combine loadedWells and _wellCoords-only wells
  const allWellNames = new Set([...Object.keys(loadedWells), ...Object.keys(allCoords)]);
  allWellNames.forEach((name) => {
    const well = loadedWells[name] || {}; // may be empty for coords-only wells
    const coords = allCoords[name];
    if (!coords) return;
    const p = latLonToCanvas(coords.lat, coords.lon);
    if (p.x<-20||p.x>W+20||p.y<-20||p.y>H+20) return; // out of view

    const isOrigen  = name === wL;
    const isDestino = name === wR;
    const color = isOrigen ? '#2563eb' : isDestino ? '#ea580c' : '#475569';
    const ring  = isOrigen ? '#1e40af' : isDestino ? '#c2410c' : '#334155';
    const size  = (isOrigen||isDestino) ? 12 : 8;

    // Shadow
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=4;
    // Well circle
    ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = ring; ctx.lineWidth=2; ctx.stroke();
    ctx.shadowBlur=0;

    // Role badge
    if (isOrigen || isDestino) {
      const badge = isOrigen ? '◀ ORIGEN' : 'DESTINO ▶';
      const bcolor = isOrigen ? '#1d4ed8' : '#c2410c';
      ctx.font='bold 9px system-ui'; ctx.textAlign='left';
      const bw=ctx.measureText(badge).width;
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fillRect(p.x+size+2,p.y-18,bw+6,13);
      ctx.fillStyle=bcolor; ctx.fillText(badge, p.x+size+5, p.y-8);
    }

    // Well name label
    ctx.font = (isOrigen||isDestino)?'bold 11px system-ui':'10px system-ui';
    ctx.textAlign='left'; ctx.fillStyle='#1e293b';
    const lw=ctx.measureText(name).width;
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(p.x+size+2,p.y-5,lw+5,13);
    ctx.fillStyle=color; ctx.fillText(name, p.x+size+4, p.y+6);
  });

  // Update well count
  const nc = Object.keys(allCoords).length;
  const ct = document.getElementById('mapWellCount');
  if (ct) ct.textContent = nc+' de '+Object.keys(loadedWells).length+' pozos con coordenadas';
}

function niceNumber(n) {
  const mag = Math.pow(10, Math.floor(Math.log10(n)));
  const norm = n/mag;
  if (norm < 2) return mag;
  if (norm < 5) return 2*mag;
  return 5*mag;
}

function updateMap() {
  if (!_mapInitialized) { initMap(); return; }
  // Fit all wells if we have coords
  const coords = Object.values(loadedWells).map(w=>extractWellCoords(w)).filter(Boolean);
  if (coords.length) mapFitAll(coords);
  else renderMap();
}

function mapFitAll(coordsList) {
  const coords = coordsList || (function(){
    var all = Object.values(loadedWells).map(w=>extractWellCoords(w)).filter(Boolean);
    Object.entries(_wellCoords).forEach(function([name, entry]){
      if(!entry.x || !entry.y) return;
      var coord = (Math.abs(entry.x)>180 || Math.abs(entry.y)>90)
        ? gkToLatLon(entry.x, entry.y) : {lat:entry.y, lon:entry.x};
      if(coord) all.push(coord);
    });
    return all;
  })();
  if (!coords.length) { renderMap(); return; }
  if (!_mapCanvas) return;

  const lats = coords.map(c=>c.lat), lons = coords.map(c=>c.lon);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const minLon=Math.min(...lons), maxLon=Math.max(...lons);

  // Center on all wells
  _mapView.lat = (minLat+maxLat)/2;
  _mapView.lon = (minLon+maxLon)/2;

  // Add 25% margin around bounding box
  const dLat = Math.max(maxLat-minLat, 0.002) * 1.5;
  const dLon = Math.max(maxLon-minLon, 0.002) * 1.5;

  // Fit to canvas size
  const zLat = _mapCanvas.height / (dLat * 1.5);
  const zLon = _mapCanvas.width  / dLon;
  _mapView.zoom = Math.min(zLat, zLon);
  renderMap();
}

function assignWell(name, side) {
  const sel = document.getElementById('wellSelect'+(side==='left'?'Left':'Right'));
  if (sel) { sel.value=name; onWellSelectionChange(); updateMap(); }
}

// Click on canvas to select well
function setupMapClick() {
  const c = document.getElementById('mapCanvas');
  if (!c || c._clickSetup) return;
  c._clickSetup = true;
  c.addEventListener('click', e => {
    if (!_mapCanvas) return;
    const rect = c.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    // Find closest well
    let closest=null, closestDist=20; // 20px threshold
    Object.entries(loadedWells).forEach(([name, well]) => {
      const coords = extractWellCoords(well);
      if (!coords) return;
      const p = latLonToCanvas(coords.lat, coords.lon);
      const d = Math.sqrt((p.x-mx)**2+(p.y-my)**2);
      if (d < closestDist) { closest=name; closestDist=d; }
    });
    if (closest) showWellPopup(closest, mx, my);
  });
}

function showWellPopup(name, px, py) {
  // Remove existing popup
  const old = document.getElementById('mapPopup');
  if (old) old.remove();

  const wells = Object.keys(wellState);
  const popup = document.createElement('div');
  popup.id = 'mapPopup';
  popup.style.cssText = `position:absolute;left:${px+10}px;top:${py-10}px;
    background:#fff;border:1px solid #e2e8f0;border-radius:8px;
    padding:10px 12px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);
    font-family:system-ui;min-width:160px`;
  popup.innerHTML = `
    <div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:6px">${name}</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button onclick="assignWell('${name}','left');document.getElementById('mapPopup')?.remove()"
        style="flex:1;font-size:11px;padding:5px 4px;background:#1d4ed8;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600">
        ◀ ORIGEN
      </button>
      <button onclick="assignWell('${name}','right');document.getElementById('mapPopup')?.remove()"
        style="flex:1;font-size:11px;padding:5px 4px;background:#ea580c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600">
        DESTINO ▶
      </button>
    </div>
    <button onclick="document.getElementById('mapPopup')?.remove()"
      style="position:absolute;top:4px;right:6px;border:none;background:transparent;cursor:pointer;color:#94a3b8;font-size:14px">✕</button>`;
  const vp = document.getElementById('mapViewport');
  if (vp) { vp.style.position='relative'; vp.appendChild(popup); }
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function h(e){
      if(!popup.contains(e.target)){popup.remove();document.removeEventListener('click',h);}
    });
  }, 10);
}

// ── Initialize windows ──────────────────────────────────────────────────────
window.addEventListener('load', () => {

  // Attach file input handlers
  document.getElementById('fileInput')?.addEventListener('change', function(){ loadFiles(this.files); this.value=''; });
  document.getElementById('projectFileInput')?.addEventListener('change', function(){ handleProjectLoad(this); });
  document.getElementById('csvImportInput')?.addEventListener('change', function(){ handleCSVImport(this); });
  document.getElementById('excelImportInput')?.addEventListener('change', function(){ importMarkersExcel(this); this.value=''; });

  const desktop = document.getElementById('wm-desktop');
  const dw = window.innerWidth;
  const dh = window.innerHeight - 90; const topOffset = 44;

  // Create windows with initial positions
  const winDefs = (function() {
    const visorW = Math.floor(dw * 0.44);   // Visor 44% width
    const rW     = Math.floor(dw * 0.52);   // Right windows 52% (wider than gap)
    const rH     = Math.floor(dh * 0.40);   // 40% height
    const cas    = 30;                        // cascade offset px (diagonal)
    const rX0    = visorW + 6;               // right column start X
    const rY0    = topOffset;

    // Mapa starts after 3 title bars, fills to bottom
    const mapaY  = rY0 + cas * 3;
    const mapaH  = Math.floor(dh * 0.92) - (mapaY - topOffset);

    return [
      // LEFT — Visor
      { id:'visor',
        icon:'📊', title:'Visor de Pozos',
        x: 4, y: topOffset,
        w: visorW - 4,
        h: Math.floor(dh * 0.92)
      },
      // RIGHT — diagonal cascade
      { id:'parametros',
        icon:'📐', title:'Parámetros de Correlación',
        x: rX0,           y: rY0,
        w: rW,            h: rH
      },
      { id:'correlacion_cruzada',
        icon:'📈', title:'Correlación Cruzada',
        x: rX0 + cas,     y: rY0 + cas,
        w: rW,            h: rH
      },
      { id:'tabla',
        icon:'📋', title:'Tabla de Resultados',
        x: rX0 + cas*2,   y: rY0 + cas*2,
        w: rW,            h: rH
      },
      { id:'mapa',
        icon:'🌍', title:'Mapa de Ubicación',
        x: rX0 + cas*3,   y: mapaY,
        w: rW,            h: mapaH
      },
    ];
  })();



  winDefs.forEach(def => {
    const el = createWindowEl(def.id, def.title, def.icon, def.x, def.y, def.w, def.h, WIN_CONTENT[def.id]);
    desktop.appendChild(el);
    WM.register(def.id);
    if(def.startClosed) WM.close(def.id);
  });
  // Bring visor to front initially, map will come to front when wells load
  WM.focus('visor');

  // Seed wells and restore session
  Object.keys(WDATA).forEach(wn => { loadedWells[wn] = WDATA[wn]; wellOrder.push(wn); });
  updateWellSelectors();
  setupDropZone();
  renderMarkerBody();
  renderMarkerTabs();

  // Restore last session from localStorage
  const restored = autoLoad();
  if (restored) {
    const ei = document.getElementById('autoSaveInfo');
    if (ei) ei.textContent = 'Sesión restaurada';
  }

  // Setup canvas interactions AFTER windows are created
  // Use small delay to ensure canvas elements are in DOM
  requestAnimationFrame(() => {
    setupInteraction('LEFT');
    setupInteraction('RIGHT');
    setupCCDrag();
  });

  WM._updateTaskbar();

  // Warn immediately if running from file:// protocol
  if (window.location.protocol === 'file:') {
    const msg = document.getElementById('fileStatus');
    if (msg) {
      msg.style.display = 'block';
      msg.style.color = '#fbbf24';
      msg.style.maxWidth = '600px';
      const fname = window.location.pathname.split('/').pop();
      msg.innerHTML = '⚠ <b>Abrí este archivo desde un servidor local</b> para poder cargar pozos.<br>' +
        'Ejecutá en la terminal: <span style="font-family:monospace;color:#fff;background:#0f172a;padding:1px 6px;border-radius:3px">python -m http.server 8080</span> ' +
        'en la carpeta del archivo, luego abrí ' +
        '<a href="http://localhost:8080/' + fname + '" style="color:#60a5fa">http://localhost:8080/' + fname + '</a>';
    }
  }
});

// Resize workspace to fill available space
function resizeWorkspace() {
  const ws = document.getElementById('wm-workspace');
  const topBar = document.getElementById('fileLoaderBar');
  const used = topBar ? topBar.offsetHeight : 44;
  ws.style.height = (window.innerHeight - used - 46) + 'px';
  const desktop = document.getElementById('wm-desktop');
  if (desktop) {
    desktop.style.width  = '100%';
    desktop.style.height = '100%';
  }
}
window.addEventListener('resize', resizeWorkspace);
window.addEventListener('load',   resizeWorkspace);

// Override renderMarkerDataTable to also update when tabla window is open
const _origRMDT = typeof renderMarkerDataTable !== 'undefined' ? renderMarkerDataTable : null;

// Also trigger autosave on marker changes
const _origAddMarker = addMarker;
window.addMarker = function() { _origAddMarker(); markUnsaved(); setTimeout(autoSave, 500); };
</script>
